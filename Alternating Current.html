<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alternating Current | Physics MDCAT Mock</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(145deg, #eef2ff 0%, #e0e7ff 100%);
            color: #1e3a8a;
            padding: 30px 20px;
            line-height: 1.55;
        }

        .quiz-container {
            max-width: 950px;
            margin: 0 auto;
            background: #ffffff;
            padding: 40px 42px;
            border-radius: 32px;
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.12), 0 5px 12px rgba(0, 0, 0, 0.05);
            border-top: 8px solid #2563eb;
            transition: all 0.2s;
        }

        h1 {
            font-family: 'Outfit', sans-serif;
            font-weight: 800;
            font-size: 2.5rem;
            background: linear-gradient(135deg, #1e3a8a, #2563eb);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            text-align: center;
            letter-spacing: -0.5px;
            margin-bottom: 8px;
        }

        .question {
            margin-bottom: 28px;
            padding: 20px 24px;
            border: 1px solid #c7d2fe;
            border-radius: 24px;
            background: #ffffff;
            transition: box-shadow 0.2s;
            box-shadow: 0 1px 2px rgba(0,0,0,0.02);
        }

        .question:hover {
            box-shadow: 0 6px 14px rgba(37, 99, 235, 0.08);
            border-color: #a5b4fc;
        }

        .q-text {
            font-weight: 700;
            font-size: 1.12rem;
            margin-bottom: 18px;
            color: #1e3a8a;
            padding-left: 14px;
            border-left: 4px solid #2563eb;
        }

        .options {
            display: grid;
            gap: 12px;
        }

        .option {
            padding: 14px 20px;
            border: 2px solid #e2e8f0;
            border-radius: 18px;
            cursor: pointer;
            transition: all 0.2s ease;
            background: #ffffff;
            font-weight: 500;
            color: #1e293b;
        }

        .option:hover {
            border-color: #2563eb;
            background: #eef2ff;
            transform: translateX(4px);
        }

        .option.selected {
            background: #1e3a8a;
            color: white;
            border-color: #1e3a8a;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .btn-submit {
            display: block;
            width: 100%;
            padding: 18px;
            background: #2563eb;
            color: white;
            border: none;
            border-radius: 60px;
            font-weight: 800;
            font-size: 1.3rem;
            cursor: pointer;
            margin-top: 35px;
            transition: 0.2s;
            letter-spacing: 1px;
            font-family: 'Outfit', sans-serif;
            box-shadow: 0 8px 16px rgba(37, 99, 235, 0.25);
        }

        .btn-submit:hover {
            background: #1e3a8a;
            transform: translateY(-2px);
            box-shadow: 0 12px 20px rgba(30, 58, 138, 0.3);
        }

        #results {
            display: none;
            margin-top: 45px;
            padding: 28px 25px;
            border-radius: 28px;
            text-align: center;
            background: linear-gradient(110deg, #1e3a8a, #2563eb);
            color: #eef2ff;
            box-shadow: 0 12px 24px rgba(0,0,0,0.2);
        }

        #results h2 {
            font-family: 'Outfit', sans-serif;
            font-size: 2rem;
            font-weight: 800;
            letter-spacing: -0.5px;
        }

        .explanation {
            margin-top: 18px;
            font-size: 0.92rem;
            color: #1e3a8a;
            display: none;
            background: #eef2ff;
            padding: 16px 22px;
            border-left: 6px solid #2563eb;
            border-radius: 18px;
            font-weight: 500;
            line-height: 1.45;
        }

        .correct {
            border-color: #10b981 !important;
            background: #d1fae5 !important;
            color: #064e3b !important;
            font-weight: 700;
        }

        .wrong {
            border-color: #ef4444 !important;
            background: #fee2e2 !important;
            color: #991b1b !important;
        }

        @media (max-width: 650px) {
            .quiz-container {
                padding: 24px 18px;
            }
            .q-text {
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>
<div class="quiz-container">
    <h1>Alternating Current</h1>
    
    <form id="quizForm">
        <div id="questionsContainer"></div>
        <button type="button" class="btn-submit" onclick="calculateScore()">Submit</button>
    </form>

    <div id="results">
        <h2 id="scoreText"></h2>
    </div>
</div>

<script>
    // 20 conceptual + numerical, high-difficulty Alternating Current MCQs (Physics FSC Part 2, Chapter 16)
    const acMcqs = [
        { q: "The peak value of an AC voltage is 311 V. Its RMS value is approximately:", options: ["220 V", "311 V", "440 V", "155 V"], exp: "V_rms = V_peak/√2 = 311/1.414 ≈ 220 V.", correct: "A" },
        { q: "The time period of an AC signal with frequency 50 Hz is:", options: ["0.02 s", "0.04 s", "0.01 s", "0.2 s"], exp: "T = 1/f = 1/50 = 0.02 s.", correct: "A" },
        { q: "In a purely resistive AC circuit, the phase difference between voltage and current is:", options: ["0°", "45°", "90°", "180°"], exp: "For a pure resistor, voltage and current are in phase (φ = 0°).", correct: "A" },
        { q: "The capacitive reactance X_C is given by:", options: ["ωC", "1/(ωC)", "ωL", "1/(ωL)"], exp: "Capacitive reactance X_C = 1/(ωC) = 1/(2πfC).", correct: "B" },
        { q: "The inductive reactance X_L is given by:", options: ["ωL", "1/(ωL)", "ωC", "1/(ωC)"], exp: "Inductive reactance X_L = ωL = 2πfL.", correct: "A" },
        { q: "In a purely inductive circuit, the current lags the voltage by:", options: ["0°", "45°", "90°", "180°"], exp: "In a pure inductor, current lags voltage by 90° (π/2).", correct: "C" },
        { q: "In a purely capacitive circuit, the current leads the voltage by:", options: ["0°", "45°", "90°", "180°"], exp: "In a pure capacitor, current leads voltage by 90° (π/2).", correct: "C" },
        { q: "The impedance of an RLC series circuit at resonance is:", options: ["R", "0", "∞", "R + X_L + X_C"], exp: "At resonance, X_L = X_C, so impedance Z = R (minimum).", correct: "A" },
        { q: "The resonant frequency of an RLC circuit is given by:", options: ["1/(2π√(LC))", "2π√(LC)", "√(LC)/(2π)", "1/√(LC)"], exp: "f_r = 1/(2π√(LC)).", correct: "A" },
        { q: "The power factor of a purely resistive circuit is:", options: ["0", "1", "0.5", "0.707"], exp: "Power factor = cosφ. For pure resistor, φ = 0°, so cos0° = 1.", correct: "B" },
        { q: "An AC voltage v = 200 sin(100πt) is applied to a 50 Ω resistor. The RMS current is:", options: ["2√2 A", "4 A", "2 A", "4√2 A"], exp: "V_peak = 200 V, V_rms = 200/√2 = 141.4 V. I_rms = V_rms/R = 141.4/50 = 2.828 A ≈ 2√2 A.", correct: "A" },
        { q: "In a series RLC circuit at resonance, the power factor is:", options: ["0", "1", "0.5", "0.707"], exp: "At resonance, φ = 0°, cosφ = 1.", correct: "B" },
        { q: "A capacitor of 100 μF is connected to a 220 V, 50 Hz AC supply. The capacitive reactance is:", options: ["31.8 Ω", "15.9 Ω", "63.6 Ω", "100 Ω"], exp: "X_C = 1/(2πfC) = 1/(2×3.14×50×100×10⁻⁶) = 1/(0.0314) ≈ 31.8 Ω.", correct: "A" },
        { q: "The average power consumed in a purely inductive or capacitive AC circuit is:", options: ["Zero", "Maximum", "Half the maximum", "Depends on frequency"], exp: "In pure L or C, φ = 90°, so P_avg = V_rms I_rms cos90° = 0.", correct: "A" },
        { q: "The Q-factor of a series resonant circuit is given by:", options: ["(1/R)√(L/C)", "(1/R)√(C/L)", "R√(L/C)", "R√(C/L)"], exp: "Q = (ω₀L)/R = (1/R)√(L/C).", correct: "A" },
        { q: "The voltage across an inductor leads the current by:", options: ["0°", "45°", "90°", "180°"], exp: "For an inductor, voltage leads current by 90° (or current lags voltage by 90°).", correct: "C" },
        { q: "The voltage across a capacitor lags the current by:", options: ["0°", "45°", "90°", "180°"], exp: "For a capacitor, voltage lags current by 90° (or current leads voltage by 90°).", correct: "C" },
        { q: "An inductor of 0.5 H is connected to a 220 V, 50 Hz AC supply. The inductive reactance is:", options: ["157 Ω", "314 Ω", "78.5 Ω", "628 Ω"], exp: "X_L = 2πfL = 2×3.14×50×0.5 = 157 Ω.", correct: "A" },
        { q: "The form factor of a sinusoidal AC waveform is:", options: ["1.11", "1.414", "0.707", "1.73"], exp: "Form factor = RMS value / Average value = (V_peak/√2) / (2V_peak/π) = π/(2√2) ≈ 1.11.", correct: "A" },
        { q: "In an AC circuit, the power factor is given by:", options: ["R/Z", "Z/R", "X_L/Z", "X_C/Z"], exp: "Power factor = cosφ = R/Z.", correct: "A" }
    ];

    // Shuffle questions for randomized order each load
    function shuffleArray(arr) {
        for (let i = arr.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [arr[i], arr[j]] = [arr[j], arr[i]];
        }
        return arr;
    }

    let randomizedQuestions = [];
    let userSelections = {};
    let quizSubmitted = false;

    function loadQuiz() {
        quizSubmitted = false;
        randomizedQuestions = shuffleArray([...acMcqs]);
        const container = document.getElementById('questionsContainer');
        container.innerHTML = '';
        userSelections = {};

        randomizedQuestions.forEach((item, idx) => {
            const qDiv = document.createElement('div');
            qDiv.className = 'question';
            qDiv.setAttribute('data-qidx', idx);
            qDiv.innerHTML = `
                <div class="q-text">${idx + 1}. ${item.q}</div>
                <div class="options">
                    ${item.options.map((opt, optIdx) => {
                        const letter = String.fromCharCode(65 + optIdx);
                        return `<div class="option" data-letter="${letter}" onclick="selectOption(this, ${idx}, '${letter}')">
                            ${letter}. ${opt}
                        </div>`;
                    }).join('')}
                </div>
                <div class="explanation" id="exp-${idx}"><strong>Explanation:</strong> ${item.exp}</div>
            `;
            container.appendChild(qDiv);
        });
    }

    window.selectOption = function(el, qIndex, val) {
        if (quizSubmitted) return;
        const parentOptions = el.parentElement;
        Array.from(parentOptions.children).forEach(child => {
            child.classList.remove('selected');
        });
        el.classList.add('selected');
        userSelections[qIndex] = val;
    };

    window.calculateScore = function() {
        if (quizSubmitted) return;
        quizSubmitted = true;
        
        let score = 0;
        randomizedQuestions.forEach((data, idx) => {
            const expDiv = document.getElementById(`exp-${idx}`);
            if (expDiv) expDiv.style.display = 'block';
            
            const questionDiv = document.querySelector(`.question[data-qidx="${idx}"]`);
            if (!questionDiv) return;
            const allOpts = questionDiv.querySelectorAll('.option');
            const correctLetter = data.correct;
            
            allOpts.forEach(opt => {
                const letter = opt.getAttribute('data-letter');
                if (letter === correctLetter) {
                    opt.classList.add('correct');
                }
                if (userSelections[idx] && userSelections[idx] === letter && letter !== correctLetter) {
                    opt.classList.add('wrong');
                }
            });
            
            if (userSelections[idx] && userSelections[idx] === data.correct) {
                score++;
            }
        });
        
        const resultsDiv = document.getElementById('results');
        resultsDiv.style.display = 'block';
        const scoreSpan = document.getElementById('scoreText');
        const percent = Math.round((score / randomizedQuestions.length) * 100);
        scoreSpan.innerHTML = `Score: ${score} / ${randomizedQuestions.length}  |  ${percent}%`;
        
        setTimeout(() => {
            resultsDiv.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }, 100);
    };

    loadQuiz();
</script>
</body>
</html>
