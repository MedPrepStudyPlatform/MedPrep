<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MDCAT Quiz: Diversity Among Animals</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Outfit:wght@700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #f5fafd; color: #15304c; padding: 20px; margin: 0; }
        .quiz-container { max-width: 850px; margin: 0 auto; background: white; padding: 30px; border-radius: 24px; box-shadow: 0 10px 25px rgba(10, 44, 72, 0.1); }
        h1 { font-family: 'Outfit', sans-serif; color: #0a2c48; text-align: center; margin-bottom: 10px; }
        .subtitle { text-align: center; color: #1ecbe1; font-weight: 600; margin-bottom: 30px; }
        .question { margin-bottom: 30px; padding: 20px; border: 1px solid #e0f2fe; border-radius: 16px; transition: 0.3s; }
        .q-text { font-weight: 600; font-size: 1.1rem; margin-bottom: 15px; line-height: 1.5; }
        .options { display: grid; gap: 12px; }
        .option { padding: 14px 18px; border: 2px solid #bbe0f0; border-radius: 12px; cursor: pointer; transition: 0.2s; font-size: 0.95rem; }
        .option:hover { background: #f0faff; border-color: #1ecbe1; }
        .option.selected { background: #0a2c48; color: white; border-color: #0a2c48; }
        .btn-submit { display: block; width: 100%; padding: 18px; background: #1ecbe1; color: #0a2c48; border: none; border-radius: 50px; font-weight: 700; font-size: 1.2rem; cursor: pointer; margin-top: 25px; transition: 0.3s; box-shadow: 0 4px 15px rgba(30, 203, 225, 0.3); }
        .btn-submit:hover { background: #0a2c48; color: white; transform: translateY(-2px); }
        #results { display: none; margin-top: 30px; padding: 25px; border-radius: 20px; text-align: center; background: #0a2c48; color: white; }
        .explanation { margin-top: 15px; font-size: 0.92rem; color: #1f6a92; display: none; background: #eff9ff; padding: 15px; border-left: 5px solid #1ecbe1; border-radius: 8px; line-height: 1.4; }
        .correct { border-color: #2ecc71 !important; background: #eafff2 !important; color: #15304c; }
        .wrong { border-color: #e74c3c !important; background: #fff2f0 !important; color: #15304c; }
    </style>
</head>
<body>

<div class="quiz-container">
    <h1>Diversity Among Animalia</h1>
    <div class="subtitle">MDCAT Standard Practice: Animal Diversity</div>
    <form id="quizForm">
        <div id="questionsContainer"></div>
        <button type="button" class="btn-submit" onclick="calculateScore()">Submit</button>
    </form>

    <div id="results">
        <h2 id="scoreText"></h2>
        
    </div>
</div>

<script>
    const mdcatAnimals = [
        { q: "Animals that possess a body cavity which is not completely lined by mesoderm, but is instead a persistent blastocoel, are classified as:", options: ["Acoelomates", "Pseudocoelomates", "Eucoelomates", "Enterocoelomates"], exp: "Pseudocoelomates (like Aschelminthes/Roundworms) have a body cavity between the endoderm and mesoderm, not fully enclosed by mesoderm.", correct: "B" },
        { q: "Which of the following phyla is characterized by water vascular system, tube feet, and radial symmetry in adults but bilateral symmetry in larvae?", options: ["Mollusca", "Arthropoda", "Echinodermata", "Annelida"], exp: "Echinoderms are unique for their water vascular system used for locomotion and their secondary radial symmetry.", correct: "C" },
        { q: "The presence of 'Choanocytes' (collar cells) is a diagnostic feature of which phylum?", options: ["Porifera", "Cnidaria", "Platyhelminthes", "Ctenophora"], exp: "Choanocytes are flagellated cells that line the internal cavities of sponges and help in water circulation and feeding.", correct: "A" },
        { q: "In Cnidarians, the specialized stinging cells used for defense and capturing prey are called:", options: ["Choanocytes", "Cnidocytes", "Solenocytes", "Nephridia"], exp: "Cnidocytes contain stinging organelles called nematocysts, which are the hallmark of Phylum Cnidaria.", correct: "B" },
        { q: "Which of the following is a 'triploblastic acoelomate' organism?", options: ["Ascaris", "Dugesia (Planaria)", "Earthworm", "Hydra"], exp: "Planaria belongs to Platyhelminthes, which are triploblastic (three germ layers) but lack a body cavity (acoelomate).", correct: "B" },
        { q: "The 'Flame cells' (protonephridia) are the primary excretory structures found in:", options: ["Roundworms", "Flatworms", "Segmented worms", "Insects"], exp: "Flame cells are specialized excretory cells found in Platyhelminthes for osmoregulation and waste removal.", correct: "B" },
        { q: "Annelids are distinguished from other worms by the presence of:", options: ["Pseudocoelom", "Radial symmetry", "True Metameric Segmentation", "Exoskeleton"], exp: "Annelids show true segmentation (metamerism) where the body is divided into similar linear segments.", correct: "C" },
        { q: "Which phylum is the largest in the animal kingdom, characterized by jointed appendages and a chitinous exoskeleton?", options: ["Mollusca", "Chordata", "Arthropoda", "Echinodermata"], exp: "Arthropoda is the most diverse and largest phylum, containing over 80% of all described animal species.", correct: "C" },
        { q: "The 'Radula' is a rasping, tongue-like organ used for feeding in most members of phylum:", options: ["Mollusca", "Arthropoda", "Annelida", "Echinodermata"], exp: "The radula is a unique feature of mollusks used to scrape or cut food.", correct: "A" },
        { q: "In which of the following groups does the 'notochord' persist throughout life, extending from the head to the tail?", options: ["Urochordata", "Cephalochordata", "Vertebrata", "Hemichordata"], exp: "In Cephalochordates (like Amphioxus), the notochord is present throughout life and spans the entire length of the body.", correct: "B" },
        { q: "Which of the following is a characteristic of Protostomes during embryonic development?", options: ["Radial and indeterminate cleavage", "Spiral and determinate cleavage", "Blastopore becomes the anus", "Coelom forms from outpocketing of archenteron"], exp: "Protostomes (Mollusks, Annelids, Arthropods) exhibit spiral and determinate cleavage, and the blastopore becomes the mouth.", correct: "B" },
        { q: "The unique characteristic of Mammals that allows them to maintain a constant body temperature regardless of environmental changes is:", options: ["Ectothermy", "Endothermy", "Poikilothermy", "Hibernation"], exp: "Mammals and Birds are endothermic (warm-blooded), meaning they generate internal heat to regulate body temperature.", correct: "B" },
        { q: "Cartilaginous fishes (Chondrichthyes) differ from bony fishes (Osteichthyes) because they lack:", options: ["Gills", "Paired fins", "An operculum (gill cover)", "A heart"], exp: "Cartilaginous fishes like sharks have exposed gill slits without a bony operculum cover.", correct: "C" },
        { q: "Which class of vertebrates is considered the first to become truly terrestrial due to the evolution of the amniotic egg?", options: ["Amphibia", "Reptilia", "Aves", "Mammalia"], exp: "Reptiles evolved the amniotic egg with a protective shell, removing the requirement of water for reproduction.", correct: "B" },
        { q: "The presence of a 'Pneumatic skeleton' (hollow bones) is an adaptation for flight found in class:", options: ["Mammalia", "Reptilia", "Amphibia", "Aves"], exp: "Birds (Aves) have light, air-filled bones to reduce body weight for efficient flight.", correct: "D" },
        { q: "The 'Mantel' is a fold of tissue that drapes over the visceral mass and secretes the shell in:", options: ["Sponges", "Starfish", "Snails", "Crabs"], exp: "In Mollusks (like snails), the mantle is the tissue layer responsible for shell secretion.", correct: "C" },
        { q: "Bilateral symmetry is first encountered in the evolutionary history of animals in the phylum:", options: ["Porifera", "Cnidaria", "Platyhelminthes", "Nematoda"], exp: "Platyhelminthes (Flatworms) are the first group to exhibit bilateral symmetry and cephalization.", correct: "C" },
        { q: "Which of the following is an egg-laying mammal (Monotreme)?", options: ["Kangaroo", "Platypus", "Opossum", "Whale"], exp: "The Platypus and Spiny Anteater are unique mammals that lay eggs instead of giving birth to live young.", correct: "B" },
        { q: "The double circuit heart with a partially divided ventricle (except in crocodiles) is a feature of:", options: ["Fish", "Amphibians", "Reptiles", "Birds"], exp: "Most reptiles have a 3-chambered heart with an incomplete septum in the ventricle; Crocodiles are the exception with 4 chambers.", correct: "C" },
        { q: "Insects breathe through a complex system of tubules called:", options: ["Gills", "Book lungs", "Tracheal system", "Skin"], exp: "Arthropods of class Insecta use a tracheal system consisting of spiracles and tracheae for gas exchange.", correct: "C" }
    ];

    // Manual redistribution to ensure 5/5/5/5 Balance
    const balancedAnimals = [
        { q: "Pseudocoelom is found in which group?", options: ["Annelida", "Aschelminthes", "Mollusca", "Echinodermata"], exp: "Roundworms (Aschelminthes) have a pseudocoelom.", correct: "B" },
        { q: "The larval stage of Echinoderms shows:", options: ["Radial symmetry", "Asymmetry", "Bilateral symmetry", "Pentamerous symmetry"], exp: "Larvae are bilateral, while adults are radial.", correct: "C" },
        { q: "Choanocytes are characteristic of:", options: ["Porifera", "Cnidaria", "Annelida", "Arthropoda"], exp: "Sponges have collar cells (choanocytes).", correct: "A" },
        { q: "Stinging cells of Hydra are called:", options: ["Cilia", "Cnidocytes", "Flame cells", "Pili"], exp: "Cnidocytes are the stinging cells.", correct: "B" },
        { q: "Metameric segmentation is the hallmark of:", options: ["Flatworms", "Roundworms", "Annelids", "Mollusks"], exp: "Annelids are truly segmented.", correct: "C" },
        { q: "Arthropod exoskeleton is made of:", options: ["Calcium", "Silica", "Chitin", "Cellulose"], exp: "Chitin is a nitrogenous polysaccharide in arthropods.", correct: "C" },
        { q: "The rasping organ 'Radula' is found in:", options: ["Mollusca", "Arthropoda", "Annelida", "Porifera"], exp: "Mollusks use radula to feed.", correct: "A" },
        { q: "Which lacks a bony operculum cover?", options: ["Bony fish", "Lung fish", "Cartilaginous fish", "Amphibians"], exp: "Sharks (Chondrichthyes) have naked gill slits.", correct: "C" },
        { q: "Amniotic egg first evolved in:", options: ["Amphibians", "Reptiles", "Birds", "Mammals"], exp: "Reptiles were the first fully land-adapted vertebrates.", correct: "B" },
        { q: "Hollow pneumatic bones are found in:", options: ["Mammals", "Reptiles", "Fish", "Birds"], exp: "Birds have pneumatic bones for flight.", correct: "D" },
        { q: "Bilateral symmetry begins from phylum:", options: ["Porifera", "Cnidaria", "Platyhelminthes", "Ctenophora"], exp: "Flatworms are the first bilateral animals.", correct: "C" },
        { q: "Excretory 'Flame cells' are found in:", options: ["Insects", "Flatworms", "Earthworms", "Sponges"], exp: "Flatworms use flame cells/protonephridia.", correct: "B" },
        { q: "Which of the following is a Monotreme?", options: ["Kangaroo", "Platypus", "Bat", "Shrew"], exp: "Platypus is an egg-laying mammal.", correct: "B" },
        { q: "Insects perform gas exchange via:", options: ["Skin", "Gills", "Book lungs", "Tracheal system"], exp: "Tracheal system is used by insects.", correct: "D" },
        { q: "The shell of a snail is secreted by:", options: ["Foot", "Visceral mass", "Mantle", "Radula"], exp: "The mantle secretes the calcium carbonate shell.", correct: "C" },
        { q: "Cleavage in Protostomes is:", options: ["Spiral and Determinate", "Radial and Indeterminate", "Holoblastic and Equal", "Meroblastic"], exp: "Protostomes have spiral/determinate cleavage.", correct: "A" },
        { q: "Notochord throughout life in head/tail:", options: ["Amphioxus", "Tunicate", "Shark", "Frog"], exp: "Amphioxus (Cephalochordata) retains it.", correct: "A" },
        { q: "Reptilian heart ventricle is usually:", options: ["Fully divided", "Absent", "Incompletely divided", "Unilocular"], exp: "Reptiles have an incomplete septum.", correct: "C" },
        { q: "Warm-blooded (Endothermic) group:", options: ["Amphibia", "Reptilia", "Osteichthyes", "Aves"], exp: "Birds and Mammals are endothermic.", correct: "D" },
        { q: "Organism with tissue level but no organs:", options: ["Sponge", "Jellyfish", "Tapeworm", "Starfish"], exp: "Cnidarians have tissue level organization.", correct: "B" }
    ];

    // Re-check Balance:
    // A: 16, 7, 3, 17 -> (4) ... needs one more. Let's change 19 to A.
    balancedAnimals[18].options = ["Aves", "Amphibia", "Reptilia", "Osteichthyes"];
    balancedAnimals[18].correct = "A"; // (A: 5)
    // B: 1, 4, 9, 12, 13, 20 -> (6) ... needs to lose one. Let's change 20 to D.
    balancedAnimals[19].options = ["Sponge", "Tapeworm", "Starfish", "Jellyfish"];
    balancedAnimals[19].correct = "D"; // (D: 4)
    // C: 2, 5, 6, 8, 11, 15, 18 -> (7) ... needs to lose two. Change 15 to D, 18 to D.
    balancedAnimals[14].options = ["Foot", "Visceral mass", "Radula", "Mantle"];
    balancedAnimals[14].correct = "D"; // (D: 5)
    balancedAnimals[17].options = ["Fully divided", "Absent", "Unilocular", "Incompletely divided"];
    balancedAnimals[17].correct = "D"; // (D: 6) ... wait.
    // Recounting D: 10, 14, 15, 18, 19, 20 -> (6) ... let's move one D to B.
    balancedAnimals[17].options = ["Fully divided", "Incompletely divided", "Absent", "Unilocular"];
    balancedAnimals[17].correct = "B"; // (B: 6) ... let's move one B to A.
    balancedAnimals[0].options = ["Aschelminthes", "Annelida", "Mollusca", "Echinodermata"];
    balancedAnimals[0].correct = "A"; // (A: 6)
    
    // Final hard reset for perfect 5/5/5/5:
    const perfectFinal = [
        { q: "Pseudocoelom presence:", options: ["Aschelminthes", "Annelida", "Mollusca", "Porifera"], exp: "Aschelminthes have it.", correct: "A" },
        { q: "Radula for feeding:", options: ["Mollusca", "Arthropoda", "Annelida", "Cnidaria"], exp: "Mollusks use radula.", correct: "A" },
        { q: "Cleavage in Protostomes:", options: ["Spiral/Determinate", "Radial/Indeterminate", "Discoidal", "Superficial"], exp: "Spiral/Determinate for protostomes.", correct: "A" },
        { q: "Notochord persists in:", options: ["Amphioxus", "Tunicates", "Fish", "Lizards"], exp: "Cephalochordates keep it.", correct: "A" },
        { q: "Reptilian heart feature:", options: ["Incomplete septum", "4 chambers", "1 chamber", "No ventricle"], exp: "Incomplete ventricle septum.", correct: "A" },
        { q: "Stinging cells in Cnidaria:", options: ["Choanocytes", "Cnidocytes", "Flame cells", "Nephridia"], exp: "Cnidocytes sting.", correct: "B" },
        { q: "Amniotic egg evolution:", options: ["Fish", "Reptiles", "Amphibians", "Sponges"], exp: "Reptiles evolved it.", correct: "B" },
        { q: "Excretory flame cells:", options: ["Insects", "Flatworms", "Crabs", "Snails"], exp: "Flatworms use flame cells.", correct: "B" },
        { q: "Egg-laying mammal:", options: ["Kangaroo", "Platypus", "Whale", "Human"], exp: "Platypus lays eggs.", correct: "B" },
        { q: "Tissue level organization:", options: ["Porifera", "Cnidaria", "Chordata", "Arthropoda"], exp: "Cnidaria is tissue level.", correct: "B" },
        { q: "Secondary radial symmetry:", options: ["Cnidaria", "Annelida", "Echinodermata", "Mollusca"], exp: "Echinoderm adults are radial.", correct: "C" },
        { q: "Metameric segmentation:", options: ["Nematodes", "Flatworms", "Annelids", "Roundworms"], exp: "Annelids show true segments.", correct: "C" },
        { q: "Largest animal phylum:", options: ["Mollusca", "Chordata", "Arthropoda", "Echinodermata"], exp: "Arthropoda is largest.", correct: "C" },
        { q: "Lacks operculum cover:", options: ["Bony fish", "Goldfish", "Cartilaginous fish", "Salmon"], exp: "Sharks have naked slits.", correct: "C" },
        { q: "Bilateral symmetry start:", options: ["Porifera", "Cnidaria", "Platyhelminthes", "Ctenophora"], exp: "Platyhelminthes is first bilateral.", correct: "C" },
        { q: "Pneumatic bones in:", options: ["Mammals", "Reptiles", "Fish", "Birds"], exp: "Birds have air-filled bones.", correct: "D" },
        { q: "Insect gas exchange:", options: ["Lungs", "Skin", "Gills", "Tracheal system"], exp: "Insects use tracheae.", correct: "D" },
        { q: "Mantle tissue in:", options: ["Sponges", "Arthropods", "Annelids", "Mollusks"], exp: "Mantle is a mollusk trait.", correct: "D" },
        { q: "Choanocytes found in:", options: ["Cnidaria", "Platyhelminthes", "Annelida", "Porifera"], exp: "Porifera (sponges) have them.", correct: "D" },
        { q: "Endothermic vertebrates:", options: ["Fish", "Amphibians", "Reptiles", "Aves"], exp: "Birds (Aves) are endothermic.", correct: "D" }
    ];

    function loadQuiz() {
        const container = document.getElementById('questionsContainer');
        perfectFinal.forEach((data, index) => {
            const qDiv = document.createElement('div');
            qDiv.className = 'question';
            qDiv.innerHTML = `
                <div class="q-text">${index + 1}. ${data.q}</div>
                <div class="options">
                    ${data.options.map((opt, i) => `
                        <div class="option" onclick="selectOption(this, ${index}, '${String.fromCharCode(65 + i)}')">
                            ${String.fromCharCode(65 + i)}. ${opt}
                        </div>
                    `).join('')}
                </div>
                <div class="explanation" id="exp-${index}"><strong>Explanation:</strong> ${data.exp}</div>
            `;
            container.appendChild(qDiv);
        });
    }

    let userAnswers = {};
    function selectOption(el, qIndex, val) {
        const parent = el.parentElement;
        Array.from(parent.children).forEach(child => child.classList.remove('selected'));
        el.classList.add('selected');
        userAnswers[qIndex] = val;
    }

    function calculateScore() {
        let score = 0;
        perfectFinal.forEach((data, index) => {
            const ex = document.getElementById(`exp-${index}`);
            ex.style.display = 'block';
            const options = document.querySelectorAll(`.question:nth-child(${index + 1}) .option`);
            options.forEach((opt, i) => {
                const letter = String.fromCharCode(65 + i);
                if (letter === data.correct) opt.classList.add('correct');
                if (userAnswers[index] === letter && letter !== data.correct) opt.classList.add('wrong');
            });
            if (userAnswers[index] === data.correct) score++;
        });

        const resultsDiv = document.getElementById('results');
        resultsDiv.style.display = 'block';
        document.getElementById('scoreText').innerText = `Total Score: ${score} / ${perfectFinal.length}`;
        window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
    }
    loadQuiz();
</script>

</body>
</html>
