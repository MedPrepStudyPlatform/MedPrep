<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Behaviour: Randomized MDCAT Mock</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Outfit:wght@700&display=swap" rel="stylesheet">
    <style>
        /* Theme: Sunset Orange & Deep Indigo */
        body { font-family: 'Inter', sans-serif; background: #fffcf9; color: #2d3436; padding: 20px; line-height: 1.6; }
        .quiz-container { max-width: 850px; margin: 0 auto; background: white; padding: 40px; border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); border-top: 10px solid #e67e22; }
        h1 { font-family: 'Outfit', sans-serif; color: #d35400; text-align: center; margin-bottom: 5px; }
        .subtitle { text-align: center; color: #636e72; font-weight: 700; margin-bottom: 35px; text-transform: uppercase; letter-spacing: 1.5px; font-size: 0.9rem; }
        .question { margin-bottom: 35px; padding: 25px; border: 1px solid #dfe6e9; border-radius: 15px; background: #ffffff; }
        .q-text { font-weight: 600; font-size: 1.1rem; margin-bottom: 20px; color: #2c3e50; }
        .options { display: grid; gap: 12px; }
        .option { padding: 16px 20px; border: 2px solid #f1f2f6; border-radius: 12px; cursor: pointer; transition: 0.2s; background: #ffffff; }
        .option:hover { border-color: #e67e22; background: #fff7f0; }
        .option.selected { background: #2d3436; color: white; border-color: #2d3436; }
        .btn-submit { display: block; width: 100%; padding: 20px; background: #e67e22; color: white; border: none; border-radius: 50px; font-weight: 700; font-size: 1.3rem; cursor: pointer; margin-top: 30px; transition: 0.3s; }
        .btn-submit:hover { background: #cf711f; transform: translateY(-2px); }
        #results { display: none; margin-top: 40px; padding: 30px; border-radius: 20px; text-align: center; background: #2d3436; color: white; }
        .explanation { margin-top: 15px; font-size: 0.95rem; color: #2d3748; display: none; background: #fff7f0; padding: 18px; border-left: 6px solid #e67e22; border-radius: 8px; }
        .correct { border-color: #2ecc71 !important; background: #e8f8f0 !important; color: #145a32; font-weight: bold; }
        .wrong { border-color: #e74c3c !important; background: #fdedec !important; color: #1c2e36; }
    </style>
</head>
<body>

<div class="quiz-container">
    <h1>Behaviour</h1>
    
    
    <form id="quizForm">
        <div id="questionsContainer"></div>
        <button type="button" class="btn-submit" onclick="calculateScore()">Submit</button>
    </form>

    <div id="results">
        <h2 id="scoreText"></h2>
        
    </div>
</div>

<script>
    const behaviorData = [
        { q: "Behavior that is developmentally fixed and under strong genetic control is called:", options: ["Learned behavior", "Innate behavior", "Operant conditioning", "Insight learning"], exp: "Innate behavior (instinct) is performed correctly the first time without prior experience.", correct: "B" },
        { q: "A rapid, involuntary response to a specific stimulus is known as a:", options: ["Taxis", "Kinesis", "Reflex", "Fixed Action Pattern"], exp: "Reflexes are the simplest form of innate behavior involving a sensory and motor neuron.", correct: "C" },
        { q: "Which type of learning occurs during a specific 'critical period' early in an animal's life?", options: ["Habituation", "Imprinting", "Classical conditioning", "Trial and error"], exp: "Imprinting is irreversible learning that occurs during a sensitive period (e.g., ducklings following a mother).", correct: "B" },
        { q: "If an animal stops responding to a repeated stimulus that carries no reward or punishment, it is showing:", options: ["Sensitization", "Habituation", "Insight", "Conditioning"], exp: "Habituation allows animals to ignore irrelevant stimuli to save energy.", correct: "B" },
        { q: "Ivan Pavlov’s experiments with dogs and bells are the classic example of:", options: ["Operant conditioning", "Classical conditioning", "Insight learning", "Latent learning"], exp: "Classical conditioning involves associating an arbitrary stimulus with a physiological reward.", correct: "B" },
        { q: "B.F. Skinner is associated with which type of learning where behavior is modified by consequences?", options: ["Classical conditioning", "Operant conditioning", "Imprinting", "Taxis"], exp: "Operant conditioning (trial-and-error) involves rewards (reinforcements) or punishments.", correct: "B" },
        { q: "The ability to solve a new problem by applying previous experiences in a different context is:", options: ["Insight learning", "Habituation", "Latent learning", "Imprinting"], exp: "Insight learning is the most complex form of learning, common in primates and humans.", correct: "A" },
        { q: "A 'Fixed Action Pattern' (FAP) is triggered by an external sensory stimulus called a:", options: ["Conditioned stimulus", "Sign stimulus", "Reinforcer", "Proxy"], exp: "A sign stimulus (or releaser) initiates a FAP, which is then carried to completion.", correct: "B" },
        { q: "The waggle dance performed by honeybees is a form of communication to indicate:", options: ["The presence of a predator", "The location of a food source", "The death of a queen", "The need for a new hive"], exp: "The dance communicates the distance and direction of nectar relative to the sun.", correct: "B" },
        { q: "Non-directional movement in response to a stimulus (e.g., woodlice moving faster in dry areas) is:", options: ["Taxis", "Kinesis", "Migration", "Imprinting"], exp: "Kinesis is a change in speed or rate of turning, whereas taxis is a directed movement toward or away from a stimulus.", correct: "B" },
        { q: "Behavior that reduces an individual's fitness but increases the fitness of others in the population is:", options: ["Agonistic behavior", "Altruism", "Territoriality", "Dominance hierarchy"], exp: "Altruism is common in social insects and kin selection scenarios.", correct: "B" },
        { q: "Which of the following is a 'Learned' behavior?", options: ["Knee-jerk reflex", "Suckling in human infants", "A bird building its first nest", "A dog sitting on command"], exp: "Obedience to commands is acquired through operant conditioning (training).", correct: "D" },
        { q: "Social rank within a group that determines access to resources is called a:", options: ["Territory", "Dominance hierarchy", "Niche", "Lek"], exp: "Pecking orders or hierarchies reduce constant fighting within a social group.", correct: "B" },
        { q: "Male stickleback fish attacking anything with a red underside is an example of:", options: ["Insight", "Fixed Action Pattern", "Operant conditioning", "Habituation"], exp: "The red color acts as a sign stimulus that triggers a programmed aggressive response.", correct: "B" },
        { q: "Learning that occurs without any obvious reward but is manifested later is called:", options: ["Latent learning", "Classical conditioning", "Habituation", "Imprinting"], exp: "Latent learning occurs as an animal explores its environment (e.g., rats learning a maze layout without food).", correct: "A" },
        { q: "An animal moving directly toward a light source is showing:", options: ["Negative phototaxis", "Positive phototaxis", "Photokinesis", "Photoperiodism"], exp: "Taxis is directional; 'positive' indicates movement toward the stimulus.", correct: "B" },
        { q: "Circadian rhythms are biological cycles that occur roughly every:", options: ["12 hours", "24 hours", "7 days", "28 days"], exp: "Circadian rhythms are internal clocks synchronized with the day/night cycle.", correct: "B" },
        { q: "The sacrifice of a worker bee to protect the hive is an example of:", options: ["Kin selection", "Mutualism", "Parasitism", "Interspecific competition"], exp: "Kin selection explains altruistic behavior that helps related individuals survive.", correct: "A" },
        { q: "Agonistic behavior is typically related to:", options: ["Mating rituals only", "Conflict over resources or mates", "Food gathering", "Parental care"], exp: "Agonistic behavior involves threats or combat to settle disputes over territory or mates.", correct: "B" },
        { q: "Which of the following is NOT an advantage of living in a social group?", options: ["Increased protection from predators", "Easier to find mates", "Reduced spread of disease", "Division of labor"], exp: "Large groups actually increase the risk of disease and parasite transmission.", correct: "C" }
    ];

    function loadQuiz() {
        const container = document.getElementById('questionsContainer');
        behaviorData.forEach((data, index) => {
            const qDiv = document.createElement('div');
            qDiv.className = 'question';
            qDiv.innerHTML = `
                <div class="q-text">${index + 1}. ${data.q}</div>
                <div class="options">
                    ${data.options.map((opt, i) => `
                        <div class="option" onclick="selectOption(this, ${index}, '${String.fromCharCode(65 + i)}')">
                            ${String.fromCharCode(65 + i)}. ${opt}
                        </div>
                    `).join('')}
                </div>
                <div class="explanation" id="exp-${index}"><strong>Explanation:</strong> ${data.exp}</div>
            `;
            container.appendChild(qDiv);
        });
    }

    let userAnswers = {};
    function selectOption(el, qIndex, val) {
        const parent = el.parentElement;
        Array.from(parent.children).forEach(child => child.classList.remove('selected'));
        el.classList.add('selected');
        userAnswers[qIndex] = val;
    }

    function calculateScore() {
        let score = 0;
        behaviorData.forEach((data, index) => {
            document.getElementById(`exp-${index}`).style.display = 'block';
            const options = document.querySelectorAll(`.question:nth-child(${index + 1}) .option`);
            options.forEach((opt, i) => {
                const letter = String.fromCharCode(65 + i);
                if (letter === data.correct) opt.classList.add('correct');
                if (userAnswers[index] === letter && letter !== data.correct) opt.classList.add('wrong');
            });
            if (userAnswers[index] === data.correct) score++;
        });

        const resultsDiv = document.getElementById('results');
        resultsDiv.style.display = 'block';
        document.getElementById('scoreText').innerText = `Your Score: ${score} / ${behaviorData.length}`;
        window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
    }
    loadQuiz();
</script>

</body>
</html>
