    { q: "Hydrolysis process is a reverse of process:", options: ["Photolysis", "Condensation", "Deduction", "Convection"], correct: "B", source: "KIPS", exp: "Hydrolysis is essentially reverse of condensation. Hydrolysis breaks down polymers into monomers by adding water, while condensation joins monomers by removing water." },

    { q: "The four types of fundamental biological molecules present in protoplasm are carbohydrates, proteins, lipids and:", options: ["Enzymes", "Hormones", "Nucleic acids", "Alkaloids"], correct: "C", source: "ETEA-2022", exp: "The four fundamental biological molecules are carbohydrates, proteins, lipids, and nucleic acids. They play different roles in living organisms." },
    { q: "The most abundant element present in human body is:", options: ["Sulphur", "Nitrogen", "Carbon", "Manganese"], correct: "C", source: "ETEA-2022", exp: "Carbon is the most abundant element in the human body by mass after oxygen. It forms the backbone of all organic molecules." },
    { q: "If water has high latent heat of vaporization, how this property of water could be helpful to plants and animals?", options: ["With the release of large amount of water vapors, a small amount of heat loss can take place", "No cooling effect with the release of even large amount of water vapors", "It will keep their temperature very high", "With the release of small amount of water vapors, a great amount of heat loss can take place"], correct: "D", source: "MDCAT-2019", exp: "Water absorbs much heat as it changes from liquid to gas. Evaporation of only a small amount of water causes significant cooling, helping organisms regulate body temperature." },
    { q: "Which property of water helps to maintain the integrity of lipid membranes?", options: ["Specific heat capacity", "Cohesion and adhesion", "Hydrogen bonding", "Hydrophobic exclusion"], correct: "D", source: "PMC-2020", exp: "Hydrophobic exclusion forces non-polar molecules (like lipid tails) to cluster together, away from water. This maintains the integrity of lipid bilayers." },
    { q: "Water acts as universal solvent because of:", options: ["Heat of vaporization", "High polarity", "Hydrogen bonding", "Cohesion and adhesion"], correct: "B", source: "PMC-2020", exp: "Water's high polarity allows it to dissolve many ionic and polar substances. The partial positive and negative charges attract and surround solutes." },
    { q: "Human bone cells contain ___ % of water:", options: ["20", "30", "85", "90"], correct: "A", source: "UHS-2022", exp: "Water content varies in different tissues. Bone cells contain about 20% water, while brain cells contain 85-90% water." },

    { q: "Which of the following molecules would yield glucose and fructose on hydrolysis?", options: ["Starch", "Lactose", "Sucrose", "Maltose"], correct: "C", source: "NUMS-2022", exp: "Sucrose is a disaccharide composed of glucose and fructose. On hydrolysis, it breaks down into its two monosaccharide units." },
    { q: "Which property of water enables it to act as temperature stabilizer in living organisms?", options: ["High polarity", "Being non-polar", "High specific heat capacity", "High heat of vaporization"], correct: "C", source: "SZABMU-2022", exp: "Water has great ability to absorb heat with minimum change in its own temperature due to higher specific heat capacity and act as thermo-stabilizer." },
    { q: "Which of the following is antagonistic to condensation?", options: ["Decarboxylation", "Hydration", "Dehydration", "Hydrolysis"], correct: "D", source: "BUMHS-2022", exp: "Condensation is reverse of hydrolysis. During condensation, two monomers join to form a dimer. In hydrolysis, polymers are broken down into their monomers." },
    { q: "Water is the most abundant compound in living organisms; its amount varies from:", options: ["30% to 60%", "50% to 60%", "10% to 20%", "70% to 90%"], correct: "D", source: "DUHS-2022", exp: "Water content in living organisms ranges from 70% to 90% depending on the organism and tissue type." },
    { q: "The simplest monosaccharide containing keto group is:", options: ["Glyceraldehyde", "Glucose", "Dihydroxyacetone", "Ribose"], correct: "C", source: "MDCAT-2014", exp: "Dihydroxyacetone is the simplest three-carbon ketose sugar containing a keto group. Glyceraldehyde is an aldose." },
    { q: "The compounds which, on hydrolysis, yield polyhydroxy aldehyde or ketone subunits are:", options: ["Lipids", "Polynucleotides", "Proteins", "Carbohydrates"], correct: "D", source: "MDCAT-2016", exp: "Carbohydrates are polyhydroxy aldehydes or ketones or complex substances which on hydrolysis yield polyhydroxy aldehyde or ketone subunits." },
    { q: "Which of the following type of carbohydrates has high molecular weight and is sparingly soluble in water?", options: ["Monosaccharide", "Oligosaccharides", "Disaccharides", "Polysaccharides"], correct: "D", source: "MDCAT-2017", exp: "Polysaccharides are made up of many monosaccharide subunits and have higher molecular weight. They are sparingly soluble in water compared to monosaccharides." },
    { q: "Glycosidic bond is formed by the:", options: ["Removal of water", "Removal of oxygen", "Addition of oxygen", "Addition of water"], correct: "A", source: "MDCAT-2018", exp: "A glycosidic bond is formed between two monosaccharides by a condensation reaction, which involves the removal of a water molecule." },
    { q: "Starch is present in tuber, fruits and grains but absent in animal cells. Instead, animals have a substance stored in liver and muscles known as:", options: ["Glucose", "Galactose", "Glycogen", "Fructose"], correct: "C", source: "MDCAT-2019", exp: "Glycogen is animal starch found in liver and muscle cells, while starch is stored in plant cells." },
    { q: "The covalent bond or bridge between two monosaccharides to form a disaccharide is called a:", options: ["Carbohydral bond", "Hydrogen bond", "Hydroxy bond", "Glycosidic bond"], correct: "D", source: "MDCAT-2019", exp: "The bond formed between two monosaccharides to form a disaccharide is called a glycosidic bond, created through a condensation reaction." },
    { q: "Which is an example of a disaccharide?", options: ["Lactose", "Starch", "Glycogen", "Cellulose"], correct: "A", source: "MDCAT-2019", exp: "Lactose is a disaccharide composed of glucose and galactose. Starch, glycogen, and cellulose are polysaccharides." },
    { q: "___ is stored in animal cells:", options: ["Starch", "Cellulose", "Sucrose", "Glycogen"], correct: "D", source: "ETEA-2019", exp: "Glycogen is the storage form of carbohydrates in animal cells (muscles and liver). Starch is stored in plants." },
    { q: "Pure form of cellulose is:", options: ["Cotton", "Chitin", "Cellophane", "Paper"], correct: "A", source: "AJK-2019", exp: "Cotton is the purest natural form of cellulose, consisting of about 90% cellulose. Cellophane and paper are derived from cellulose." }
,

    { q: "C₅H₁₀O₄ is the formula of:", options: ["Deoxyribose sugar", "Ribose sugar", "Glucose", "Fructose"], correct: "A", source: "AJK-2019", exp: "C₅H₁₀O₄ is the molecular formula of deoxyribose sugar, which is a pentose sugar found in DNA." },
    { q: "Monosaccharides have a general formula represented by:", options: ["Cn(H₂O)n", "Cn(H₂O)n-1", "Cn(H₂O)n+1", "Cn(H₂O)2n"], correct: "A", source: "PMC-2020", exp: "Monosaccharides have the general formula Cn(H₂O)n, where n is typically 3, 4, 5, 6, or 7." },
    { q: "___ are the major sites for the storage of glycogen in an animal's body:", options: ["Muscle and liver", "Around the ribs and belly", "Around the ribs and belly", "Liver and kidneys"], correct: "A", source: "MDCAT-2017", exp: "Glycogen is abundantly stored in muscle and liver cells of animal tissue. It is called animal starch." },
    { q: "Chitin is a:", options: ["Lipoprotein", "Polysaccharide", "Glycoprotein", "Phospholipid"], correct: "B", source: "ETEA-2019", exp: "Chitin is a nitrogen-containing polysaccharide. It is the component of fungal cell walls and exoskeleton of insects." },
    { q: "Which of the following is not a carbohydrate?", options: ["Glucose", "Sucrose", "Rhamnose", "Lactic acid"], correct: "D", source: "NUMS-2023", exp: "Lactic acid contains a carboxyl group and shows acidic behavior. Glucose, sucrose, and rhamnose are carbohydrates." },
    { q: "Upon initial hydrolysis, starch yields:", options: ["Maltose", "Glucose", "Sucrose", "Mannose"], correct: "A", source: "UHS-2022", exp: "When amylase breaks down starch, it is first converted into maltose (a disaccharide). Then maltose is further broken down into glucose molecules." },
    { q: "Butyric acid is a ___ carbon fatty acid:", options: ["6", "2", "4", "8"], correct: "C", source: "UHS-2022", exp: "Butyric acid contains 4 carbon atoms. It is a saturated short-chain fatty acid found in butter." },
    { q: "Which bond is the potential source of chemical energy for cellular activities?", options: ["C=O", "C-H", "C-R", "C-N"], correct: "B", source: "SZABMU-2022", exp: "C-H bond is the potential source of chemical energy for cellular respiration. Breakdown of these bonds releases energy for cellular activities." },
    { q: "Which of the following carbohydrates are the sweetest among all?", options: ["Monosaccharides", "Disaccharides", "Oligosaccharides", "Polysaccharides"], correct: "A", source: "SZABMU-2022", exp: "Monosaccharides are the sweetest among all carbohydrates. Fructose has a ketone functional group that gives a sweet taste when dissolved in water." },
    { q: "Ribose is a pentose sugar (5-carbon) that contains:", options: ["Aldehyde group", "Ketone group", "Carboxyl group", "Ester group"], correct: "A", source: "ETEA-2022", exp: "Ribose is an aldopentose sugar containing an aldehyde group. It is a component of RNA." },
    { q: "Diastase/amylase acts on:", options: ["Maltose", "Sucrose", "Lactose", "Starch"], correct: "D", source: "BUMHS-2022", exp: "Diastase or amylase breaks starch into maltose. This maltose is further broken down by maltase into glucose molecules." },
    { q: "Maltose is a:", options: ["Polysaccharide", "Disaccharide", "Oligosaccharide", "Monosaccharide"], correct: "B", source: "BUMHS-2022", exp: "Maltose is a disaccharide consisting of two glucose molecules bonded by a single glycosidic bond." },
    { q: "Synthesis of disaccharide by condensation of two glucose joined by glycosidic linkage to form:", options: ["Galactose", "Lactose", "Fructose", "Maltose"], correct: "D", source: "DUHS-2022", exp: "When two glucose molecules are bonded by a glycosidic linkage, the resultant structure is maltose." },
    { q: "Molecules of amylose consists of unbranched chains of hundreds of glucose subunits, joined together by:", options: ["1-2 glycosidic linkage", "2-3 glycosidic linkage", "1-4 glycosidic linkage", "1-3 glycosidic linkage"], correct: "C", source: "DUHS-2022", exp: "Amylose is an unbranched chain of glucose subunits connected by α-1,4 glycosidic linkages." },
    { q: "Which level of protein structure maintains the helix shape of enzymes?", options: ["Primary", "Secondary", "Tertiary", "Quaternary"], correct: "B", source: "LUMHS-2014", exp: "Secondary structure of proteins (α-helix and β-pleated sheet) is maintained by hydrogen bonds between amino acids." },
    { q: "Enzymes are molecules of one of the following group of biomolecules. Mark the correct answer which can also be defined as a biological catalyst:", options: ["Protein", "Fats", "Carbohydrate", "Vitamins"], correct: "A", source: "KMDC-2014", exp: "Most enzymes are proteins in nature that act as biological catalysts to speed up chemical reactions." },

    { q: "Secondary structure of protein is found in:", options: ["Trypsin", "Insulin", "Keratin", "Glucagon"], correct: "C", source: "MDCAT-2016", exp: "Keratin is a fibrous protein having secondary structure (α-helix) and is mostly found in nails and hair." },
    { q: "The number of amino acids that have been found to occur in cells and tissues are:", options: ["170", "25", "20", "45"], correct: "A", source: "MDCAT-2017", exp: "About 170 types of amino acids have been found to occur in cells and tissues. Of these, about 25 are constituents of proteins, and most proteins are made of 20 types." },
    { q: "Backbone of amino acid comprises of:", options: ["C-C-N", "-NH₂ Group", "-COOH group", "-H group"], correct: "A", source: "MDCAT-2017", exp: "The backbone of an amino acid consists of a central carbon (C) bonded to an amino group (-NH₂) and a carboxyl group (-COOH), forming the C-C-N backbone." }
,
		
		
	
	
	    { q: "Which of the following holds the alpha helix of protein in its place?", options: ["Hydrogen bond", "R-group", "Amino group", "Disulphide bond"], correct: "A", source: "MDCAT-2018", exp: "The α-helix is a very uniform geometric structure with 3.6 amino acids in each turn. The helical structure is kept by the formation of hydrogen bonds among the amino acid molecules in successive turns of the spiral." },

    let userSelections = {};
    let quizSubmitted = false;
    let submitBtn = null;

    function loadQuiz() {
        quizSubmitted = false;
        const container = document.getElementById('questionsContainer');
        if (!container) return;
        container.innerHTML = '';
        userSelections = {};

        submitBtn = document.getElementById('submitBtn');
        if (submitBtn) {
            submitBtn.textContent = 'Submit';
            submitBtn.classList.remove('submitted');
            submitBtn.style.pointerEvents = 'auto';
        }

        const resultsDiv = document.getElementById('results');
        if (resultsDiv) resultsDiv.style.display = 'none';

        const totalSpan = document.getElementById('totalQuestions');
        if (totalSpan) totalSpan.textContent = `Total Questions: ${bioMcqs.length}`;

        bioMcqs.forEach((item, idx) => {
            const qDiv = document.createElement('div');
            qDiv.className = 'question';
            qDiv.setAttribute('data-qidx', idx);
            qDiv.innerHTML = `
                <div class="q-text">${idx + 1}. ${item.q}
                    <span class="source-badge" style="display:none;">${item.source}</span>
                </div>
                <div class="options">
                    ${item.options.map((opt, optIdx) => {
                        const letter = String.fromCharCode(65 + optIdx);
                        return `<div class="option" data-letter="${letter}" onclick="selectOption(this, ${idx}, '${letter}')">${letter}. ${opt}</div>`;
                    }).join('')}
                </div>
                <div class="explanation" id="exp-${idx}"><strong>Explanation:</strong> ${item.exp}</div>
            `;
            container.appendChild(qDiv);
        });
    }

    window.selectOption = function(el, qIndex, val) {
        if (quizSubmitted) return;
        const parentOptions = el.parentElement;
        Array.from(parentOptions.children).forEach(child => child.classList.remove('selected'));
        el.classList.add('selected');
        userSelections[qIndex] = val;
    };

    window.calculateScore = function() {
        if (quizSubmitted) return;
        quizSubmitted = true;

        if (submitBtn) {
            submitBtn.textContent = 'Submitted';
            submitBtn.classList.add('submitted');
            submitBtn.style.pointerEvents = 'none';
        }

        let score = 0;

        bioMcqs.forEach((data, idx) => {
            const expDiv = document.getElementById(`exp-${idx}`);
            if (expDiv) expDiv.style.display = 'block';
            const questionDiv = document.querySelector(`.question[data-qidx="${idx}"]`);
            if (!questionDiv) return;
            const allOpts = questionDiv.querySelectorAll('.option');
            const correctLetter = data.correct;
            allOpts.forEach(opt => {
                const letter = opt.getAttribute('data-letter');
                if (letter === correctLetter) opt.classList.add('correct');
                if (userSelections[idx] && userSelections[idx] === letter && letter !== correctLetter) {
                    opt.classList.add('wrong');
                }
            });
            if (userSelections[idx] && userSelections[idx] === data.correct) {
                score++;
            }
        });

        const allOptions = document.querySelectorAll('.option');
        allOptions.forEach(opt => {
            opt.style.pointerEvents = 'none';
        });

        const percent = Math.round((score / bioMcqs.length) * 100);
        const scoreCard = document.getElementById('scoreText');
        scoreCard.innerHTML = `Score: ${score} / ${bioMcqs.length}  |  ${percent}%`;
        document.getElementById('results').style.display = 'block';

        setTimeout(() => { document.getElementById('results').scrollIntoView({ behavior: 'smooth', block: 'start' }); }, 100);
    };

    loadQuiz();
</script>
