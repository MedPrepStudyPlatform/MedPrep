<script>
    // =================================================================
    // PASTE YOUR MCQ ARRAY HERE (SECTION BY SECTION)

    // =================================================================
    const cellMcqs = [
        
		
			
    { q: "Out of the given options, choose the one which shows the structures found only in plants:", options: ["Vacuole, chloroplast, ribosomes", "Chloroplast, cell wall, large vacuole", "Chloroplast, microtubules, peroxisomes", "Chloroplast, cell wall, mitochondria"], correct: "B", source: "MDCAT-2016", exp: "Chloroplast, cell wall and large central vacuole are absent in animal cells but present in plant cells." },
    { q: "Which features do animal cells share with plant cells? (Table: Chloroplast, Cytoplasm, Nucleus, Mitochondria)", options: ["Chloroplast, Cytoplasm, Nucleus, Mitochondria", "Cytoplasm, Nucleus, Mitochondria", "Cytoplasm, Nucleus", "Nucleus, Mitochondria"], correct: "B", source: "MDCAT-2016", exp: "Chloroplast is not present in animal cells, while cytoplasm, nucleus and mitochondria are present in both." },
    { q: "Select the organelle which is only present in animal cells:", options: ["Centrioles", "Microtubules", "R.E.R", "Ribosomes"], correct: "A", source: "MDCAT-2017", exp: "Centrioles are present only in animal cells and help in spindle formation during cell division." },
    { q: "Which of the following structure is present in both plant and animal cells but is absent in prokaryotic cells?", options: ["Centrioles", "Plastids", "Microtubule", "Sieve tubes"], correct: "C", source: "MDCAT-2017", exp: "Microtubules are present in eukaryotic cells (both plant and animal) but absent in prokaryotes." },
    { q: "In which type of cells, cell wall is not present?", options: ["Plant cells", "Bacterial cells", "Fungal cells", "Liver cells"], correct: "D", source: "PMC-2020", exp: "Liver cells are animal cells; they lack a cell wall and have only a plasma membrane." },
    { q: "Cell wall may be absent in which of the following?", options: ["Plant and algae", "Algae and fungi", "Fungi and archaea", "Bacteria and archaea"], correct: "D", source: "UHS-2022", exp: "Some bacteria and archaea (like Mycoplasma) lack cell walls." },
    { q: "The cell wall of bacteria is made up of:", options: ["Chitin", "Murein", "Cellulose", "Hemicellulose"], correct: "B", source: "UHS-2022", exp: "Bacterial cell wall contains peptidoglycan (murein) - a polymer of sugars and amino acids." },
    { q: "Which of the following is correct for cell wall?", options: ["Semi-permeable", "Differentially permeable", "Permeable", "Not permeable"], correct: "C", source: "NUMS-2022", exp: "Cell wall is completely permeable to water and solutes because it has pores." },
    { q: "Chemically, cell wall of fungi is made up of:", options: ["Cellulose", "Lignin", "Chitin", "Murein"], correct: "C", source: "SZABMU-2022", exp: "Fungal cell walls are composed of chitin, a nitrogen-containing polysaccharide." },
    { q: "Cell without cell wall would burst in:", options: ["Hypotonic solution", "Hypertonic solution", "Isotonic solution", "Solution having more electrolytes"], correct: "A", source: "BUMHS-2021", exp: "In hypotonic solution, water enters the cell by osmosis causing it to swell and burst (lysis)." },
    { q: "Plant cell wall is mainly made up of:", options: ["Lignin", "Murein", "Cutin", "Cellulose"], correct: "D", source: "DUHS-2023", exp: "Primary cell wall is chiefly composed of cellulose along with pectin and hemicellulose." },
    { q: "Cell become dead due to the deposition of:", options: ["Cellulose", "Cutin", "Chitin", "Lignin"], correct: "D", source: "DUHS-2022", exp: "Lignin deposition in secondary cell wall makes it thick and the cell loses its protoplasm, becoming dead." },
    { q: "The intake of liquid materials across the cell membrane is:", options: ["Phagocytosis", "Pinocytosis", "Endocytosis", "Exocytosis"], correct: "B", source: "MDCAT-2016", exp: "Pinocytosis is the ingestion of liquid material into a cell by budding of small vesicles." },
    { q: "Which statement best describes the fluid mosaic model of membrane structure?", options: ["Proteins and lipids form a lipoprotein bilayer", "Phospholipid bilayer with embedded proteins that can move", "Triglyceride bilayer with embedded proteins", "Proteins form a layer over the lipid bilayer"], correct: "B", source: "MDCAT-2017", exp: "Fluid mosaic model describes proteins embedded in a fluid lipid bilayer that allows lateral movement." },
    { q: "Phagocytosis is:", options: ["Cell drinking", "Cell eating", "Cell division", "Cell movement"], correct: "B", source: "MDCAT-2018", exp: "Phagocytosis is the engulfment of large solid particles by the cell membrane, also known as 'cell eating'." },
    { q: "The process by which damaged organelles are digested by the cell is called:", options: ["Phagocytosis", "Pinocytosis", "Autophagy", "Exocytosis"], correct: "C", source: "PMC-2020", exp: "Autophagy is the natural mechanism where the cell removes unnecessary or dysfunctional components using lysosomes." },
    { q: "Passive transport of molecules across the cell membrane includes:", options: ["Osmosis, diffusion and facilitated diffusion", "Endocytosis and exocytosis", "Active transport only", "Phagocytosis only"], correct: "A", source: "MDCAT-2021", exp: "Osmosis, diffusion and facilitated diffusion are passive processes requiring no energy." },
    { q: "All of the following are functions of cell membrane except:", options: ["Protection of cytoplasm", "Regulating passage of molecules", "Protein synthesis", "Cellular communication"], correct: "C", source: "MDCAT-2021", exp: "Protein synthesis is the function of ribosomes, not the cell membrane." },
    { q: "The hydrophobic portion of plasma membrane is present:", options: ["Towards extracellular matrix", "Inner core of plasma membrane", "Towards cytoplasm", "Towards the cytoskeleton"], correct: "B", source: "MDCAT-2020", exp: "The hydrophobic fatty acid tails are oriented toward the inner core of the bilayer." },
    { q: "Which molecules do not contribute to the formation of biological membranes?", options: ["Glycerophospholipids", "Glycerolipids", "Phospholipids", "Nucleoproteins"], correct: "D", source: "NUMS-2022", exp: "Nucleoproteins are not involved in cell membrane formation; they are found in chromosomes." },
    { q: "A group of ribosomes attached to mRNA is known as polysome and the attachment is controlled by:", options: ["Na+", "Mg2+", "Cu2+", "K+"], correct: "B", source: "NUMS-2022", exp: "Mg2+ ions stabilize ribosomal subunits and facilitate binding to mRNA to form polysomes." },
    { q: "Adenylate cyclase in the cell membrane acts as:", options: ["Channel protein", "Carrier protein", "Enzyme", "Receptor"], correct: "C", source: "SZABMU-2022", exp: "Adenylate cyclase is an enzyme that converts ATP to cyclic AMP." },
    { q: "The statement 'the membrane is like a sea of lipids in which proteins are floating' represents:", options: ["Gorter and Grendel model", "Davson and Danielli model", "Robertson model", "Singer and Nicolson model"], correct: "D", source: "ETEA-2022", exp: "Singer and Nicolson's fluid mosaic model describes proteins floating in a sea of lipids." },
    { q: "Facilitated diffusion involves carrier molecules. The carrier molecules are chemically in nature:", options: ["Glycerolipids", "Lipids", "Proteins", "Carbohydrates"], correct: "C", source: "BUMHS-2022", exp: "Carrier molecules involved in facilitated diffusion are proteins." },
    { q: "Who proposed fluid mosaic model?", options: ["Lorenz Oken and Brown", "Robert Brown and Palade", "Singer and Nicolson", "Singer and De-Duve"], correct: "C", source: "BUMHS-2022", exp: "Singer and Nicolson proposed the fluid mosaic model in 1972." },
    { q: "Plasma membrane is:", options: ["Permeable", "Selective permeable", "Impermeable", "Sub-permeable"], correct: "B", source: "DUHS-2022", exp: "Plasma membrane allows only selective substances to pass through (selective permeability)." },
    { q: "Glycolysis is the common stage in both aerobic and anaerobic respiration and it occurs in of the cell:", options: ["Inner membrane of mitochondria", "Mitochondrial matrix", "Chloroplast", "Cytoplasm"], correct: "D", source: "AJK-2019", exp: "Glycolysis occurs in the cytoplasm of the cell." },
    { q: "Which of the following are single membranous organelles?", options: ["Mitochondria and ribosomes", "Cytosol, mitochondria and ribosomes", "Golgi bodies, lysosome and ER", "Golgi bodies, lysosome and mitochondria"], correct: "C", source: "UHS-2022", exp: "Golgi bodies, lysosomes and endoplasmic reticulum are single membrane-bound organelles." },
    { q: "Glycogen, lipid droplets form the most important of the cell:", options: ["Cell organelles", "Cell inclusions", "Cytoplasmic matrix", "Non-membranous organelles"], correct: "B", source: "SZABMU-2022", exp: "Glycogen and lipid droplets are cell inclusions (non-living part of cytoplasm)." },
    { q: "Ribosomes present in prokaryotes are:", options: ["80S", "50S", "60S", "70S"], correct: "D", source: "MDCAT-2017, MDCAT-2019", exp: "Prokaryotes have 70S ribosomes; eukaryotes have 80S ribosomes." },
    { q: "Group of ribosomes attached to mRNA is called:", options: ["Polypeptide", "Polynucleotide", "Polysome", "Polysaccharide"], correct: "C", source: "MDCAT-2017", exp: "A group of ribosomes attached to mRNA is called a polysome or polyribosome." },



    { q: "Which of the following organelle consist of two subunits?", options: ["Golgi body", "Ribosome", "Mitochondria", "Plastid"], correct: "B", source: "MDCAT-2017", exp: "Ribosomes are composed of a large and a small subunit." },
    { q: "Ribosomes are made up of:", options: ["RNA and proteins", "RNA and carbohydrates", "RNA and lipids", "Proteins and carbohydrate"], correct: "A", source: "MDCAT-2018", exp: "Ribosomes are ribonucleoprotein particles (rRNA + ribosomal proteins)." },
    { q: "The cytoplasmic organelle commonly found both in prokaryotes and eukaryotes is:", options: ["Flagellum", "Ribosome", "Mitochondria", "Nucleoid"], correct: "B", source: "AJK-2019", exp: "Ribosomes are non-membranous organelles present in both prokaryotes and eukaryotes." },
    { q: "70S sized ribosomes are found in the cells of:", options: ["Algae", "Protozoans", "Fungi", "Bacteria"], correct: "D", source: "PMC-2020", exp: "70S ribosomes are found in bacteria and also in mitochondria and chloroplasts." },
    { q: "Within the nucleus, are made by the nucleolus:", options: ["Ribosomes", "mRNA", "Proteins", "Enzymes"], correct: "A", source: "NUMS-2022", exp: "Nucleolus is the site of rRNA synthesis and ribosomal subunit assembly." },
    { q: "Which one of the following cell structures is involved in the synthesis of lipids?", options: ["Endoplasmic reticulum", "Centriole", "Golgi complex", "Mitochondria"], correct: "A", source: "MDCAT-2015", exp: "Smooth endoplasmic reticulum is involved in lipid synthesis." },
    { q: "Nuclear membrane is continuous with:", options: ["Endoplasmic reticulum", "Lysosome", "Golgi Body", "Peroxisome"], correct: "A", source: "MDCAT-2017", exp: "Nuclear envelope is continuous with the endoplasmic reticulum." },
    { q: "Smooth endoplasmic reticulum is responsible for the metabolism of:", options: ["Carbohydrates", "Nucleic acids", "Proteins", "Lipids"], correct: "D", source: "MDCAT-2019", exp: "SER is responsible for lipid metabolism, detoxification and calcium storage." },
    { q: "Select the one which is not a function of smooth endoplasmic reticulum:", options: ["Metabolism of lipids", "Transport of materials", "Transmission of impulses", "Processing of glycoproteins"], correct: "D", source: "PMC-2020", exp: "Processing of glycoproteins is a function of Golgi apparatus, not SER." },
    { q: "The organelle which provides neurotransmitters in the nervous pathway is:", options: ["Glycosome", "Peroxisome", "Golgi apparatus", "Endoplasmic reticulum"], correct: "C", source: "SZABMU-2022", exp: "Golgi apparatus packages neurotransmitters into synaptic vesicles." },
    { q: "The cisternae break up into vesicles from of Golgi complex:", options: ["Convex, forming face", "Convex, maturing face", "Concave, forming face", "Concave, maturing face"], correct: "D", source: "MDCAT-2018", exp: "Vesicles bud off from the concave (maturing) face of Golgi complex." },
    { q: "Which cell organelle is responsible for cell secretion?", options: ["Mitochondrion", "Ribosomes", "Chloroplast", "Golgi body"], correct: "D", source: "MDCAT-2014, 2019", exp: "Golgi apparatus processes and packages secretory proteins for release." },
    { q: "Which of the following organelles are involved in the synthesis of plant cell wall?", options: ["Endoplasmic reticulum", "Lysosomes", "Golgi complex", "Peroxisomes"], correct: "C", source: "PMC-2020", exp: "Golgi vesicles fuse to form the cell plate during plant cell cytokinesis." },
    { q: "Which organelles would be more abundant in a secretory cell than non-secretory cell?", options: ["Lysosomes", "Golgi complex", "Vacuoles", "Centrioles"], correct: "B", source: "NUMS-2022", exp: "Secretory cells have abundant Golgi complexes for protein modification and packaging." },
    { q: "When and who discovered Golgi apparatus?", options: ["1888-Camillo Golgi", "1898-Camillo Golgi", "1988-Camillo Golgi", "1998-Camillo Golgi"], correct: "B", source: "BUMHS-2022", exp: "Camillo Golgi discovered the Golgi apparatus in 1898." },
    { q: "Which of the following cell does not possess Golgi apparatus?", options: ["Bacterial cell", "Animal cell", "Plant cell", "Fungal cell"], correct: "A", source: "BUMHS-2022", exp: "Bacteria are prokaryotes and lack membrane-bound organelles like Golgi apparatus." },
    { q: "These structures are involved in the breakdown of old organelles:", options: ["Leucoplasts", "Glyoxysomes", "Lysosomes", "Peroxisomes"], correct: "C", source: "MDCAT-2018", exp: "Lysosomes digest old organelles through the process of autophagy." },
    { q: "The digestive vacuoles and autophagosomes are also known as:", options: ["Phagocytosis", "Primary lysosomes", "Secondary lysosomes", "Peroxisomes"], correct: "C", source: "UHS-2022", exp: "Secondary lysosomes are formed by fusion of primary lysosomes with phagosomes or autophagosomes." },
    { q: "are spherical sacs surrounded by a single membrane and contain hydrolytic enzymes:", options: ["Mitochondria", "Golgi bodies", "Lysosomes", "Chloroplast"], correct: "C", source: "NUMs-2022", exp: "Lysosomes are single membrane-bound organelles containing hydrolytic enzymes." },
    { q: "Intracellular digestion of food is done by the organelle:", options: ["Vacuole", "Lysosome", "Golgi apparatus", "Ribosome"], correct: "B", source: "SZABMU-2022", exp: "Lysosomes are responsible for intracellular digestion of engulfed food particles." },
    { q: "Which statement is correct about mitochondria and chloroplast?", options: ["Chloroplast and mitochondria cannot live independently", "70S ribosome is attached with the inner membrane", "Chloroplast and mitochondria are single membrane structure", "Number of mitochondria and chloroplast are same in all cells"], correct: "A", source: "MDCAT-2018", exp: "Both are semi-autonomous but cannot survive outside the cell." },
    { q: "The chloroplasts contain:", options: ["Proteins only", "Ribosomes only", "Small circular DNA only", "Proteins, Ribosomes and small circular DNA"], correct: "D", source: "ETEA-2022", exp: "Chloroplasts contain proteins, 70S ribosomes and circular DNA." },
    { q: "Presence of large central vacuole is the characteristic of:", options: ["Prokaryotes", "Fungi", "Protists", "Plants"], correct: "D", source: "MDCAT-2016", exp: "Large central vacuole is a characteristic feature of plant cells." },
    { q: "Which of these is solely present in plant cell only?", options: ["Peroxisomes", "Smooth endoplasmic reticulum", "Cytoskeleton", "Central vacuole"], correct: "D", source: "AJK-2019", exp: "Large central vacuole is unique to plant cells." },
    { q: "The membrane separating the vacuole from cytoplasm is called:", options: ["Cristae", "Tonoplast", "Cisternae", "Vacuolar membrane"], correct: "B", source: "MDCAT-2018, PMC-2020", exp: "Tonoplast is the single membrane that surrounds the vacuole." },





    { q: "Which organelle is bounded by two membranes?", options: ["Ribosome", "Lysosome", "Mitochondria", "Nucleolus"], correct: "C", source: "MDCAT-2015", exp: "Mitochondria have double membranes (outer and inner)." },
    { q: "Functionally, mesosomes can be compared with:", options: ["Ribosomes", "Polysomes", "Mitochondria", "Golgi bodies"], correct: "C", source: "NTS-2018", exp: "Mesosomes in bacteria are involved in cellular respiration, similar to mitochondria." },
    { q: "Which organelle is required for aerobic respiration?", options: ["Plastids", "Mitochondria", "ER", "Nucleus"], correct: "B", source: "MDCAT-2019", exp: "Mitochondria are the site of aerobic respiration (Krebs cycle and ETC)." },
    { q: "The finger like infoldings which are formed by inner membrane of mitochondria are called:", options: ["Matrix", "Cristae", "Porins", "Ribosomes"], correct: "B", source: "DUHS-2022", exp: "Cristae increase surface area for ATP production." },
    { q: "Power house of the cell is:", options: ["Ribosomes", "Endoplasmic reticulum", "Chloroplasts", "Mitochondria"], correct: "D", source: "MDCAT-2017", exp: "Mitochondria produce ATP and are called powerhouse of the cell." },
    { q: "Ribosomal RNA is synthesized in:", options: ["Nucleolus", "Golgi body", "Peroxisome", "Nucleoplasm"], correct: "A", source: "MDCAT-2019", exp: "Nucleolus is the site of rRNA synthesis." },
    { q: "The structure present in a eukaryotic cell but absent in prokaryotic cells is:", options: ["Nucleus", "Ribosomes", "DNA", "Cell surface membrane"], correct: "A", source: "MDCAT-2019", exp: "Prokaryotes lack a membrane-bound nucleus; their genetic material lies in nucleoid region." },
    { q: "The structure which disappears during cell division is:", options: ["Vacuole", "Lysosome", "Nucleolus", "Endoplasmic reticulum"], correct: "C", source: "NUMS-2022", exp: "Nucleolus disappears during prophase and reforms in telophase." },
    { q: "Except during nuclear division, nucleus has the chromosomes in loosely coiled state known as:", options: ["Genes", "Ribosome", "DNA", "Chromatin"], correct: "D", source: "NUMS-2022", exp: "During interphase, chromosomes exist as loosely coiled chromatin." },
    { q: "The colloidal mixture of ions, organic and inorganic salts present in the nucleus is called:", options: ["Nuclear membrane", "Nucleolus", "Nucleoplasm", "Chromosome"], correct: "C", source: "ETEA-2022", exp: "Nucleoplasm is the semi-fluid matrix inside the nucleus." },
    { q: "Peptidoglycan or murein is a special or distinctive feature of cell wall in:", options: ["Algae", "Bacteria", "Fungi", "Plants"], correct: "B", source: "MDCAT-2014", exp: "Bacterial cell walls are characterized by peptidoglycan." },
    { q: "DNA molecule in prokaryotes is:", options: ["Single, circular, double stranded molecule not bound by membrane", "Double, circular molecule", "Linear, double stranded molecule", "Single, circular, double stranded and membrane bound"], correct: "A", source: "MDCAT-2017", exp: "Prokaryotes have a single circular double-stranded DNA in the nucleoid region." },
    { q: "Structure formed by invagination of plasma membrane and involved in cell division and DNA replication of prokaryotic cell:", options: ["Lysosome", "Mesosome", "Golgi bodies", "Phragmoplast"], correct: "B", source: "UHS-2022", exp: "Mesosomes are infoldings of plasma membrane in bacteria involved in DNA replication and respiration." },
    { q: "Which one is common in both prokaryotic and eukaryotic cell?", options: ["Cytoplasmic streaming movement", "Ribosome", "Binary fission", "Nuclear envelope"], correct: "B", source: "UHS-2022", exp: "Ribosomes are present in both cell types." },
    { q: "Secondary cell wall in plants is present:", options: ["Outer to primary cell wall", "In between two primary cell walls", "Between the primary cell wall and plasma membrane", "Inner to plasma membrane"], correct: "C", source: "NUMS-2023", exp: "Secondary cell wall is deposited between primary wall and plasma membrane." },
    { q: "What distinguishes prokaryotic cell wall from fungal cell wall?", options: ["Prokaryotic cell wall contains cellulose", "Prokaryotic cell wall contains peptidoglycan", "Prokaryotic cell wall contains cutin", "Prokaryotic cell wall contains silica"], correct: "B", source: "NUMS-2023", exp: "Prokaryotic cell walls contain peptidoglycan; fungal walls contain chitin." },
    { q: "Which of the following is absent from membrane of prokaryotes?", options: ["Glycolipid", "Cholesterol", "Glycoprotein", "Phospholipid"], correct: "B", source: "MDCAT-2020", exp: "Cholesterol is absent in prokaryotic cell membranes; they regulate fluidity via hopanoids." },
    { q: "Cell membrane also contain through which movement of substances take place by active and passive transport:", options: ["Lipids", "Corner Proteins", "Charged pores", "Carbohydrates"], correct: "C", source: "NUMS-2023", exp: "The cell membrane contains charged pores (channels, carriers and pumps) that allow movement of substances." },
    { q: "According to the fluid mosaic model of cell membrane, which zone is embedded inside?", options: ["Hydrophobic", "Hydrophilic", "Globular", "Filamentous"], correct: "A", source: "NUMS-2023", exp: "In the fluid mosaic model, the hydrophobic region of phospholipid tails is embedded inside the membrane." },

    { q: "Many enzymes are secreted in inactive form to protect:", options: ["Mitochondria", "Vacuole", "Cell membrane", "Nucleus"], correct: "C", source: "ETEA-2023", exp: "Enzymes are secreted in inactive forms to prevent them from damaging the cell membrane before reaching their target site." },

   { q: "Follow the route of pepsinogen secreted by zymogen cells:", options: ["RER - Golgi complex - Secretory vesicles", "RER - SER - Golgi complex - Secretory vesicles", "SER - RER - Golgi complex - Secretory vesicles", "Golgi complex - RER - Secretory vesicles"], correct: "A", source: "NUMS-2024", exp: "Pepsinogen is synthesized on ribosomes of the rough endoplasmic reticulum (RER), transported to the Golgi complex for modification and packaging, and then stored in secretory vesicles for release. The smooth ER (SER) is not involved in this pathway." },

    let userSelections = {};
    let quizSubmitted = false;
    let submitBtn = null;

    function loadQuiz() {
        quizSubmitted = false;
        const container = document.getElementById('questionsContainer');
        if (!container) return;
        container.innerHTML = '';
        userSelections = {};

        submitBtn = document.getElementById('submitBtn');
        if (submitBtn) {
            submitBtn.textContent = 'Submit';
            submitBtn.classList.remove('submitted');
            submitBtn.style.pointerEvents = 'auto';
        }

        const resultsDiv = document.getElementById('results');
        if (resultsDiv) resultsDiv.style.display = 'none';

        // Update total questions count
        const totalSpan = document.getElementById('totalQuestions');
        if (totalSpan) totalSpan.textContent = `Total Questions: ${cellMcqs.length}`;

        cellMcqs.forEach((item, idx) => {
            const qDiv = document.createElement('div');
            qDiv.className = 'question';
            qDiv.setAttribute('data-qidx', idx);
            qDiv.innerHTML = `
                <div class="q-text">${idx + 1}. ${item.q}
                    <span class="source-badge">${item.source}</span>
                </div>
                <div class="options">
                    ${item.options.map((opt, optIdx) => {
                        const letter = String.fromCharCode(65 + optIdx);
                        return `<div class="option" data-letter="${letter}" onclick="selectOption(this, ${idx}, '${letter}')">${letter}. ${opt}</div>`;
                    }).join('')}
                </div>
                <div class="explanation" id="exp-${idx}"><strong>Explanation:</strong> ${item.exp}</div>
            `;
            container.appendChild(qDiv);
        });
    }

    window.selectOption = function(el, qIndex, val) {
        if (quizSubmitted) return;
        const parentOptions = el.parentElement;
        Array.from(parentOptions.children).forEach(child => child.classList.remove('selected'));
        el.classList.add('selected');
        userSelections[qIndex] = val;
    };

    window.calculateScore = function() {
        if (quizSubmitted) return;
        quizSubmitted = true;

        if (submitBtn) {
            submitBtn.textContent = 'Submitted';
            submitBtn.classList.add('submitted');
            submitBtn.style.pointerEvents = 'none';
        }

        let score = 0;

        cellMcqs.forEach((data, idx) => {
            const expDiv = document.getElementById(`exp-${idx}`);
            if (expDiv) expDiv.style.display = 'block';
            const questionDiv = document.querySelector(`.question[data-qidx="${idx}"]`);
            if (!questionDiv) return;
            const allOpts = questionDiv.querySelectorAll('.option');
            const correctLetter = data.correct;
            allOpts.forEach(opt => {
                const letter = opt.getAttribute('data-letter');
                if (letter === correctLetter) opt.classList.add('correct');
                if (userSelections[idx] && userSelections[idx] === letter && letter !== correctLetter) {
                    opt.classList.add('wrong');
                }
            });
            if (userSelections[idx] && userSelections[idx] === data.correct) {
                score++;
            }
        });

        const allOptions = document.querySelectorAll('.option');
        allOptions.forEach(opt => {
            opt.style.pointerEvents = 'none';
        });

        const percent = Math.round((score / cellMcqs.length) * 100);
        const scoreCard = document.getElementById('scoreText');
        scoreCard.innerHTML = `Score: ${score} / ${cellMcqs.length}  |  ${percent}%<br><span style="font-size: 0.9rem;"></span>`;
        document.getElementById('results').style.display = 'block';

        setTimeout(() => { document.getElementById('results').scrollIntoView({ behavior: 'smooth', block: 'start' }); }, 100);
    };

    loadQuiz();
</script>
