<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chemical Coordination: Randomized MDCAT Mock</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Outfit:wght@700&display=swap" rel="stylesheet">
    <style>
        /* Theme: Emerald & Goldenrod */
        body { font-family: 'Inter', sans-serif; background: #f1f8f6; color: #2d3436; padding: 20px; line-height: 1.6; }
        .quiz-container { max-width: 850px; margin: 0 auto; background: white; padding: 40px; border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); border-top: 10px solid #27ae60; }
        h1 { font-family: 'Outfit', sans-serif; color: #27ae60; text-align: center; margin-bottom: 5px; }
        .subtitle { text-align: center; color: #636e72; font-weight: 700; margin-bottom: 35px; text-transform: uppercase; letter-spacing: 1.5px; font-size: 0.9rem; }
        .question { margin-bottom: 35px; padding: 25px; border: 1px solid #dfe6e9; border-radius: 15px; background: #ffffff; }
        .q-text { font-weight: 600; font-size: 1.1rem; margin-bottom: 20px; color: #2c3e50; }
        .options { display: grid; gap: 12px; }
        .option { padding: 16px 20px; border: 2px solid #f1f2f6; border-radius: 12px; cursor: pointer; transition: 0.2s; background: #ffffff; }
        .option:hover { border-color: #27ae60; background: #f0faf4; }
        .option.selected { background: #2d3436; color: white; border-color: #2d3436; }
        .btn-submit { display: block; width: 100%; padding: 20px; background: #27ae60; color: white; border: none; border-radius: 50px; font-weight: 700; font-size: 1.3rem; cursor: pointer; margin-top: 30px; transition: 0.3s; }
        .btn-submit:hover { background: #219150; transform: translateY(-2px); }
        #results { display: none; margin-top: 40px; padding: 30px; border-radius: 20px; text-align: center; background: #2d3436; color: white; }
        .explanation { margin-top: 15px; font-size: 0.95rem; color: #2d3748; display: none; background: #f0faf4; padding: 18px; border-left: 6px solid #27ae60; border-radius: 8px; }
        .correct { border-color: #2ecc71 !important; background: #e8f8f0 !important; color: #145a32; font-weight: bold; }
        .wrong { border-color: #e74c3c !important; background: #fdedec !important; color: #1c2e36; }
    </style>
</head>
<body>

<div class="quiz-container">
    <h1>Chemical Coordination</h1>
    
    
    <form id="quizForm">
        <div id="questionsContainer"></div>
        <button type="button" class="btn-submit" onclick="calculateScore()">Submit</button>
    </form>

    <div id="results">
        <h2 id="scoreText"></h2>
        
    </div>
</div>

<script>
    const chemicalData = [
        { q: "Which of the following is often referred to as the 'Master Gland' of the endocrine system?", options: ["Thyroid", "Adrenal", "Pituitary", "Pancreas"], exp: "The pituitary gland controls several other endocrine glands, though it is itself regulated by the hypothalamus.", correct: "C" },
        { q: "Steroid hormones exert their effect on target cells primarily by:", options: ["Binding to surface receptors", "Entering the nucleus and altering gene expression", "Activating cAMP second messengers", "Inhibiting ion channels"], exp: "Being lipid-soluble, steroids pass through the plasma membrane and bind to intracellular receptors to act as transcription factors.", correct: "B" },
        { q: "Which hormone is responsible for lowering blood glucose levels by promoting cellular uptake?", options: ["Glucagon", "Insulin", "Adrenaline", "Cortisol"], exp: "Insulin, secreted by Beta cells of the Islets of Langerhans, facilitates glucose entry into cells.", correct: "B" },
        { q: "An deficiency of Iodine in the diet leads to the enlargement of the thyroid gland, a condition known as:", options: ["Cretinism", "Grave's Disease", "Goiter", "Myxedema"], exp: "Without iodine, the thyroid cannot produce T3/T4, causing the pituitary to over-secrete TSH, which over-stimulates the gland.", correct: "C" },
        { q: "The 'Fight or Flight' response is mediated by hormones secreted from the:", options: ["Adrenal Cortex", "Adrenal Medulla", "Pancreas", "Parathyroid"], exp: "The adrenal medulla secretes Epinephrine (Adrenaline) and Norepinephrine in response to sympathetic stimulation.", correct: "B" },
        { q: "Which hormone stimulates the contraction of the uterus during childbirth?", options: ["Prolactin", "Oxytocin", "Estrogen", "Progesterone"], exp: "Oxytocin is produced by the hypothalamus and released by the posterior pituitary to stimulate labor and milk ejection.", correct: "B" },
        { q: "Diabetes Mellitus Type 1 is characterized by:", options: ["Insulin resistance", "Absolute deficiency of insulin", "High ADH levels", "Overproduction of glucagon"], exp: "Type 1 is an autoimmune condition where the pancreas fails to produce insulin.", correct: "B" },
        { q: "The hormone that maintains the lining of the uterus during pregnancy is:", options: ["Luteinizing Hormone", "Progesterone", "Follicle Stimulating Hormone", "Thyroxine"], exp: "Progesterone, primarily from the corpus luteum, is essential for maintaining the endometrial lining.", correct: "B" },
        { q: "Which gland secretes Melatonin, which regulates the sleep-wake cycle?", options: ["Thalamus", "Pineal Gland", "Hypothalamus", "Thymus"], exp: "The pineal gland produces melatonin in response to darkness.", correct: "B" },
        { q: "Hypersecretion of Growth Hormone (GH) in adults leads to:", options: ["Gigantism", "Dwarfism", "Acromegaly", "Cushing's Syndrome"], exp: "In adults (after epiphyseal plate closure), excess GH causes thickening of bones in the face, hands, and feet (Acromegaly).", correct: "C" },
        { q: "Antidiuretic Hormone (ADH) is synthesized in the ______ and stored in the ______.", options: ["Anterior Pituitary; Posterior Pituitary", "Hypothalamus; Posterior Pituitary", "Posterior Pituitary; Hypothalamus", "Hypothalamus; Anterior Pituitary"], exp: "ADH is produced by hypothalamic neurons and transported down axons to the posterior pituitary for release.", correct: "B" },
        { q: "Which hormone increases blood calcium levels by stimulating bone resorption?", options: ["Calcitonin", "Parathyroid Hormone (PTH)", "Thyroxine", "Aldosterone"], exp: "PTH increases blood calcium; Calcitonin (from thyroid) decreases it.", correct: "B" },
        { q: "Glucocorticoids, such as Cortisol, are secreted by the:", options: ["Adrenal Medulla", "Adrenal Cortex", "Pancreas", "Thyroid"], exp: "The adrenal cortex secretes steroids: mineralocorticoids, glucocorticoids, and androgens.", correct: "B" },
        { q: "Which of the following acts as both an endocrine and an exocrine gland?", options: ["Spleen", "Pancreas", "Liver", "Kidney"], exp: "The pancreas produces hormones (endocrine) and digestive enzymes (exocrine).", correct: "B" },
        { q: "The hormone that triggers ovulation in females is:", options: ["Estrogen", "FSH", "LH", "Progesterone"], exp: "A surge in Luteinizing Hormone (LH) triggers the release of the egg from the follicle.", correct: "C" },
        { q: "Cushing's Syndrome is caused by the hypersecretion of:", options: ["Insulin", "Cortisol", "Thyroxine", "Growth Hormone"], exp: "Excess cortisol leads to symptoms like a 'moon face' and 'buffalo hump'.", correct: "B" },
        { q: "In the 'Second Messenger' system, which molecule often acts as the messenger inside the cell?", options: ["cAMP", "ATP", "DNA", "RNA"], exp: "Water-soluble hormones bind to receptors that activate adenylate cyclase to produce cAMP.", correct: "A" },
        { q: "Alpha cells of the Pancreas secrete:", options: ["Insulin", "Somatostatin", "Glucagon", "Pancreatic Polypeptide"], exp: "Glucagon is secreted by Alpha cells to increase blood sugar levels.", correct: "C" },
        { q: "Which hormone promotes the development of secondary sexual characteristics in males?", options: ["Estrogen", "Progesterone", "Testosterone", "Prolactin"], exp: "Testosterone is the primary androgen responsible for male sexual development.", correct: "C" },
        { q: "The condition 'Cretinism' is caused by congenital deficiency of:", options: ["Insulin", "Thyroxine", "Adrenaline", "Growth Hormone"], exp: "Hypothyroidism in infants leads to stunted physical and mental growth known as cretinism.", correct: "B" }
    ];

    function loadQuiz() {
        const container = document.getElementById('questionsContainer');
        chemicalData.forEach((data, index) => {
            const qDiv = document.createElement('div');
            qDiv.className = 'question';
            qDiv.innerHTML = `
                <div class="q-text">${index + 1}. ${data.q}</div>
                <div class="options">
                    ${data.options.map((opt, i) => `
                        <div class="option" onclick="selectOption(this, ${index}, '${String.fromCharCode(65 + i)}')">
                            ${String.fromCharCode(65 + i)}. ${opt}
                        </div>
                    `).join('')}
                </div>
                <div class="explanation" id="exp-${index}"><strong>Explanation:</strong> ${data.exp}</div>
            `;
            container.appendChild(qDiv);
        });
    }

    let userAnswers = {};
    function selectOption(el, qIndex, val) {
        const parent = el.parentElement;
        Array.from(parent.children).forEach(child => child.classList.remove('selected'));
        el.classList.add('selected');
        userAnswers[qIndex] = val;
    }

    function calculateScore() {
        let score = 0;
        chemicalData.forEach((data, index) => {
            document.getElementById(`exp-${index}`).style.display = 'block';
            const options = document.querySelectorAll(`.question:nth-child(${index + 1}) .option`);
            options.forEach((opt, i) => {
                const letter = String.fromCharCode(65 + i);
                if (letter === data.correct) opt.classList.add('correct');
                if (userAnswers[index] === letter && letter !== data.correct) opt.classList.add('wrong');
            });
            if (userAnswers[index] === data.correct) score++;
        });

        const resultsDiv = document.getElementById('results');
        resultsDiv.style.display = 'block';
        document.getElementById('scoreText').innerText = `Your Score: ${score} / ${chemicalData.length}`;
        window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
    }
    loadQuiz();
</script>

</body>
</html>
