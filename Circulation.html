<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Circulation: Randomized MDCAT Mock</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Outfit:wght@700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #f4f6f9; color: #2d3436; padding: 20px; line-height: 1.6; }
        .quiz-container { max-width: 850px; margin: 0 auto; background: white; padding: 40px; border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); border-top: 10px solid #d63031; }
        h1 { font-family: 'Outfit', sans-serif; color: #c0392b; text-align: center; margin-bottom: 5px; }
        .subtitle { text-align: center; color: #636e72; font-weight: 700; margin-bottom: 35px; text-transform: uppercase; letter-spacing: 1.5px; font-size: 0.9rem; }
        .question { margin-bottom: 35px; padding: 25px; border: 1px solid #dfe6e9; border-radius: 15px; background: #ffffff; }
        .q-text { font-weight: 600; font-size: 1.1rem; margin-bottom: 20px; color: #2c3e50; }
        .options { display: grid; gap: 12px; }
        .option { padding: 16px 20px; border: 2px solid #f1f2f6; border-radius: 12px; cursor: pointer; transition: 0.2s; background: #ffffff; }
        .option:hover { border-color: #d63031; background: #fff5f5; }
        .option.selected { background: #2d3436; color: white; border-color: #2d3436; }
        .btn-submit { display: block; width: 100%; padding: 20px; background: #d63031; color: white; border: none; border-radius: 50px; font-weight: 700; font-size: 1.3rem; cursor: pointer; margin-top: 30px; transition: 0.3s; }
        .btn-submit:hover { background: #b02626; transform: translateY(-2px); }
        #results { display: none; margin-top: 40px; padding: 30px; border-radius: 20px; text-align: center; background: #2d3436; color: white; }
        .explanation { margin-top: 15px; font-size: 0.95rem; color: #2d3748; display: none; background: #fdf2f2; padding: 18px; border-left: 6px solid #d63031; border-radius: 8px; }
        .correct { border-color: #2ecc71 !important; background: #e8f8f0 !important; color: #145a32; font-weight: bold; }
        .wrong { border-color: #e74c3c !important; background: #fdedec !important; color: #1c2e36; }
    </style>
</head>
<body>

<div class="quiz-container">
    <h1>Circulation</h1>
    
    <form id="quizForm">
        <div id="questionsContainer"></div>
        <button type="button" class="btn-submit" onclick="calculateScore()">Submit</button>
    </form>

    <div id="results">
        <h2 id="scoreText"></h2>
        
    </div>
</div>

<script>
    const circulationRandom = [
        { q: "During ventricular systole, the pressure in the left ventricle must exceed the pressure in which vessel to open the semilunar valve?", options: ["Pulmonary Artery", "Aorta", "Left Atrium", "Vena Cava"], exp: "Left ventricular pressure must rise above aortic pressure (approx 80mmHg) to eject blood.", correct: "B" },
        { q: "The plateau phase of the cardiac muscle action potential is primarily due to the inward movement of:", options: ["Sodium ions", "Potassium ions", "Calcium ions", "Chloride ions"], exp: "Slow Ca2+ channels stay open, maintaining depolarization and preventing tetany in heart muscle.", correct: "C" },
        { q: "Which of the following ECG components is masked by the high electrical activity of ventricular depolarization?", options: ["P-wave", "T-wave", "Atrial repolarization", "U-wave"], exp: "Atrial repolarization occurs at the same time as the QRS complex and is hidden by it.", correct: "C" },
        { q: "The 'Dupp' heart sound (S2) marks the beginning of which cardiac phase?", options: ["Isovolumetric contraction", "Ventricular ejection", "Isovolumetric relaxation", "Atrial systole"], exp: "S2 occurs when the semilunar valves close as ventricles begin to relax.", correct: "C" },
        { q: "Which blood vessels act as the primary 'Pressure Reservoir', expanding and recoiling to maintain flow during diastole?", options: ["Arterioles", "Large Elastic Arteries", "Capillaries", "Muscular Veins"], exp: "Elastic arteries like the aorta dampen the pressure pulses from the heart.", correct: "B" },
        { q: "If a vessel's radius is reduced by half (vasoconstriction), the resistance to blood flow increases by:", options: ["2 times", "4 times", "8 times", "16 times"], exp: "According to Poiseuille's Law, resistance is inversely proportional to the 4th power of the radius (2^4 = 16).", correct: "D" },
        { q: "The specialized cells in the SA node are unique because they lack a 'stable' resting membrane potential. This is known as:", options: ["Threshold potential", "Pacemaker potential", "Action potential", "Afterpotential"], exp: "The slow drift toward threshold is the pacemaker potential.", correct: "B" },
        { q: "Which of the following would cause a 'Left Shift' in the oxygen-hemoglobin dissociation curve (increasing affinity)?", options: ["Increased Temperature", "Increased 2,3-DPG", "Decreased pH (Acidity)", "Decreased Temperature"], exp: "Colder temperatures and higher pH (alkalinity) make hemoglobin hold onto oxygen more tightly.", correct: "D" },
        { q: "The net filtration pressure (NFP) at the venous end of a capillary is typically negative, meaning:", options: ["Filtration is occurring", "Reabsorption is occurring", "Blood flow has stopped", "Lymph is being formed"], exp: "A negative NFP means the osmotic pull is greater than the hydrostatic push, moving fluid back into the vessel.", correct: "B" },
        { q: "In the cardiac conduction system, which structure has the slowest conduction velocity to allow for atrial emptying?", options: ["SA Node", "AV Node", "Bundle of His", "Purkinje Fibers"], exp: "The AV node delay is crucial for coordinated pumping.", correct: "B" },
        { q: "The thickest layer of the heart wall, responsible for the actual pumping action, is the:", options: ["Epicardium", "Endocardium", "Myocardium", "Pericardium"], exp: "The myocardium consists of cardiac muscle tissue.", correct: "C" },
        { q: "Valves are present in which of the following circulatory structures to ensure one-way flow?", options: ["Arteries and Veins", "Veins and Lymphatics", "Capillaries and Venules", "Arterioles and Venules"], exp: "Both veins and lymphatic vessels use valves to prevent backflow under low pressure.", correct: "B" },
        { q: "Which of the following represents the correct sequence of blood flow through the heart, starting from the Vena Cava?", options: ["RA -> RV -> Lung -> LA -> LV", "LA -> LV -> Lung -> RA -> RV", "RA -> LA -> Lung -> RV -> LV", "RV -> RA -> Lung -> LV -> LA"], exp: "Right Atrium -> Right Ventricle -> Pulmonary Circuit -> Left Atrium -> Left Ventricle.", correct: "A" },
        { q: "What is the primary effect of parasympathetic stimulation (via the Vagus nerve) on the heart?", options: ["Increased Force", "Decreased Heart Rate", "Increased Heart Rate", "Increased Conduction Velocity"], exp: "Acetylcholine released by the Vagus nerve slows the SA node firing rate.", correct: "B" },
        { q: "Angiotensin II is a powerful hormone that increases blood pressure by:", options: ["Causing Vasodilation", "Inhibiting Aldosterone", "Causing Vasoconstriction", "Decreasing Thirst"], exp: "It is one of the body's most potent vasoconstrictors.", correct: "C" },
        { q: "The percentage of total blood volume occupied by erythrocytes is called the:", options: ["Viscosity", "Hemoglobin count", "Hematocrit", "Plasma ratio"], exp: "Hematocrit levels typically range from 40-45%.", correct: "C" },
        { q: "Which of the following blood vessels carries 'Oxygenated' blood?", options: ["Pulmonary Artery", "Vena Cava", "Pulmonary Vein", "Hepatic Portal Vein"], exp: "The Pulmonary Vein returns oxygen-rich blood from the lungs to the left atrium.", correct: "C" },
        { q: "The 'P-R interval' on an ECG starts at the beginning of the P-wave and ends at the:", options: ["End of the P-wave", "Beginning of the QRS complex", "End of the T-wave", "Beginning of the T-wave"], exp: "It measures the time from atrial start to ventricular start.", correct: "B" },
        { q: "If the heart rate is 70 bpm and the stroke volume is 70 ml, the cardiac output is approximately:", options: ["140 ml/min", "4.9 L/min", "7.0 L/min", "1.0 L/min"], exp: "CO = 70 x 70 = 4900 ml/min or 4.9 Liters.", correct: "B" },
        { q: "The chordae tendineae and papillary muscles function to:", options: ["Open the AV valves", "Open the Semilunar valves", "Prevent eversion of AV valves", "Prevent closure of AV valves"], exp: "They act as 'tethers' to stop the valves from blowing backward into the atria during high-pressure ventricular contraction.", correct: "C" }
    ];

    function loadQuiz() {
        const container = document.getElementById('questionsContainer');
        circulationRandom.forEach((data, index) => {
            const qDiv = document.createElement('div');
            qDiv.className = 'question';
            qDiv.innerHTML = `
                <div class="q-text">${index + 1}. ${data.q}</div>
                <div class="options">
                    ${data.options.map((opt, i) => `
                        <div class="option" onclick="selectOption(this, ${index}, '${String.fromCharCode(65 + i)}')">
                            ${String.fromCharCode(65 + i)}. ${opt}
                        </div>
                    `).join('')}
                </div>
                <div class="explanation" id="exp-${index}"><strong>Explanation:</strong> ${data.exp}</div>
            `;
            container.appendChild(qDiv);
        });
    }

    let userAnswers = {};
    function selectOption(el, qIndex, val) {
        const parent = el.parentElement;
        Array.from(parent.children).forEach(child => child.classList.remove('selected'));
        el.classList.add('selected');
        userAnswers[qIndex] = val;
    }

    function calculateScore() {
        let score = 0;
        circulationRandom.forEach((data, index) => {
            document.getElementById(`exp-${index}`).style.display = 'block';
            const options = document.querySelectorAll(`.question:nth-child(${index + 1}) .option`);
            options.forEach((opt, i) => {
                const letter = String.fromCharCode(65 + i);
                if (letter === data.correct) opt.classList.add('correct');
                if (userAnswers[index] === letter && letter !== data.correct) opt.classList.add('wrong');
            });
            if (userAnswers[index] === data.correct) score++;
        });

        const resultsDiv = document.getElementById('results');
        resultsDiv.style.display = 'block';
        document.getElementById('scoreText').innerText = `Score: ${score} / ${circulationRandom.length}`;
        window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
    }
    loadQuiz();
</script>

</body>
</html>
