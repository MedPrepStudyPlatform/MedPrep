<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Electromagnetism | Physics MDCAT Mock</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(145deg, #faf5ff 0%, #f3e8ff 100%);
            color: #6b21a5;
            padding: 30px 20px;
            line-height: 1.55;
        }

        .quiz-container {
            max-width: 950px;
            margin: 0 auto;
            background: #ffffff;
            padding: 40px 42px;
            border-radius: 32px;
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.12), 0 5px 12px rgba(0, 0, 0, 0.05);
            border-top: 8px solid #9333ea;
            transition: all 0.2s;
        }

        h1 {
            font-family: 'Outfit', sans-serif;
            font-weight: 800;
            font-size: 2.5rem;
            background: linear-gradient(135deg, #7e22ce, #9333ea);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            text-align: center;
            letter-spacing: -0.5px;
            margin-bottom: 8px;
        }

        .question {
            margin-bottom: 28px;
            padding: 20px 24px;
            border: 1px solid #d8b4fe;
            border-radius: 24px;
            background: #ffffff;
            transition: box-shadow 0.2s;
            box-shadow: 0 1px 2px rgba(0,0,0,0.02);
        }

        .question:hover {
            box-shadow: 0 6px 14px rgba(147, 51, 234, 0.08);
            border-color: #c084fc;
        }

        .q-text {
            font-weight: 700;
            font-size: 1.12rem;
            margin-bottom: 18px;
            color: #6b21a5;
            padding-left: 14px;
            border-left: 4px solid #9333ea;
        }

        .options {
            display: grid;
            gap: 12px;
        }

        .option {
            padding: 14px 20px;
            border: 2px solid #e2e8f0;
            border-radius: 18px;
            cursor: pointer;
            transition: all 0.2s ease;
            background: #ffffff;
            font-weight: 500;
            color: #1e293b;
        }

        .option:hover {
            border-color: #9333ea;
            background: #faf5ff;
            transform: translateX(4px);
        }

        .option.selected {
            background: #7e22ce;
            color: white;
            border-color: #7e22ce;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .btn-submit {
            display: block;
            width: 100%;
            padding: 18px;
            background: #9333ea;
            color: white;
            border: none;
            border-radius: 60px;
            font-weight: 800;
            font-size: 1.3rem;
            cursor: pointer;
            margin-top: 35px;
            transition: 0.2s;
            letter-spacing: 1px;
            font-family: 'Outfit', sans-serif;
            box-shadow: 0 8px 16px rgba(147, 51, 234, 0.25);
        }

        .btn-submit:hover {
            background: #7e22ce;
            transform: translateY(-2px);
            box-shadow: 0 12px 20px rgba(126, 34, 206, 0.3);
        }

        #results {
            display: none;
            margin-top: 45px;
            padding: 28px 25px;
            border-radius: 28px;
            text-align: center;
            background: linear-gradient(110deg, #6b21a5, #7e22ce);
            color: #faf5ff;
            box-shadow: 0 12px 24px rgba(0,0,0,0.2);
        }

        #results h2 {
            font-family: 'Outfit', sans-serif;
            font-size: 2rem;
            font-weight: 800;
            letter-spacing: -0.5px;
        }

        .explanation {
            margin-top: 18px;
            font-size: 0.92rem;
            color: #6b21a5;
            display: none;
            background: #faf5ff;
            padding: 16px 22px;
            border-left: 6px solid #9333ea;
            border-radius: 18px;
            font-weight: 500;
            line-height: 1.45;
        }

        .correct {
            border-color: #10b981 !important;
            background: #d1fae5 !important;
            color: #064e3b !important;
            font-weight: 700;
        }

        .wrong {
            border-color: #ef4444 !important;
            background: #fee2e2 !important;
            color: #991b1b !important;
        }

        @media (max-width: 650px) {
            .quiz-container {
                padding: 24px 18px;
            }
            .q-text {
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>
<div class="quiz-container">
    <h1>Electromagnetism</h1>
    
    <form id="quizForm">
        <div id="questionsContainer"></div>
        <button type="button" class="btn-submit" onclick="calculateScore()">Submit</button>
    </form>

    <div id="results">
        <h2 id="scoreText"></h2>
    </div>
</div>

<script>
    // 20 conceptual + numerical, high-difficulty Electromagnetism MCQs (Physics FSC Part 2, Chapter 14)
    const electromagnetismMcqs = [
        { q: "The force on a charged particle moving in a magnetic field is maximum when the angle between velocity and magnetic field is:", options: ["0°", "45°", "90°", "180°"], exp: "F = qvB sinθ. Maximum when sinθ = 1, i.e., θ = 90°.", correct: "C" },
        { q: "The direction of force on a current-carrying conductor in a magnetic field is given by:", options: ["Fleming's left-hand rule", "Fleming's right-hand rule", "Right-hand thumb rule", "Maxwell's cork screw rule"], exp: "Fleming's left-hand rule gives the direction of force (motion) on a current-carrying conductor in a magnetic field.", correct: "A" },
        { q: "A proton moving with velocity 2 × 10⁶ m/s enters a magnetic field of 0.5 T perpendicularly. The force on the proton is (q = 1.6 × 10⁻¹⁹ C):", options: ["1.6 × 10⁻¹³ N", "3.2 × 10⁻¹³ N", "6.4 × 10⁻¹³ N", "1.6 × 10⁻¹² N"], exp: "F = qvB = 1.6 × 10⁻¹⁹ × 2 × 10⁶ × 0.5 = 1.6 × 10⁻¹⁹ × 10⁶ = 1.6 × 10⁻¹³ N.", correct: "A" },
        { q: "The torque on a current-carrying coil in a magnetic field is maximum when the plane of the coil is:", options: ["Parallel to the field", "Perpendicular to the field", "At 45° to the field", "At 60° to the field"], exp: "Torque τ = NIAB sinθ, where θ is angle between normal to coil and B. Torque maximum when sinθ = 1 (θ = 90°), meaning normal is perpendicular to B, so plane of coil is parallel to B.", correct: "A" },
        { q: "The sensitivity of a moving coil galvanometer can be increased by:", options: ["Increasing the number of turns", "Increasing the area of the coil", "Using a stronger magnet", "All of these"], exp: "Galvanometer sensitivity (current sensitivity) = NBA/k. Increasing N, A, or B increases sensitivity.", correct: "D" },
        { q: "A wire of length 0.5 m carrying a current of 2 A is placed in a magnetic field of 0.3 T at an angle of 30° to the field. The force on the wire is:", options: ["0.15 N", "0.3 N", "0.45 N", "0.6 N"], exp: "F = BIL sinθ = 0.3 × 2 × 0.5 × sin30° = 0.3 × 1 × 0.5 = 0.15 N.", correct: "A" },
        { q: "The force on a charged particle moving parallel to a magnetic field is:", options: ["Maximum", "Minimum (zero)", "Depends on charge", "Depends on mass"], exp: "When velocity is parallel to B, sinθ = 0, so F = 0.", correct: "B" },
        { q: "A galvanometer can be converted into a voltmeter by connecting a:", options: ["Low resistance in series", "High resistance in series", "Low resistance in parallel", "High resistance in parallel"], exp: "To convert galvanometer to voltmeter, a high resistance is connected in series to limit current.", correct: "B" },
        { q: "The magnetic field at the center of a circular coil of radius R carrying current I is:", options: ["μ₀I/(2R)", "μ₀I/(2πR)", "μ₀I/(4πR)", "μ₀I/R"], exp: "B_center = μ₀I/(2R) for a single circular loop.", correct: "A" },
        { q: "A galvanometer of resistance 10 Ω gives full scale deflection for a current of 5 mA. To convert it into an ammeter of range 0-5 A, the shunt resistance required is approximately:", options: ["0.01 Ω", "0.02 Ω", "0.05 Ω", "0.1 Ω"], exp: "Shunt resistance S = I_g G / (I - I_g) = (0.005 × 10)/(5 - 0.005) = 0.05/4.995 ≈ 0.01 Ω.", correct: "A" },
        { q: "The path of a charged particle moving perpendicular to a uniform magnetic field is:", options: ["Straight line", "Circle", "Helix", "Parabola"], exp: "When velocity is perpendicular to B, the force is perpendicular to velocity, causing circular motion.", correct: "B" },
        { q: "A galvanometer of resistance 50 Ω has a current sensitivity of 0.2 divisions per mA. The voltage sensitivity when used as a voltmeter with a series resistance of 950 Ω is:", options: ["0.1 divisions/V", "0.2 divisions/V", "0.4 divisions/V", "0.5 divisions/V"], exp: "Current sensitivity = 0.2 div/mA = 200 div/A. Total resistance = 50 + 950 = 1000 Ω. Voltage sensitivity = Current sensitivity / Total resistance = 200/1000 = 0.2 divisions/V.", correct: "B" },
        { q: "The torque on a current-carrying coil in a magnetic field is zero when the plane of the coil is:", options: ["Parallel to the field", "Perpendicular to the field", "At 45° to the field", "Never zero"], exp: "Torque = NIAB sinθ, where θ is angle between normal and B. When plane is perpendicular to B, normal is parallel to B (θ = 0°), so torque = 0.", correct: "B" },
        { q: "The SI unit of magnetic flux density is:", options: ["Tesla", "Weber", "Henry", "Gauss"], exp: "Magnetic flux density (B) is measured in tesla (T).", correct: "A" },
        { q: "A moving coil galvanometer is based on the principle of:", options: ["Torque on a current loop", "Force on a moving charge", "Electromagnetic induction", "Heating effect of current"], exp: "Galvanometer works due to torque experienced by a current-carrying coil in a magnetic field.", correct: "A" },
        { q: "A particle of mass m and charge q enters a magnetic field B with velocity v perpendicularly. The radius of the circular path is:", options: ["mv/qB", "qvB/m", "mB/qv", "qB/mv"], exp: "Centripetal force = magnetic force: mv²/r = qvB → r = mv/qB.", correct: "A" },
        { q: "An AVO meter can measure:", options: ["Current only", "Voltage only", "Resistance only", "Current, voltage, and resistance"], exp: "AVO meter (multimeter) measures Amperes, Volts, and Ohms.", correct: "D" },
        { q: "The magnetic field at a distance r from a long straight wire carrying current I is:", options: ["μ₀I/(2πr)", "μ₀I/(2r)", "μ₀I/(4πr)", "μ₀I/r²"], exp: "B = μ₀I/(2πr) for an infinitely long straight conductor.", correct: "A" },
        { q: "To convert a galvanometer into an ammeter of higher range, the shunt resistance must be:", options: ["Very high", "Very low", "Equal to galvanometer resistance", "None"], exp: "Shunt resistance is connected in parallel and should be very low to divert most of the current.", correct: "B" },
        { q: "An electron enters a magnetic field perpendicularly. The direction of force on it is given by:", options: ["Fleming's left-hand rule (with current opposite to electron motion)", "Fleming's right-hand rule", "Right-hand thumb rule", "None"], exp: "For electrons (negative charge), the direction of force is opposite to that given by left-hand rule for conventional current. But the rule still applies using current direction opposite to electron motion.", correct: "A" }
    ];

    // Shuffle questions for randomized order each load
    function shuffleArray(arr) {
        for (let i = arr.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [arr[i], arr[j]] = [arr[j], arr[i]];
        }
        return arr;
    }

    let randomizedQuestions = [];
    let userSelections = {};
    let quizSubmitted = false;

    function loadQuiz() {
        quizSubmitted = false;
        randomizedQuestions = shuffleArray([...electromagnetismMcqs]);
        const container = document.getElementById('questionsContainer');
        container.innerHTML = '';
        userSelections = {};

        randomizedQuestions.forEach((item, idx) => {
            const qDiv = document.createElement('div');
            qDiv.className = 'question';
            qDiv.setAttribute('data-qidx', idx);
            qDiv.innerHTML = `
                <div class="q-text">${idx + 1}. ${item.q}</div>
                <div class="options">
                    ${item.options.map((opt, optIdx) => {
                        const letter = String.fromCharCode(65 + optIdx);
                        return `<div class="option" data-letter="${letter}" onclick="selectOption(this, ${idx}, '${letter}')">
                            ${letter}. ${opt}
                        </div>`;
                    }).join('')}
                </div>
                <div class="explanation" id="exp-${idx}"><strong>Explanation:</strong> ${item.exp}</div>
            `;
            container.appendChild(qDiv);
        });
    }

    window.selectOption = function(el, qIndex, val) {
        if (quizSubmitted) return;
        const parentOptions = el.parentElement;
        Array.from(parentOptions.children).forEach(child => {
            child.classList.remove('selected');
        });
        el.classList.add('selected');
        userSelections[qIndex] = val;
    };

    window.calculateScore = function() {
        if (quizSubmitted) return;
        quizSubmitted = true;
        
        let score = 0;
        randomizedQuestions.forEach((data, idx) => {
            const expDiv = document.getElementById(`exp-${idx}`);
            if (expDiv) expDiv.style.display = 'block';
            
            const questionDiv = document.querySelector(`.question[data-qidx="${idx}"]`);
            if (!questionDiv) return;
            const allOpts = questionDiv.querySelectorAll('.option');
            const correctLetter = data.correct;
            
            allOpts.forEach(opt => {
                const letter = opt.getAttribute('data-letter');
                if (letter === correctLetter) {
                    opt.classList.add('correct');
                }
                if (userSelections[idx] && userSelections[idx] === letter && letter !== correctLetter) {
                    opt.classList.add('wrong');
                }
            });
            
            if (userSelections[idx] && userSelections[idx] === data.correct) {
                score++;
            }
        });
        
        const resultsDiv = document.getElementById('results');
        resultsDiv.style.display = 'block';
        const scoreSpan = document.getElementById('scoreText');
        const percent = Math.round((score / randomizedQuestions.length) * 100);
        scoreSpan.innerHTML = `Score: ${score} / ${randomizedQuestions.length}  |  ${percent}%`;
        
        setTimeout(() => {
            resultsDiv.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }, 100);
    };

    loadQuiz();
</script>
</body>
</html>
