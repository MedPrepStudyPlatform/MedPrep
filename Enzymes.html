<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MedPrep Quiz: Enzymes</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Outfit:wght@700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #f5fafd; color: #15304c; padding: 20px; margin: 0; }
        .quiz-container { max-width: 800px; margin: 0 auto; background: white; padding: 30px; border-radius: 24px; box-shadow: 0 10px 25px rgba(10, 44, 72, 0.1); }
        h1 { font-family: 'Outfit', sans-serif; color: #0a2c48; text-align: center; margin-bottom: 30px; }
        .question { margin-bottom: 25px; padding-bottom: 20px; border-bottom: 1px solid #e0f2fe; }
        .q-text { font-weight: 600; font-size: 1.1rem; margin-bottom: 15px; }
        .options { display: grid; gap: 10px; }
        .option { padding: 12px 15px; border: 2px solid #bbe0f0; border-radius: 12px; cursor: pointer; transition: 0.2s; }
        .option:hover { background: #f0faff; border-color: #1ecbe1; }
        .option.selected { background: #0a2c48; color: white; border-color: #0a2c48; }
        .btn-submit { display: block; width: 100%; padding: 15px; background: #1ecbe1; color: #0a2c48; border: none; border-radius: 50px; font-weight: 700; font-size: 1.1rem; cursor: pointer; margin-top: 20px; transition: 0.3s; }
        .btn-submit:hover { background: #0a2c48; color: white; }
        #results { display: none; margin-top: 30px; padding: 20px; border-radius: 15px; text-align: center; }
        .explanation { margin-top: 10px; font-size: 0.9rem; color: #1f6a92; display: none; background: #eff9ff; padding: 10px; border-left: 4px solid #1ecbe1; border-radius: 4px; }
        .correct { border-color: #2ecc71 !important; background: #eafff2; }
        .wrong { border-color: #e74c3c !important; background: #fff2f0; }
    </style>
</head>
<body>

<div class="quiz-container">
    <h1>Enzymes</h1>
    <form id="quizForm">
        <div id="questionsContainer"></div>
        <button type="button" class="btn-submit" onclick="calculateScore()">Submit</button>
    </form>

    <div id="results">
        <h2 id="scoreText"></h2>
       
    </div>
</div>

<script>
    const quizData = [
        { q: "An enzyme without its non-protein cofactor is known as:", options: ["Holoenzyme", "Apoenzyme", "Coenzyme", "Prosthetic group"], exp: "An apoenzyme is the inactive, protein part of an enzyme.", correct: "B" },
        { q: "Which of the following describes the 'Induced Fit Model'?", options: ["Active site is rigid", "Active site is flexible", "Substrate changes shape", "Enzyme is consumed"], exp: "Koshland's model suggests the active site molds itself to fit the substrate perfectly.", correct: "B" },
        { q: "Enzymes increase the rate of reaction by lowering:", options: ["Kinetic energy", "Activation energy", "Potential energy", "Thermal energy"], exp: "Enzymes provide an alternative pathway with a lower energy barrier.", correct: "B" },
        { q: "Competitive inhibitors bind to which part of the enzyme?", options: ["Allosteric site", "Cofactor", "Active site", "Phosphate group"], exp: "They compete with the substrate for the active site because they share structural similarity.", correct: "C" },
        { q: "An organic cofactor that is loosely attached to the enzyme is called:", options: ["Prosthetic group", "Activator", "Coenzyme", "Apoenzyme"], exp: "Coenzymes (like NAD) are loosely attached; prosthetic groups are covalently bound.", correct: "C" },
        { q: "Non-competitive inhibitors change the enzyme's shape by binding to:", options: ["Active site", "Substrate", "Peptide bond", "Allosteric site"], exp: "Binding to the allosteric site distorts the active site, preventing catalysis.", correct: "D" },
        { q: "Succinate dehydrogenase is inhibited by malonate. This is an example of:", options: ["Competitive inhibition", "Non-competitive inhibition", "Feedback inhibition", "Irreversible inhibition"], exp: "Malonate is structurally similar to succinate and competes for the same active site.", correct: "A" },
        { q: "What is the nature of most enzymes?", options: ["Carbohydrates", "Lipids", "Proteins", "Nucleic Acids"], exp: "Almost all enzymes are globular proteins.", correct: "C" },
        { q: "At very high temperatures, enzymes lose their activity because of:", options: ["Saturation", "Ionization", "Denaturation", "Activation"], exp: "Heat breaks the hydrogen and ionic bonds that maintain the enzyme's 3D globular shape.", correct: "C" },
        { q: "The optimum pH for the enzyme Pepsin is:", options: ["2.0", "7.0", "8.0", "9.5"], exp: "Pepsin works in the highly acidic environment of the stomach.", correct: "A" },
        { q: "An enzyme that requires a metal ion (like Mg++) for its activity uses it as an:", options: ["Inhibitor", "Activator", "Apoenzyme", "Active site"], exp: "Metal ions that assist in enzyme function are called activators.", correct: "B" },
        { q: "Which of the following is an example of a prosthetic group?", options: ["NAD", "FAD", "Heme", "Iron"], exp: "Heme is an organic cofactor that is permanently/covalently attached to enzymes like catalase.", correct: "C" },
        { q: "If the concentration of substrate is increased infinitely, the rate of reaction eventually:", options: ["Increases linearly", "Decreases to zero", "Becomes constant", "Stops immediately"], exp: "This occurs due to saturation of all available active sites on the enzymes.", correct: "C" },
        { q: "Cyanide is a poison that acts as a/an:", options: ["Competitive inhibitor", "Irreversible inhibitor", "Activator", "Coenzyme"], exp: "Cyanide binds permanently to cytochrome oxidase, stopping cellular respiration.", correct: "B" },
        { q: "Enzymes that are produced in inactive form to protect cell tissues are called:", options: ["Coenzymes", "Zymogens", "Holoenzymes", "Activators"], exp: "Example: Pepsinogen is a zymogen that becomes Pepsin only when needed.", correct: "B" },
        { q: "Which of the following is a non-protein part of an enzyme?", options: ["Cofactor", "Apoenzyme", "Polypeptide", "Active site"], exp: "Cofactors provide the chemical assistance that the protein part cannot provide alone.", correct: "A" },
        { q: "The catalytic power of an enzyme is concentrated in its:", options: ["Entire surface", "Active site", "Apoenzyme", "C-terminus"], exp: "Only a small region called the active site is directly involved in catalysis.", correct: "B" },
        { q: "What happens to the rate of reaction if the temperature is reduced to near freezing?", options: ["Denaturation", "Enzyme is destroyed", "Reaction slows down", "Reaction speeds up"], exp: "Low temperature provides insufficient kinetic energy but does not denature the enzyme.", correct: "C" },
        { q: "Lock and Key model was proposed by:", options: ["Emil Fischer", "Koshland", "Robert Brown", "Pasteur"], exp: "Fischer proposed this in 1894, suggesting the active site is a rigid template.", correct: "A" },
        { q: "Trypsin has an optimum pH of:", options: ["2.0", "4.5", "7.0", "8.0"], exp: "Trypsin works in the alkaline environment of the small intestine.", correct: "D" }
    ];

    function loadQuiz() {
        const container = document.getElementById('questionsContainer');
        quizData.forEach((data, index) => {
            const qDiv = document.createElement('div');
            qDiv.className = 'question';
            qDiv.innerHTML = `
                <div class="q-text">${index + 1}. ${data.q}</div>
                <div class="options">
                    ${data.options.map((opt, i) => `
                        <div class="option" onclick="selectOption(this, ${index}, '${String.fromCharCode(65 + i)}')">
                            ${String.fromCharCode(65 + i)}. ${opt}
                        </div>
                    `).join('')}
                </div>
                <div class="explanation" id="exp-${index}"><strong>Explanation:</strong> ${data.exp}</div>
            `;
            container.appendChild(qDiv);
        });
    }

    let userAnswers = {};
    function selectOption(el, qIndex, val) {
        const parent = el.parentElement;
        Array.from(parent.children).forEach(child => child.classList.remove('selected'));
        el.classList.add('selected');
        userAnswers[qIndex] = val;
    }

    function calculateScore() {
        let score = 0;
        quizData.forEach((data, index) => {
            const ex = document.getElementById(`exp-${index}`);
            ex.style.display = 'block';
            const options = document.querySelectorAll(`.question:nth-child(${index + 1}) .option`);
            options.forEach((opt, i) => {
                const letter = String.fromCharCode(65 + i);
                if (letter === data.correct) opt.classList.add('correct');
                if (userAnswers[index] === letter && letter !== data.correct) opt.classList.add('wrong');
            });
            if (userAnswers[index] === data.correct) score++;
        });

        const resultsDiv = document.getElementById('results');
        resultsDiv.style.display = 'block';
        document.getElementById('scoreText').innerText = `Your Score: ${score} / ${quizData.length}`;
        window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
    }
    loadQuiz();
</script>

</body>
</html>
