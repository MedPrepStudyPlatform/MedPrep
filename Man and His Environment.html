<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Man and His Environment: Randomized MDCAT Mock</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Outfit:wght@700&display=swap" rel="stylesheet">
    <style>
        /* Theme: Forest Green & Earth Brown */
        body { font-family: 'Inter', sans-serif; background: #f0f4f0; color: #2d3436; padding: 20px; line-height: 1.6; }
        .quiz-container { max-width: 850px; margin: 0 auto; background: white; padding: 40px; border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); border-top: 10px solid #2ecc71; }
        h1 { font-family: 'Outfit', sans-serif; color: #1b4d3e; text-align: center; margin-bottom: 5px; }
        .subtitle { text-align: center; color: #795548; font-weight: 700; margin-bottom: 35px; text-transform: uppercase; letter-spacing: 1.5px; font-size: 0.9rem; }
        .question { margin-bottom: 35px; padding: 25px; border: 1px solid #dfe6e9; border-radius: 15px; background: #ffffff; }
        .q-text { font-weight: 600; font-size: 1.1rem; margin-bottom: 20px; color: #2c3e50; }
        .options { display: grid; gap: 12px; }
        .option { padding: 16px 20px; border: 2px solid #f1f2f6; border-radius: 12px; cursor: pointer; transition: 0.2s; background: #ffffff; }
        .option:hover { border-color: #2ecc71; background: #f0faf4; }
        .option.selected { background: #2d3436; color: white; border-color: #2d3436; }
        .btn-submit { display: block; width: 100%; padding: 20px; background: #2ecc71; color: white; border: none; border-radius: 50px; font-weight: 700; font-size: 1.3rem; cursor: pointer; margin-top: 30px; transition: 0.3s; }
        .btn-submit:hover { background: #27ae60; transform: translateY(-2px); }
        #results { display: none; margin-top: 40px; padding: 30px; border-radius: 20px; text-align: center; background: #2d3436; color: white; }
        .explanation { margin-top: 15px; font-size: 0.95rem; color: #2d3748; display: none; background: #f0faf4; padding: 18px; border-left: 6px solid #2ecc71; border-radius: 8px; }
        .correct { border-color: #2ecc71 !important; background: #e8f8f0 !important; color: #145a32; font-weight: bold; }
        .wrong { border-color: #e74c3c !important; background: #fdedec !important; color: #1c2e36; }
    </style>
</head>
<body>

<div class="quiz-container">
    <h1>Man and His Environment</h1>
    
    
    <form id="quizForm">
        <div id="questionsContainer"></div>
        <button type="button" class="btn-submit" onclick="calculateScore()">Submit</button>
    </form>

    <div id="results">
        <h2 id="scoreText"></h2>
        
    </div>
</div>

<script>
    const environmentData = [
        { q: "Which of the following is a 'Non-Renewable' resource?", options: ["Solar energy", "Wind energy", "Natural gas", "Biomass"], exp: "Fossil fuels like natural gas are finite and cannot be replenished on a human timescale.", correct: "C" },
        { q: "The process by which nutrients (like phosphates/nitrates) lead to excessive algal growth in water bodies is:", options: ["Biomagnification", "Eutrophication", "Acidification", "Stratification"], exp: "Eutrophication depletes oxygen in water, often leading to fish kills.", correct: "B" },
        { q: "In an ecosystem, the flow of energy is always:", options: ["Bidirectional", "Unidirectional", "Cyclic", "Multidirectional"], exp: "Energy enters as light and leaves as heat; it cannot be recycled back to the sun.", correct: "B" },
        { q: "Which gas is the primary contributor to the 'Greenhouse Effect'?", options: ["Oxygen", "Nitrogen", "Carbon dioxide", "Argon"], exp: "CO2 traps heat in the atmosphere, leading to global warming.", correct: "C" },
        { q: "The concentration of toxic substances increasing at each successive trophic level is known as:", options: ["Bioaccumulation", "Biomagnification", "Biodiversity", "Bioprocessing"], exp: "Top predators usually have the highest concentration of toxins like DDT or Mercury.", correct: "B" },
        { q: "Acid rain is primarily caused by the release of which two gases into the atmosphere?", options: ["CO2 and CO", "SO2 and NO2", "CH4 and CFCs", "O3 and O2"], exp: "Sulfur dioxide and Nitrogen oxides react with water to form sulfuric and nitric acids.", correct: "B" },
        { q: "The role or 'profession' of a species within its ecosystem is called its:", options: ["Habitat", "Niche", "Community", "Biome"], exp: "A niche includes the organism's interactions with biotic and abiotic factors.", correct: "B" },
        { q: "Which of the following is a primary consumer?", options: ["Lion", "Eagle", "Rabbit", "Snake"], exp: "Primary consumers (herbivores) eat producers (plants).", correct: "C" },
        { q: "The ozone layer, which protects us from UV radiation, is found in the:", options: ["Troposphere", "Stratosphere", "Mesosphere", "Thermosphere"], exp: "The stratosphere contains the ozone shield essential for life on land.", correct: "B" },
        { q: "In a food chain, what percentage of energy is typically transferred to the next trophic level?", options: ["1%", "10%", "50%", "90%"], exp: "The 10% Law states that 90% of energy is lost as heat or through metabolic processes.", correct: "B" },
        { q: "Which of the following is an example of an 'Abiotic' factor?", options: ["Fungi", "Bacteria", "Soil pH", "Parasites"], exp: "Abiotic factors are non-living components of an ecosystem.", correct: "C" },
        { q: "Global warming is expected to cause which of the following?", options: ["Rising sea levels", "Extreme weather patterns", "Loss of biodiversity", "All of the above"], exp: "Increased temperatures affect ice caps, ocean currents, and species survival.", correct: "D" },
        { q: "What is the main cause of the 'Ozone Hole' over Antarctica?", options: ["Carbon dioxide", "CFCs (Chlorofluorocarbons)", "Methane", "Nitrous oxide"], exp: "CFCs release chlorine atoms that destroy ozone molecules.", correct: "B" },
        { q: "A relationship where one organism benefits and the other is neither helped nor harmed is:", options: ["Mutualism", "Parasitism", "Commensalism", "Competition"], exp: "An example of commensalism is a bird nesting in a tree.", correct: "C" },
        { q: "Organisms that break down dead organic matter and return nutrients to the soil are:", options: ["Producers", "Herbivores", "Decomposers", "Omnivores"], exp: "Bacteria and fungi are essential decomposers that close the nutrient cycle.", correct: "C" },
        { q: "Which biome is characterized by low rainfall, permafrost, and short growing seasons?", options: ["Tropical Rainforest", "Desert", "Tundra", "Savanna"], exp: "The Tundra is an Arctic/Alpine biome with frozen subsoil.", correct: "C" },
        { q: "The maximum population size an environment can sustain is called its:", options: ["Growth rate", "Biotic potential", "Carrying capacity", "Replacement level"], exp: "Carrying capacity (K) is limited by resources like food and space.", correct: "C" },
        { q: "Which of the following is a 'Secondary' pollutant?", options: ["Carbon monoxide", "Sulfur dioxide", "Smog (Ozone at ground level)", "Particulate matter"], exp: "Secondary pollutants form in the atmosphere through chemical reactions.", correct: "C" },
        { q: "The use of living organisms to clean up polluted soil or water is called:", options: ["Bioaugmentation", "Bioremediation", "Biosynthesis", "Biocontrol"], exp: "Bacteria are often used to degrade oil spills or neutralize heavy metals.", correct: "B" },
        { q: "Which chemical cycle does NOT involve the atmosphere as a major reservoir?", options: ["Carbon cycle", "Nitrogen cycle", "Phosphorus cycle", "Water cycle"], exp: "The phosphorus cycle is primarily sedimentary, moving through soil, rocks, and water.", correct: "C" }
    ];

    function loadQuiz() {
        const container = document.getElementById('questionsContainer');
        environmentData.forEach((data, index) => {
            const qDiv = document.createElement('div');
            qDiv.className = 'question';
            qDiv.innerHTML = `
                <div class="q-text">${index + 1}. ${data.q}</div>
                <div class="options">
                    ${data.options.map((opt, i) => `
                        <div class="option" onclick="selectOption(this, ${index}, '${String.fromCharCode(65 + i)}')">
                            ${String.fromCharCode(65 + i)}. ${opt}
                        </div>
                    `).join('')}
                </div>
                <div class="explanation" id="exp-${index}"><strong>Explanation:</strong> ${data.exp}</div>
            `;
            container.appendChild(qDiv);
        });
    }

    let userAnswers = {};
    function selectOption(el, qIndex, val) {
        const parent = el.parentElement;
        Array.from(parent.children).forEach(child => child.classList.remove('selected'));
        el.classList.add('selected');
        userAnswers[qIndex] = val;
    }

    function calculateScore() {
        let score = 0;
        environmentData.forEach((data, index) => {
            document.getElementById(`exp-${index}`).style.display = 'block';
            const options = document.querySelectorAll(`.question:nth-child(${index + 1}) .option`);
            options.forEach((opt, i) => {
                const letter = String.fromCharCode(65 + i);
                if (letter === data.correct) opt.classList.add('correct');
                if (userAnswers[index] === letter && letter !== data.correct) opt.classList.add('wrong');
            });
            if (userAnswers[index] === data.correct) score++;
        });

        const resultsDiv = document.getElementById('results');
        resultsDiv.style.display = 'block';
        document.getElementById('scoreText').innerText = `Your Score: ${score} / ${environmentData.length}`;
        window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
    }
    loadQuiz();
</script>

</body>
</html>
