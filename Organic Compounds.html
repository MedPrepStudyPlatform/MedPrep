<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Organic Compounds | FSC Chemistry MDCAT Mock</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(145deg, #ecfdf5 0%, #d1fae5 100%);
            color: #065f46;
            padding: 30px 20px;
            line-height: 1.55;
        }

        .quiz-container {
            max-width: 950px;
            margin: 0 auto;
            background: #ffffff;
            padding: 40px 42px;
            border-radius: 32px;
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.12), 0 5px 12px rgba(0, 0, 0, 0.05);
            border-top: 8px solid #059669;
            transition: all 0.2s;
        }

        h1 {
            font-family: 'Outfit', sans-serif;
            font-weight: 800;
            font-size: 2.5rem;
            background: linear-gradient(135deg, #047857, #059669);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            text-align: center;
            letter-spacing: -0.5px;
            margin-bottom: 8px;
        }

        .question {
            margin-bottom: 28px;
            padding: 20px 24px;
            border: 1px solid #a7f3d0;
            border-radius: 24px;
            background: #ffffff;
            transition: box-shadow 0.2s;
        }

        .question:hover {
            box-shadow: 0 6px 14px rgba(5, 150, 105, 0.08);
            border-color: #6ee7b7;
        }

        .q-text {
            font-weight: 700;
            font-size: 1.12rem;
            margin-bottom: 18px;
            color: #065f46;
            padding-left: 14px;
            border-left: 4px solid #059669;
        }

        .options {
            display: grid;
            gap: 12px;
        }

        .option {
            padding: 14px 20px;
            border: 2px solid #e2e8f0;
            border-radius: 18px;
            cursor: pointer;
            transition: all 0.2s ease;
            background: #ffffff;
            font-weight: 500;
            color: #1e293b;
        }

        .option:hover {
            border-color: #059669;
            background: #ecfdf5;
            transform: translateX(4px);
        }

        .option.selected {
            background: #047857;
            color: white;
            border-color: #047857;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .btn-submit {
            display: block;
            width: 100%;
            padding: 18px;
            background: #059669;
            color: white;
            border: none;
            border-radius: 60px;
            font-weight: 800;
            font-size: 1.3rem;
            cursor: pointer;
            margin-top: 35px;
            transition: 0.2s;
            letter-spacing: 1px;
            font-family: 'Outfit', sans-serif;
            box-shadow: 0 8px 16px rgba(5, 150, 105, 0.25);
        }

        .btn-submit:hover {
            background: #047857;
            transform: translateY(-2px);
            box-shadow: 0 12px 20px rgba(4, 120, 87, 0.3);
        }

        #results {
            display: none;
            margin-top: 45px;
            padding: 28px 25px;
            border-radius: 28px;
            text-align: center;
            background: linear-gradient(110deg, #065f46, #047857);
            color: #ecfdf5;
            box-shadow: 0 12px 24px rgba(0,0,0,0.2);
        }

        #results h2 {
            font-family: 'Outfit', sans-serif;
            font-size: 2rem;
            font-weight: 800;
            letter-spacing: -0.5px;
        }

        .explanation {
            margin-top: 18px;
            font-size: 0.92rem;
            color: #065f46;
            display: none;
            background: #ecfdf5;
            padding: 16px 22px;
            border-left: 6px solid #059669;
            border-radius: 18px;
            font-weight: 500;
            line-height: 1.45;
        }

        .correct {
            border-color: #10b981 !important;
            background: #d1fae5 !important;
            color: #064e3b !important;
            font-weight: 700;
        }

        .wrong {
            border-color: #ef4444 !important;
            background: #fee2e2 !important;
            color: #991b1b !important;
        }

        @media (max-width: 650px) {
            .quiz-container {
                padding: 24px 18px;
            }
            .q-text {
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>
<div class="quiz-container">
    <h1>Organic Compounds</h1>
    
    <form id="quizForm">
        <div id="questionsContainer"></div>
        <button type="button" class="btn-submit" onclick="calculateScore()">Submit</button>
    </form>

    <div id="results">
        <h2 id="scoreText"></h2>
    </div>
</div>

<script>
    // 20 conceptual, high-difficulty Organic Compounds MCQs (FSC Part 2, Chapter 7 - Fundamental Principles)
    // CORRECTED VERSION - all answers verified
    const organicMcqs = [
        { q: "A compound with molecular formula C₄H₈O₂ shows IR absorption at 1710 cm⁻¹ and gives positive iodoform test. How many distinct structural isomers (excluding stereoisomers) are possible for this compound?", options: ["2", "3", "4", "5"], correct: "C", exp: "Four isomers are possible: (1) Butan-2-one (CH₃COCH₂CH₃) - methyl ketone; (2) Ethyl acetate (CH₃COOCH₂CH₃) - ester with CH₃CO-; (3) 2-Hydroxybutanal (CH₃CH₂CH(OH)CHO) - aldehyde with CH₃CH(OH)-; (4) 3-Hydroxybutan-2-one (CH₃COCH(OH)CH₃) - has both functional groups. All give positive iodoform test due to CH₃CO- or CH₃CH(OH)- group. Answer: 4." },
        { q: "The correct IUPAC name of the compound CH₃-CH(CH₃)-CH(OH)-CH₂-CH₃ is:", options: ["3-methylpentan-2-ol", "4-methylpentan-2-ol", "2-methylpentan-3-ol", "3-methylpentan-3-ol"], correct: "A", exp: "Numbering from the end nearest to OH gives OH on carbon 2. Longest chain is 5 carbons (pentane). Methyl group is on carbon 3. So name: 3-methylpentan-2-ol." },
        { q: "Which of the following statements about carbocation stability is correct?", options: ["(CH₃)₃C⁺ is more stable than CH₃CH₂CH₂⁺ due to +I effect of methyl groups", "CH₃CH₂⁺ is more stable than (CH₃)₂CH⁺ due to hyperconjugation", "Benzyl carbocation is less stable than tertiary butyl carbocation", "Vinyl carbocation is more stable than ethyl carbocation"], correct: "A", exp: "Tertiary carbocation (CH₃)₃C⁺ is stabilized by +I effect and hyperconjugation from nine alpha C-H bonds, making it more stable than primary carbocation. Option A is correct. Option B is false (secondary is more stable than primary). Option C false (benzyl is very stable due to resonance). Option D false (vinyl is highly unstable)." },
        { q: "How many geometrical isomers are possible for the compound 2,4-heptadiene?", options: ["2", "3", "4", "6"], correct: "C", exp: "2,4-heptadiene has two double bonds. Each double bond can be E or Z, giving 2 × 2 = 4 possible geometric isomers (E,E; E,Z; Z,E; Z,Z)." },
        { q: "The hybridization state of all carbon atoms in benzene is:", options: ["sp³", "sp²", "sp", "sp³ and sp²"], correct: "B", exp: "Each carbon in benzene is bonded to two other carbons and one hydrogen, forming three sigma bonds with sp² hybridization. The remaining p-orbital participates in delocalized pi bonding." },
        { q: "Which of the following is NOT a correct representation of resonance?", options: ["CH₂=CH-CH=CH₂ ↔ CH₂-CH=CH-CH₂", "Benzene with alternating double bonds", "Ozone O₃", "Acetate ion CH₃COO⁻"], correct: "A", exp: "Resonance involves delocalization of electrons, not movement of atoms. Option A shows movement of atoms (sigma bonds changing positions), which is not resonance. Correct resonance structures keep atom positions fixed." },
        { q: "A compound with molecular formula C₅H₁₀O does not react with Tollens' reagent but gives a precipitate with 2,4-DNP. It also gives positive iodoform test. The compound is most likely:", options: ["Pentanal", "Pentan-2-one", "Pentan-3-one", "2-methylbutanal"], correct: "B", exp: "No reaction with Tollens' means not an aldehyde (so not pentanal or 2-methylbutanal). Positive 2,4-DNP indicates carbonyl (ketone). Positive iodoform test indicates CH₃CO- group (methyl ketone). Among C₅H₁₀O ketones: pentan-2-one (CH₃COCH₂CH₂CH₃) is a methyl ketone. Pentan-3-one (CH₃CH₂COCH₂CH₃) is not a methyl ketone and gives negative iodoform. So answer is pentan-2-one." },
        { q: "The number of sigma (σ) and pi (π) bonds in a molecule of naphthalene (C₁₀H₈) respectively are:", options: ["19σ, 5π", "20σ, 5π", "19σ, 6π", "20σ, 6π"], correct: "A", exp: "Naphthalene has 10 carbons and 8 hydrogens. C-H bonds: 8 (sigma). C-C sigma bonds: 11. Total sigma bonds = 8 + 11 = 19σ. Pi bonds: 5 double bonds × 1π each = 5π. So 19σ and 5π." },
        { q: "Which of the following has the highest boiling point?", options: ["n-Hexane", "2-Methylpentane", "2,2-Dimethylbutane", "3-Methylpentane"], correct: "A", exp: "Boiling point increases with increasing surface area and decreases with branching. n-Hexane (straight chain) has the largest surface area and strongest London dispersion forces, thus highest boiling point among these isomers." },
        { q: "The correct order of reactivity towards electrophilic substitution reaction for the following compounds is: Benzene, Toluene, Nitrobenzene, Chlorobenzene", options: ["Toluene > Benzene > Chlorobenzene > Nitrobenzene", "Nitrobenzene > Chlorobenzene > Benzene > Toluene", "Toluene > Benzene > Nitrobenzene > Chlorobenzene", "Chlorobenzene > Toluene > Benzene > Nitrobenzene"], correct: "A", exp: "Electron donating groups (like -CH₃ in toluene) activate the ring. Electron withdrawing groups (like -NO₂) deactivate. Halogens are deactivating but ortho/para directing. So reactivity order: Toluene (activated) > Benzene (reference) > Chlorobenzene (deactivated but less than nitro) > Nitrobenzene (strongly deactivated)." },
        { q: "How many chiral carbon atoms are present in the molecule CH₃-CHCl-CHOH-CH₂-CH₃?", options: ["0", "1", "2", "3"], correct: "C", exp: "Identify carbons with four different groups. C2 (CHCl) has H, Cl, CH₃, and CHOHCH₂CH₃ → four different groups, so chiral. C3 (CHOH) has H, OH, CHClCH₃, and CH₂CH₃ → four different groups, also chiral. So two chiral centers." },
        { q: "The functional group present in the compound CH₃-CO-NH-CH₂-CH₃ is:", options: ["Amide", "Amine", "Imine", "Nitrile"], correct: "A", exp: "The -CO-NH- group is an amide functional group (specifically a secondary amide). Amines have -NH₂, imines have C=N, nitriles have -C≡N." },
        { q: "Which of the following reactions is NOT shown by benzene?", options: ["Electrophilic substitution", "Addition reaction with Cl₂ in presence of light", "Nitration", "Friedel-Crafts alkylation"], correct: "B", exp: "Benzene undergoes electrophilic substitution but does not typically undergo addition reactions under normal conditions. With Cl₂ in presence of light (free radical conditions), benzene does not add chlorine; it requires UV light and special high-pressure conditions. Under normal laboratory conditions, no reaction occurs." },
        { q: "The number of primary, secondary, tertiary, and quaternary carbon atoms in 2,2,3-trimethylbutane respectively are:", options: ["3,1,2,0", "3,2,1,0", "4,1,1,0", "4,0,1,1"], correct: "D", exp: "Structure: (CH₃)₃C-CH(CH₃)-CH₃. Primary carbons (CH₃-): three methyls on quaternary carbon + one methyl on tertiary carbon = 4 primary. Secondary carbons (-CH₂-): none = 0. Tertiary carbons (>CH-): the CH group = 1. Quaternary carbons (>C<): the central carbon = 1. So correct distribution: 4,0,1,1." },
        { q: "The IUPAC name of the compound CH₃-CH=CH-CH₂-C≡CH is:", options: ["Hex-3-en-1-yne", "Hex-4-en-1-yne", "Hex-1-en-5-yne", "Hex-3-en-5-yne"], correct: "B", exp: "Longest chain contains both double and triple bonds (6 carbons). Numbering from the end nearest to a multiple bond gives triple bond priority (lower locant). From right: triple bond at C1, double bond at C4 → hex-4-en-1-yne. From left: double bond at C2, triple bond at C5 → hex-2-en-5-yne. Since 1 < 2, the name is hex-4-en-1-yne." },
        { q: "Which of the following is the most stable free radical?", options: ["CH₃•", "CH₃CH₂•", "(CH₃)₂CH•", "(CH₃)₃C•"], correct: "D", exp: "Free radical stability increases with increasing substitution: tertiary > secondary > primary > methyl. This is due to hyperconjugation and inductive effects from alkyl groups. (CH₃)₃C• (tertiary) is most stable." },
        { q: "The reaction of acetylene with excess HCl in the presence of HgCl₂ gives:", options: ["CH₂=CHCl", "CH₃CHCl₂", "CH₂Cl-CH₂Cl", "CH≡CCl"], correct: "B", exp: "Acetylene (C₂H₂) adds HCl in two steps via Markovnikov addition. First gives vinyl chloride (CH₂=CHCl). With excess HCl, further addition gives 1,1-dichloroethane (CH₃CHCl₂)." },
        { q: "Which of the following compounds shows geometrical isomerism?", options: ["1-Butene", "2-Butene", "2-Methyl-2-butene", "Cyclobutane"], correct: "B", exp: "Geometrical isomerism (cis-trans) requires a double bond with two different groups on each carbon. 2-Butene (CH₃-CH=CH-CH₃) has cis and trans isomers. 1-Butene has a terminal double bond (=CH₂), so no. 2-Methyl-2-butene has two methyls on one carbon, so no. Cyclobutane is cyclic but has no double bond." },
        { q: "The product of the reaction between ethanal and excess methanol in the presence of dry HCl gas is:", options: ["Hemiacetal", "Acetal", "Ether", "Ester"], correct: "B", exp: "Aldehydes react with alcohols in presence of dry HCl to form hemiacetal first, then with excess alcohol forms acetal (gem-dialkoxy compound). For ethanal + excess methanol → dimethyl acetal (CH₃CH(OCH₃)₂)." },
        { q: "Which of the following is the correct order of acidity of carboxylic acids?", options: ["HCOOH > CH₃COOH > CH₃CH₂COOH", "CH₃COOH > HCOOH > CH₃CH₂COOH", "CH₃CH₂COOH > CH₃COOH > HCOOH", "HCOOH > CH₃CH₂COOH > CH₃COOH"], correct: "A", exp: "Acidity of carboxylic acids decreases as alkyl group length increases due to +I effect. Formic acid (HCOOH) is strongest because no alkyl group to donate electrons. Acetic acid (CH₃COOH) weaker, propanoic acid (CH₃CH₂COOH) weakest among these." }
    ];

    // Shuffle questions for randomized order each load
    function shuffleArray(arr) {
        for (let i = arr.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [arr[i], arr[j]] = [arr[j], arr[i]];
        }
        return arr;
    }

    let randomizedQuestions = [];
    let userSelections = {};

    function loadQuiz() {
        randomizedQuestions = shuffleArray([...organicMcqs]);
        const container = document.getElementById('questionsContainer');
        container.innerHTML = '';
        userSelections = {};

        randomizedQuestions.forEach((item, idx) => {
            const qDiv = document.createElement('div');
            qDiv.className = 'question';
            qDiv.setAttribute('data-qidx', idx);
            qDiv.innerHTML = `
                <div class="q-text">${idx + 1}. ${item.q}</div>
                <div class="options">
                    ${item.options.map((opt, optIdx) => {
                        const letter = String.fromCharCode(65 + optIdx);
                        return `<div class="option" data-letter="${letter}" onclick="selectOption(this, ${idx}, '${letter}')">
                            ${letter}. ${opt}
                        </div>`;
                    }).join('')}
                </div>
                <div class="explanation" id="exp-${idx}"><strong>Explanation:</strong> ${item.exp}</div>
            `;
            container.appendChild(qDiv);
        });
    }

    window.selectOption = function(el, qIndex, val) {
        const parentOptions = el.parentElement;
        Array.from(parentOptions.children).forEach(child => {
            child.classList.remove('selected');
        });
        el.classList.add('selected');
        userSelections[qIndex] = val;
    };

    window.calculateScore = function() {
        let score = 0;
        randomizedQuestions.forEach((data, idx) => {
            const expDiv = document.getElementById(`exp-${idx}`);
            if (expDiv) expDiv.style.display = 'block';
            
            const questionDiv = document.querySelector(`.question[data-qidx="${idx}"]`);
            if (!questionDiv) return;
            const allOpts = questionDiv.querySelectorAll('.option');
            const correctLetter = data.correct;
            
            allOpts.forEach(opt => {
                const letter = opt.getAttribute('data-letter');
                if (letter === correctLetter) {
                    opt.classList.add('correct');
                }
                if (userSelections[idx] && userSelections[idx] === letter && letter !== correctLetter) {
                    opt.classList.add('wrong');
                }
            });
            
            if (userSelections[idx] && userSelections[idx] === data.correct) {
                score++;
            }
        });
        
        const resultsDiv = document.getElementById('results');
        resultsDiv.style.display = 'block';
        const scoreSpan = document.getElementById('scoreText');
        const percent = Math.round((score / randomizedQuestions.length) * 100);
        scoreSpan.innerHTML = `Score: ${score} / ${randomizedQuestions.length}  |  ${percent}%`;
        
        setTimeout(() => {
            resultsDiv.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }, 100);
    };

    loadQuiz();
</script>
</body>
</html>
