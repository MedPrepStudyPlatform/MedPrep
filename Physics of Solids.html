<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Physics of Solids | Physics MDCAT Mock</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(145deg, #fff7ed 0%, #ffedd5 100%);
            color: #9a3412;
            padding: 30px 20px;
            line-height: 1.55;
        }

        .quiz-container {
            max-width: 950px;
            margin: 0 auto;
            background: #ffffff;
            padding: 40px 42px;
            border-radius: 32px;
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.12), 0 5px 12px rgba(0, 0, 0, 0.05);
            border-top: 8px solid #ea580c;
            transition: all 0.2s;
        }

        h1 {
            font-family: 'Outfit', sans-serif;
            font-weight: 800;
            font-size: 2.5rem;
            background: linear-gradient(135deg, #c2410c, #ea580c);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            text-align: center;
            letter-spacing: -0.5px;
            margin-bottom: 8px;
        }

        .question {
            margin-bottom: 28px;
            padding: 20px 24px;
            border: 1px solid #fed7aa;
            border-radius: 24px;
            background: #ffffff;
            transition: box-shadow 0.2s;
            box-shadow: 0 1px 2px rgba(0,0,0,0.02);
        }

        .question:hover {
            box-shadow: 0 6px 14px rgba(234, 88, 12, 0.08);
            border-color: #fdba74;
        }

        .q-text {
            font-weight: 700;
            font-size: 1.12rem;
            margin-bottom: 18px;
            color: #9a3412;
            padding-left: 14px;
            border-left: 4px solid #ea580c;
        }

        .options {
            display: grid;
            gap: 12px;
        }

        .option {
            padding: 14px 20px;
            border: 2px solid #e2e8f0;
            border-radius: 18px;
            cursor: pointer;
            transition: all 0.2s ease;
            background: #ffffff;
            font-weight: 500;
            color: #1e293b;
        }

        .option:hover {
            border-color: #ea580c;
            background: #fff7ed;
            transform: translateX(4px);
        }

        .option.selected {
            background: #c2410c;
            color: white;
            border-color: #c2410c;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .btn-submit {
            display: block;
            width: 100%;
            padding: 18px;
            background: #ea580c;
            color: white;
            border: none;
            border-radius: 60px;
            font-weight: 800;
            font-size: 1.3rem;
            cursor: pointer;
            margin-top: 35px;
            transition: 0.2s;
            letter-spacing: 1px;
            font-family: 'Outfit', sans-serif;
            box-shadow: 0 8px 16px rgba(234, 88, 12, 0.25);
        }

        .btn-submit:hover {
            background: #c2410c;
            transform: translateY(-2px);
            box-shadow: 0 12px 20px rgba(194, 65, 12, 0.3);
        }

        #results {
            display: none;
            margin-top: 45px;
            padding: 28px 25px;
            border-radius: 28px;
            text-align: center;
            background: linear-gradient(110deg, #9a3412, #c2410c);
            color: #fff7ed;
            box-shadow: 0 12px 24px rgba(0,0,0,0.2);
        }

        #results h2 {
            font-family: 'Outfit', sans-serif;
            font-size: 2rem;
            font-weight: 800;
            letter-spacing: -0.5px;
        }

        .explanation {
            margin-top: 18px;
            font-size: 0.92rem;
            color: #9a3412;
            display: none;
            background: #fff7ed;
            padding: 16px 22px;
            border-left: 6px solid #ea580c;
            border-radius: 18px;
            font-weight: 500;
            line-height: 1.45;
        }

        .correct {
            border-color: #10b981 !important;
            background: #d1fae5 !important;
            color: #064e3b !important;
            font-weight: 700;
        }

        .wrong {
            border-color: #ef4444 !important;
            background: #fee2e2 !important;
            color: #991b1b !important;
        }

        @media (max-width: 650px) {
            .quiz-container {
                padding: 24px 18px;
            }
            .q-text {
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>
<div class="quiz-container">
    <h1>Physics of Solids</h1>
    
    <form id="quizForm">
        <div id="questionsContainer"></div>
        <button type="button" class="btn-submit" onclick="calculateScore()">Submit</button>
    </form>

    <div id="results">
        <h2 id="scoreText"></h2>
    </div>
</div>

<script>
    // 20 conceptual + numerical, high-difficulty Physics of Solids MCQs (Physics FSC Part 2, Chapter 17)
    const solidsPhysicsMcqs = [
        { q: "A wire of length 2 m and cross-sectional area 1 mm² is stretched by a force of 100 N. If the Young's modulus of the material is 2 × 10¹¹ N/m², the extension produced is:", options: ["0.5 mm", "1.0 mm", "1.5 mm", "2.0 mm"], exp: "Y = FL/(AΔL) → ΔL = FL/(AY) = (100 × 2)/(1×10⁻⁶ × 2×10¹¹) = 200/(2×10⁵) = 1×10⁻³ m = 1.0 mm.", correct: "B" },
        { q: "The ratio of stress to strain within elastic limit is called:", options: ["Young's modulus", "Bulk modulus", "Modulus of rigidity", "Poisson's ratio"], exp: "Young's modulus (E) = stress/strain for tensile or compressive deformation.", correct: "A" },
        { q: "The SI unit of stress is:", options: ["Newton", "Pascal", "Joule", "Watt"], exp: "Stress = Force/Area, unit = N/m² = Pascal (Pa).", correct: "B" },
        { q: "A force of 500 N is applied on a rod of length 1 m and cross-sectional area 5 × 10⁻⁶ m². The stress produced is:", options: ["10⁷ Pa", "10⁸ Pa", "10⁹ Pa", "10¹⁰ Pa"], exp: "Stress = F/A = 500/(5×10⁻⁶) = 100 × 10⁶ = 10⁸ Pa.", correct: "B" },
        { q: "Hooke's law states that:", options: ["Stress is proportional to strain", "Strain is proportional to stress", "Both A and B", "Stress is independent of strain"], exp: "Hooke's law: stress ∝ strain (within elastic limit). Both statements are equivalent.", correct: "C" },
        { q: "The modulus of elasticity for a perfectly rigid body is:", options: ["Zero", "Infinity", "1", "Variable"], exp: "For a perfectly rigid body, strain = 0 for any stress, so Y = stress/0 = ∞.", correct: "B" },
        { q: "The energy stored per unit volume in a stretched wire is:", options: ["½ × stress × strain", "stress × strain", "½ × stress² × strain", "stress²/strain"], exp: "Elastic potential energy per unit volume = ½ × stress × strain = ½ Y (strain)².", correct: "A" },
        { q: "The bulk modulus (K) is defined as:", options: ["Normal stress / volumetric strain", "Shear stress / shear strain", "Tensile stress / tensile strain", "Pressure / volume change"], exp: "Bulk modulus = volumetric stress (pressure) / volumetric strain = -ΔP/(ΔV/V).", correct: "A" },
        { q: "The modulus of rigidity (η) is defined as:", options: ["Shear stress / shear strain", "Tensile stress / tensile strain", "Volumetric stress / volumetric strain", "Pressure / volume change"], exp: "Modulus of rigidity (shear modulus) = shear stress / shear strain.", correct: "A" },
        { q: "A copper wire of length 1.5 m and cross-sectional area 0.5 mm² is stretched by a force of 50 N. If Young's modulus of copper is 1.2 × 10¹¹ N/m², the strain is:", options: ["8.33 × 10⁻⁴", "1.67 × 10⁻³", "3.33 × 10⁻⁴", "4.17 × 10⁻⁴"], exp: "Stress = F/A = 50/(0.5×10⁻⁶) = 10⁸ Pa. Strain = stress/Y = 10⁸/(1.2×10¹¹) = 8.33 × 10⁻⁴.", correct: "A" },
        { q: "The breaking stress of a material is 10⁹ N/m². The maximum length of a wire of this material that can hang vertically without breaking is (density = 8 × 10³ kg/m³, g = 10 m/s²):", options: ["12.5 km", "12.5 m", "12.5 cm", "125 m"], exp: "Stress = weight/area = (ρALg)/A = ρLg. L = stress/(ρg) = 10⁹/(8×10³×10) = 10⁹/(8×10⁴) = 1.25×10⁴ m = 12.5 km.", correct: "A" },
        { q: "The ratio of lateral strain to longitudinal strain is called:", options: ["Poisson's ratio", "Young's modulus", "Bulk modulus", "Modulus of rigidity"], exp: "Poisson's ratio (σ) = - (lateral strain)/(longitudinal strain).", correct: "A" },
        { q: "For an ideal incompressible elastic material, Poisson's ratio is:", options: ["0.5", "1", "0", "0.25"], exp: "For an ideal incompressible material, Poisson's ratio is 0.5. Rubber approximates this. Most metals have Poisson's ratio ~0.3.", correct: "A" },
        { q: "The energy bands in solids are formed due to:", options: ["Overlapping of atomic orbitals", "Thermal vibrations", "Impurities", "Magnetic fields"], exp: "When atoms come close to form a solid, their energy levels split and overlap to form continuous bands.", correct: "A" },
        { q: "In conductors, the valence band and conduction band:", options: ["Overlap", "Have a small gap", "Have a large gap", "Are completely separated"], exp: "In conductors (metals), the valence and conduction bands overlap, allowing free electron movement.", correct: "A" },
        { q: "In insulators, the band gap is:", options: ["Large (>3 eV)", "Small (~1 eV)", "Zero", "Negative"], exp: "Insulators have a large band gap (>3 eV), preventing electron excitation to conduction band.", correct: "A" },
        { q: "The process of adding impurities to a semiconductor to increase its conductivity is called:", options: ["Doping", "Annealing", "Quenching", "Alloying"], exp: "Doping intentionally introduces impurities (dopants) to modify semiconductor properties.", correct: "A" },
        { q: "A stress of 10⁶ N/m² produces a strain of 5 × 10⁻⁴ in a material. The Young's modulus is:", options: ["2 × 10⁹ N/m²", "2 × 10¹⁰ N/m²", "5 × 10⁹ N/m²", "5 × 10¹⁰ N/m²"], exp: "Y = stress/strain = 10⁶/(5×10⁻⁴) = 2 × 10⁹ N/m².", correct: "A" },
        { q: "The maximum stress that a material can withstand without permanent deformation is called:", options: ["Ultimate tensile strength", "Yield strength", "Breaking stress", "Elastic limit"], exp: "Elastic limit is the maximum stress without permanent (plastic) deformation. Yield strength is the stress at which plastic deformation begins.", correct: "D" },
        { q: "A rubber band is stretched and then released. It returns to its original shape. This behavior is called:", options: ["Plasticity", "Elasticity", "Viscosity", "Ductility"], exp: "Elasticity is the ability to return to original shape after removal of deforming force.", correct: "B" }
    ];

    // Shuffle questions for randomized order each load
    function shuffleArray(arr) {
        for (let i = arr.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [arr[i], arr[j]] = [arr[j], arr[i]];
        }
        return arr;
    }

    let randomizedQuestions = [];
    let userSelections = {};
    let quizSubmitted = false;

    function loadQuiz() {
        quizSubmitted = false;
        randomizedQuestions = shuffleArray([...solidsPhysicsMcqs]);
        const container = document.getElementById('questionsContainer');
        container.innerHTML = '';
        userSelections = {};

        randomizedQuestions.forEach((item, idx) => {
            const qDiv = document.createElement('div');
            qDiv.className = 'question';
            qDiv.setAttribute('data-qidx', idx);
            qDiv.innerHTML = `
                <div class="q-text">${idx + 1}. ${item.q}</div>
                <div class="options">
                    ${item.options.map((opt, optIdx) => {
                        const letter = String.fromCharCode(65 + optIdx);
                        return `<div class="option" data-letter="${letter}" onclick="selectOption(this, ${idx}, '${letter}')">
                            ${letter}. ${opt}
                        </div>`;
                    }).join('')}
                </div>
                <div class="explanation" id="exp-${idx}"><strong>Explanation:</strong> ${item.exp}</div>
            `;
            container.appendChild(qDiv);
        });
    }

    window.selectOption = function(el, qIndex, val) {
        if (quizSubmitted) return;
        const parentOptions = el.parentElement;
        Array.from(parentOptions.children).forEach(child => {
            child.classList.remove('selected');
        });
        el.classList.add('selected');
        userSelections[qIndex] = val;
    };

    window.calculateScore = function() {
        if (quizSubmitted) return;
        quizSubmitted = true;
        
        let score = 0;
        randomizedQuestions.forEach((data, idx) => {
            const expDiv = document.getElementById(`exp-${idx}`);
            if (expDiv) expDiv.style.display = 'block';
            
            const questionDiv = document.querySelector(`.question[data-qidx="${idx}"]`);
            if (!questionDiv) return;
            const allOpts = questionDiv.querySelectorAll('.option');
            const correctLetter = data.correct;
            
            allOpts.forEach(opt => {
                const letter = opt.getAttribute('data-letter');
                if (letter === correctLetter) {
                    opt.classList.add('correct');
                }
                if (userSelections[idx] && userSelections[idx] === letter && letter !== correctLetter) {
                    opt.classList.add('wrong');
                }
            });
            
            if (userSelections[idx] && userSelections[idx] === data.correct) {
                score++;
            }
        });
        
        const resultsDiv = document.getElementById('results');
        resultsDiv.style.display = 'block';
        const scoreSpan = document.getElementById('scoreText');
        const percent = Math.round((score / randomizedQuestions.length) * 100);
        scoreSpan.innerHTML = `Score: ${score} / ${randomizedQuestions.length}  |  ${percent}%`;
        
        setTimeout(() => {
            resultsDiv.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }, 100);
    };

    loadQuiz();
</script>
</body>
</html>
