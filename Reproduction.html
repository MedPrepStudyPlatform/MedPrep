<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reproduction: Randomized MDCAT Mock</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Outfit:wght@700&display=swap" rel="stylesheet">
    <style>
        /* Theme: Rose & Crimson */
        body { font-family: 'Inter', sans-serif; background: #fff5f6; color: #2d3436; padding: 20px; line-height: 1.6; }
        .quiz-container { max-width: 850px; margin: 0 auto; background: white; padding: 40px; border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); border-top: 10px solid #e84393; }
        h1 { font-family: 'Outfit', sans-serif; color: #d63031; text-align: center; margin-bottom: 5px; }
        .subtitle { text-align: center; color: #636e72; font-weight: 700; margin-bottom: 35px; text-transform: uppercase; letter-spacing: 1.5px; font-size: 0.9rem; }
        .question { margin-bottom: 35px; padding: 25px; border: 1px solid #dfe6e9; border-radius: 15px; background: #ffffff; }
        .q-text { font-weight: 600; font-size: 1.1rem; margin-bottom: 20px; color: #2c3e50; }
        .options { display: grid; gap: 12px; }
        .option { padding: 16px 20px; border: 2px solid #f1f2f6; border-radius: 12px; cursor: pointer; transition: 0.2s; background: #ffffff; }
        .option:hover { border-color: #e84393; background: #fff0f3; }
        .option.selected { background: #2d3436; color: white; border-color: #2d3436; }
        .btn-submit { display: block; width: 100%; padding: 20px; background: #e84393; color: white; border: none; border-radius: 50px; font-weight: 700; font-size: 1.3rem; cursor: pointer; margin-top: 30px; transition: 0.3s; }
        .btn-submit:hover { background: #c42d7a; transform: translateY(-2px); }
        #results { display: none; margin-top: 40px; padding: 30px; border-radius: 20px; text-align: center; background: #2d3436; color: white; }
        .explanation { margin-top: 15px; font-size: 0.95rem; color: #2d3748; display: none; background: #fff0f3; padding: 18px; border-left: 6px solid #e84393; border-radius: 8px; }
        .correct { border-color: #2ecc71 !important; background: #e8f8f0 !important; color: #145a32; font-weight: bold; }
        .wrong { border-color: #e74c3c !important; background: #fdedec !important; color: #1c2e36; }
    </style>
</head>
<body>

<div class="quiz-container">
    <h1>Reproduction</h1>
    
    
    <form id="quizForm">
        <div id="questionsContainer"></div>
        <button type="button" class="btn-submit" onclick="calculateScore()">Submit</button>
    </form>

    <div id="results">
        <h2 id="scoreText"></h2>
        
    </div>
</div>

<script>
    const reproductionData = [
        { q: "The process by which an unfertilized egg develops into a new individual is called:", options: ["Budding", "Fragmentation", "Parthenogenesis", "Regeneration"], exp: "Parthenogenesis is a form of asexual reproduction common in some insects, rotifers, and lizards.", correct: "C" },
        { q: "In the human male, sperm production (spermatogenesis) occurs in the:", options: ["Epididymis", "Seminiferous tubules", "Vas deferens", "Prostate gland"], exp: "Spermatogenesis occurs within the seminiferous tubules of the testes.", correct: "B" },
        { q: "Which hormone triggers ovulation in the human female cycle?", options: ["FSH", "Estrogen", "LH", "Progesterone"], exp: "A surge in Luteinizing Hormone (LH) around day 14 triggers the release of the secondary oocyte.", correct: "C" },
        { q: "Where does fertilization typically occur in the human female reproductive tract?", options: ["Uterus", "Cervix", "Ovary", "Fallopian tube (Oviduct)"], exp: "Fertilization usually happens in the ampulla region of the fallopian tube.", correct: "D" },
        { q: "The 'Triple Fusion' in angiosperms results in the formation of:", options: ["Zygote", "Endosperm", "Seed coat", "Fruit"], exp: "One sperm fuses with the egg (zygote), and the second sperm fuses with two polar nuclei to form the triploid (3n) endosperm.", correct: "B" },
        { q: "Which part of the sperm contains enzymes to penetrate the egg's jelly coat?", options: ["Tail", "Mitochondria", "Acrosome", "Nucleus"], exp: "The acrosome is a cap-like structure containing hydrolytic enzymes.", correct: "C" },
        { q: "The hormone produced by the corpus luteum to maintain the uterine lining is:", options: ["LH", "FSH", "Progesterone", "Oxytocin"], exp: "Progesterone thickens and maintains the endometrium for potential implantation.", correct: "C" },
        { q: "In plants, the 'Gametophyte' generation is:", options: ["Diploid and produces spores", "Haploid and produces gametes", "Diploid and produces gametes", "Haploid and produces spores"], exp: "The gametophyte (n) produces gametes via mitosis.", correct: "B" },
        { q: "The primary function of the Interstitial cells (Leydig cells) in the testes is to produce:", options: ["Sperm", "Inhibin", "Testosterone", "Estrogen"], exp: "Leydig cells secrete testosterone in response to LH stimulation.", correct: "C" },
        { q: "Implantation of the blastocyst into the uterine wall usually occurs how many days after fertilization?", options: ["1 day", "3 days", "7 days", "14 days"], exp: "Implantation typically begins about 6-7 days post-fertilization.", correct: "C" },
        { q: "Which of the following is a 'Primary' sexual characteristic in males?", options: ["Facial hair", "Deep voice", "Presence of testes", "Increased muscle mass"], exp: "Primary characteristics are those directly involved in reproduction (gonads and genitalia).", correct: "C" },
        { q: "During oogenesis, the first polar body is formed after the completion of:", options: ["Mitosis", "Meiosis I", "Meiosis II", "Fertilization"], exp: "Meiosis I results in a large secondary oocyte and a small first polar body.", correct: "B" },
        { q: "Identical (monozygotic) twins result from:", options: ["Two eggs fertilized by two sperm", "One egg fertilized by two sperm", "One embryo splitting into two", "Two eggs fertilized by one sperm"], exp: "Identical twins come from a single zygote that splits early in development.", correct: "C" },
        { q: "Which embryonic membrane is involved in the formation of the placenta in mammals?", options: ["Amnion", "Chorion", "Yolk sac", "Allantois"], exp: "The chorion develops finger-like villi that form the fetal portion of the placenta.", correct: "B" },
        { q: "The 'Menstrual Phase' of the uterine cycle is triggered by a drop in:", options: ["FSH and LH", "Estrogen and Progesterone", "Testosterone", "Prolactin"], exp: "The degeneration of the corpus luteum causes a drop in progesterone, leading to the shedding of the endometrium.", correct: "B" },
        { q: "In angiosperms, the pollen grain represents the:", options: ["Male sporophyte", "Male gametophyte", "Microspore", "Sperm cell"], exp: "The pollen grain is the immature male gametophyte.", correct: "B" },
        { q: "Which hormone is detected in home pregnancy tests?", options: ["Estrogen", "Progesterone", "hCG", "Oxytocin"], exp: "Human Chorionic Gonadotropin (hCG) is produced by the developing placenta.", correct: "C" },
        { q: "Sertoli cells provide nutrition and support to developing:", options: ["Oocytes", "Spermatozoa", "Leydig cells", "Follicles"], exp: "Sertoli cells (nurse cells) are essential for the maturation of sperm.", correct: "B" },
        { q: "The fluid-filled sac that protects the developing fetus from mechanical shock is the:", options: ["Chorion", "Amnion", "Allantois", "Yolk sac"], exp: "The amnion contains amniotic fluid which cushions the embryo.", correct: "B" },
        { q: "A seed is a mature:", options: ["Ovary", "Ovule", "Anther", "Stigma"], exp: "After fertilization, the ovule develops into a seed and the ovary develops into a fruit.", correct: "B" }
    ];

    function loadQuiz() {
        const container = document.getElementById('questionsContainer');
        reproductionData.forEach((data, index) => {
            const qDiv = document.createElement('div');
            qDiv.className = 'question';
            qDiv.innerHTML = `
                <div class="q-text">${index + 1}. ${data.q}</div>
                <div class="options">
                    ${data.options.map((opt, i) => `
                        <div class="option" onclick="selectOption(this, ${index}, '${String.fromCharCode(65 + i)}')">
                            ${String.fromCharCode(65 + i)}. ${opt}
                        </div>
                    `).join('')}
                </div>
                <div class="explanation" id="exp-${index}"><strong>Explanation:</strong> ${data.exp}</div>
            `;
            container.appendChild(qDiv);
        });
    }

    let userAnswers = {};
    function selectOption(el, qIndex, val) {
        const parent = el.parentElement;
        Array.from(parent.children).forEach(child => child.classList.remove('selected'));
        el.classList.add('selected');
        userAnswers[qIndex] = val;
    }

    function calculateScore() {
        let score = 0;
        reproductionData.forEach((data, index) => {
            document.getElementById(`exp-${index}`).style.display = 'block';
            const options = document.querySelectorAll(`.question:nth-child(${index + 1}) .option`);
            options.forEach((opt, i) => {
                const letter = String.fromCharCode(65 + i);
                if (letter === data.correct) opt.classList.add('correct');
                if (userAnswers[index] === letter && letter !== data.correct) opt.classList.add('wrong');
            });
            if (userAnswers[index] === data.correct) score++;
        });

        const resultsDiv = document.getElementById('results');
        resultsDiv.style.display = 'block';
        document.getElementById('scoreText').innerText = `Your Score: ${score} / ${reproductionData.length}`;
        window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
    }
    loadQuiz();
</script>

</body>
</html>
