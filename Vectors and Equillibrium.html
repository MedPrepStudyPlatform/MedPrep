<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vectors & Equilibrium | Physics MDCAT Mock</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(145deg, #ecfdf5 0%, #d1fae5 100%);
            color: #065f46;
            padding: 30px 20px;
            line-height: 1.55;
        }

        .quiz-container {
            max-width: 950px;
            margin: 0 auto;
            background: #ffffff;
            padding: 40px 42px;
            border-radius: 32px;
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.12), 0 5px 12px rgba(0, 0, 0, 0.05);
            border-top: 8px solid #0d9488;
            transition: all 0.2s;
        }

        h1 {
            font-family: 'Outfit', sans-serif;
            font-weight: 800;
            font-size: 2.5rem;
            background: linear-gradient(135deg, #0f766e, #0d9488);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            text-align: center;
            letter-spacing: -0.5px;
            margin-bottom: 8px;
        }

        .subtitle {
            display: none;
        }

        .question {
            margin-bottom: 28px;
            padding: 20px 24px;
            border: 1px solid #99f6e4;
            border-radius: 24px;
            background: #ffffff;
            transition: box-shadow 0.2s;
            box-shadow: 0 1px 2px rgba(0,0,0,0.02);
        }

        .question:hover {
            box-shadow: 0 6px 14px rgba(13, 148, 136, 0.08);
            border-color: #5eead4;
        }

        .q-text {
            font-weight: 700;
            font-size: 1.12rem;
            margin-bottom: 18px;
            color: #065f46;
            padding-left: 14px;
            border-left: 4px solid #0d9488;
        }

        .options {
            display: grid;
            gap: 12px;
        }

        .option {
            padding: 14px 20px;
            border: 2px solid #e2e8f0;
            border-radius: 18px;
            cursor: pointer;
            transition: all 0.2s ease;
            background: #ffffff;
            font-weight: 500;
            color: #1e293b;
        }

        .option:hover {
            border-color: #0d9488;
            background: #ecfdf5;
            transform: translateX(4px);
        }

        .option.selected {
            background: #0f766e;
            color: white;
            border-color: #0f766e;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .btn-submit {
            display: block;
            width: 100%;
            padding: 18px;
            background: #0d9488;
            color: white;
            border: none;
            border-radius: 60px;
            font-weight: 800;
            font-size: 1.3rem;
            cursor: pointer;
            margin-top: 35px;
            transition: 0.2s;
            letter-spacing: 1px;
            font-family: 'Outfit', sans-serif;
            box-shadow: 0 8px 16px rgba(13, 148, 136, 0.25);
        }

        .btn-submit:hover {
            background: #0f766e;
            transform: translateY(-2px);
            box-shadow: 0 12px 20px rgba(15, 118, 110, 0.3);
        }

        #results {
            display: none;
            margin-top: 45px;
            padding: 28px 25px;
            border-radius: 28px;
            text-align: center;
            background: linear-gradient(110deg, #065f46, #0f766e);
            color: #ecfdf5;
            box-shadow: 0 12px 24px rgba(0,0,0,0.2);
        }

        #results h2 {
            font-family: 'Outfit', sans-serif;
            font-size: 2rem;
            font-weight: 800;
            letter-spacing: -0.5px;
        }

        .explanation {
            margin-top: 18px;
            font-size: 0.92rem;
            color: #065f46;
            display: none;
            background: #ecfdf5;
            padding: 16px 22px;
            border-left: 6px solid #0d9488;
            border-radius: 18px;
            font-weight: 500;
            line-height: 1.45;
        }

        .correct {
            border-color: #10b981 !important;
            background: #d1fae5 !important;
            color: #064e3b !important;
            font-weight: 700;
        }

        .wrong {
            border-color: #ef4444 !important;
            background: #fee2e2 !important;
            color: #991b1b !important;
        }

        @media (max-width: 650px) {
            .quiz-container {
                padding: 24px 18px;
            }
            .q-text {
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>
<div class="quiz-container">
    <h1>Vectors & Equilibrium</h1>
    <div style="text-align: center;"></div>
    
    <form id="quizForm">
        <div id="questionsContainer"></div>
        <button type="button" class="btn-submit" onclick="calculateScore()">Submit</button>
    </form>

    <div id="results">
        <h2 id="scoreText"></h2>
    </div>
</div>

<script>
    // 20 conceptual + numerical, high-difficulty Vectors & Equilibrium MCQs (Physics FSC Part 1, Chapter 2)
    // CORRECTED VERSION - All issues fixed
    const vectorsMcqs = [
        { q: "Two vectors A and B have magnitudes 5 and 7 respectively. The magnitude of their resultant cannot be:", options: ["2", "5", "10", "13"], exp: "The magnitude of resultant lies between |A-B| = 2 and |A+B| = 12 inclusive. 13 > 12, so it cannot be the resultant.", correct: "D" },
        { q: "The dot product of two vectors A = 3i + 4j and B = 2i - j + k is:", options: ["2", "6", "10", "12"], exp: "A · B = (3)(2) + (4)(-1) + (0)(1) = 6 - 4 + 0 = 2.", correct: "A" },
        { q: "A force of 10 N is acting at an angle of 60° with the horizontal. Its horizontal component is:", options: ["5 N", "5√3 N", "10 N", "0 N"], exp: "Horizontal component = F cosθ = 10 × cos60° = 10 × 0.5 = 5 N.", correct: "A" },
        { q: "Two forces of magnitudes 3 N and 4 N act at a point. The magnitude of their resultant when they are perpendicular to each other is:", options: ["1 N", "5 N", "7 N", "12 N"], exp: "Resultant = √(3² + 4²) = √(9+16) = √25 = 5 N.", correct: "B" },
        { q: "The cross product of two parallel vectors is:", options: ["Zero", "Maximum", "Minimum", "Unit vector"], exp: "|A × B| = |A||B|sinθ. For parallel vectors, θ = 0° or 180°, sinθ = 0, so cross product is zero vector.", correct: "A" },
        { q: "If the sum of two unit vectors is also a unit vector, the angle between them is:", options: ["0°", "60°", "90°", "120°"], exp: "|A + B|² = 1 + 1 + 2cosθ = 2 + 2cosθ. Given |A + B| = 1, so 1 = 2 + 2cosθ → 2cosθ = -1 → cosθ = -1/2 → θ = 120°.", correct: "D" },
        { q: "A vector of magnitude 10 units makes an angle of 30° with the x-axis. Its y-component is:", options: ["5 units", "5√3 units", "10 units", "10√3 units"], exp: "y-component = magnitude × sinθ = 10 × sin30° = 10 × 0.5 = 5 units.", correct: "A" },
        { q: "The torque (moment of force) is maximum when the angle between force and position vector is:", options: ["0°", "45°", "90°", "180°"], exp: "Torque = r × F = rF sinθ. Maximum when sinθ is maximum, i.e., θ = 90°.", correct: "C" },
        { q: "The scalar product of two vectors A and B is maximum when the angle between them is:", options: ["0°", "45°", "90°", "180°"], exp: "A·B = |A||B|cosθ. Maximum when cosθ = 1, i.e., θ = 0° (parallel vectors).", correct: "A" },
        { q: "Three forces of magnitudes 5 N, 6 N, and 7 N act at a point. Which of the following cannot be the magnitude of their resultant?", options: ["0 N", "5 N", "19 N", "18 N"], exp: "The maximum possible resultant is 5+6+7 = 18 N. 19 N is greater than 18, so it cannot be the resultant. 0 N is possible if vectors form a closed triangle (5+6>7). 5 N and 18 N are also possible.", correct: "C" },
        { q: "The angle between vectors A = i + j and B = i - j is:", options: ["0°", "45°", "90°", "180°"], exp: "A·B = (1)(1)+(1)(-1)=1-1=0, so cosθ=0, θ=90°.", correct: "C" },
        { q: "The condition for translational equilibrium of a body is:", options: ["Sum of all torques = 0", "Sum of all forces = 0", "Sum of all velocities = 0", "Sum of all accelerations = 0"], exp: "For translational equilibrium, the vector sum of all forces acting on the body must be zero. For rotational equilibrium, sum of torques must be zero.", correct: "B" },
        { q: "A body is in equilibrium under the action of three concurrent forces. The forces are 5 N, 6 N, and 7 N. The angle between the 5 N and 6 N forces is approximately:", options: ["30°", "45°", "60°", "78°"], exp: "Using triangle of forces and law of cosines: 7² = 5² + 6² + 2×5×6×cosφ, where φ is the angle between 5 and 6. 49 = 25+36+60cosφ → 49=61+60cosφ → -12=60cosφ → cosφ=-0.2 → φ=101.5°. The angle between the forces (tail to tail) is 180° - 101.5° = 78.5° ≈ 78°.", correct: "D" },
        { q: "If the resultant of two forces is perpendicular to the smaller force, and the magnitude of the larger force is 10 N, while the resultant is 8 N, the magnitude of the smaller force is:", options: ["4 N", "6 N", "8 N", "10 N"], exp: "Let smaller force = F. Resultant R = 8 N is perpendicular to F. Then the larger force (10 N) is the hypotenuse of a right triangle with sides F and R. So 10² = F² + 8² → 100 = F² + 64 → F² = 36 → F = 6 N.", correct: "B" },
        { q: "The cross product of A = 2i + 3j + 4k and B = i - 2j + k is:", options: ["11i + 2j - 7k", "11i - 2j - 7k", "-11i + 2j + 7k", "11i - 2j + 7k"], exp: "A × B = determinant |i j k; 2 3 4; 1 -2 1| = i(3×1 - 4×(-2)) - j(2×1 - 4×1) + k(2×(-2) - 3×1) = i(3+8) - j(2-4) + k(-4-3) = 11i - j(-2) - 7k = 11i + 2j - 7k.", correct: "A" },
        { q: "The torque of a force F = 2i + 3j N acting at a point r = i + 2j m about the origin is:", options: ["k Nm", "-k Nm", "2k Nm", "-2k Nm"], exp: "Torque τ = r × F = (i + 2j) × (2i + 3j) = i×2i + i×3j + 2j×2i + 2j×3j = 0 + 3k + 4(-k) + 0 = 3k - 4k = -k Nm.", correct: "B" },
        { q: "The minimum number of non-coplanar forces required to keep a body in equilibrium is:", options: ["2", "3", "4", "6"], exp: "Three non-coplanar forces can keep a body in equilibrium if they are concurrent and their vector sum is zero. Two forces would require them to be equal and opposite but collinear, which is a special case. Generally, for non-coplanar, minimum 3 forces are required.", correct: "B" },
        { q: "The resultant of two vectors A and B is perpendicular to A. If |A| = 3 N and |B| = 5 N, the angle between A and B is:", options: ["30°", "53°", "90°", "127°"], exp: "Let angle between A and B be θ. Resultant R is perpendicular to A, so A·R = 0. Also R = A + B, so A·(A+B)=0 → |A|² + A·B = 0 → 9 + (3)(5)cosθ = 0 → 9 + 15cosθ = 0 → cosθ = -9/15 = -3/5 = -0.6 → θ = 126.87° ≈ 127°.", correct: "D" },
        { q: "A particle is in equilibrium under four concurrent forces. If three of them are 2 N east, 3 N north, and 4 N west, the fourth force is:", options: ["2 N east", "2 N west", "3 N south", "√13 N south-east"], correct: "D", exp: "Sum of x-components = 2 - 4 = -2 N (2 N west). Sum of y-components = 3 N north. For equilibrium, fourth force must be 2 N east and 3 N south. Magnitude = √(2²+3²)=√13 N, direction south-east." },
        { q: "The angle between two vectors A = i + j and B = i - j is:", options: ["0°", "45°", "90°", "180°"], exp: "A·B = (1)(1) + (1)(-1) + (0)(0) = 1 - 1 = 0, so cosθ = 0 → θ = 90°.", correct: "C" }
    ];

    // Shuffle questions for randomized order each load
    function shuffleArray(arr) {
        for (let i = arr.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [arr[i], arr[j]] = [arr[j], arr[i]];
        }
        return arr;
    }

    let randomizedQuestions = [];
    let userSelections = {};

    function loadQuiz() {
        randomizedQuestions = shuffleArray([...vectorsMcqs]);
        const container = document.getElementById('questionsContainer');
        container.innerHTML = '';
        userSelections = {};

        randomizedQuestions.forEach((item, idx) => {
            const qDiv = document.createElement('div');
            qDiv.className = 'question';
            qDiv.setAttribute('data-qidx', idx);
            qDiv.innerHTML = `
                <div class="q-text">${idx + 1}. ${item.q}</div>
                <div class="options">
                    ${item.options.map((opt, optIdx) => {
                        const letter = String.fromCharCode(65 + optIdx);
                        return `<div class="option" data-letter="${letter}" onclick="selectOption(this, ${idx}, '${letter}')">
                            ${letter}. ${opt}
                        </div>`;
                    }).join('')}
                </div>
                <div class="explanation" id="exp-${idx}"><strong>Explanation:</strong> ${item.exp}</div>
            `;
            container.appendChild(qDiv);
        });
    }

    window.selectOption = function(el, qIndex, val) {
        const parentOptions = el.parentElement;
        Array.from(parentOptions.children).forEach(child => {
            child.classList.remove('selected');
        });
        el.classList.add('selected');
        userSelections[qIndex] = val;
    };

    window.calculateScore = function() {
        let score = 0;
        randomizedQuestions.forEach((data, idx) => {
            const expDiv = document.getElementById(`exp-${idx}`);
            if (expDiv) expDiv.style.display = 'block';
            
            const questionDiv = document.querySelector(`.question[data-qidx="${idx}"]`);
            if (!questionDiv) return;
            const allOpts = questionDiv.querySelectorAll('.option');
            const correctLetter = data.correct;
            
            allOpts.forEach(opt => {
                const letter = opt.getAttribute('data-letter');
                if (letter === correctLetter) {
                    opt.classList.add('correct');
                }
                if (userSelections[idx] && userSelections[idx] === letter && letter !== correctLetter) {
                    opt.classList.add('wrong');
                }
            });
            
            if (userSelections[idx] && userSelections[idx] === data.correct) {
                score++;
            }
        });
        
        const resultsDiv = document.getElementById('results');
        resultsDiv.style.display = 'block';
        const scoreSpan = document.getElementById('scoreText');
        const percent = Math.round((score / randomizedQuestions.length) * 100);
        scoreSpan.innerHTML = `Score: ${score} / ${randomizedQuestions.length}  |  ${percent}%`;
        
        setTimeout(() => {
            resultsDiv.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }, 100);
    };

    loadQuiz();
</script>
</body>
</html>
