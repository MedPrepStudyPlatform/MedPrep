<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Work and Energy | Physics MDCAT Mock</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(145deg, #f3e8ff 0%, #e9d5ff 100%);
            color: #5b21b6;
            padding: 30px 20px;
            line-height: 1.55;
        }

        .quiz-container {
            max-width: 950px;
            margin: 0 auto;
            background: #ffffff;
            padding: 40px 42px;
            border-radius: 32px;
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.12), 0 5px 12px rgba(0, 0, 0, 0.05);
            border-top: 8px solid #8b5cf6;
            transition: all 0.2s;
        }

        h1 {
            font-family: 'Outfit', sans-serif;
            font-weight: 800;
            font-size: 2.5rem;
            background: linear-gradient(135deg, #6d28d9, #8b5cf6);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            text-align: center;
            letter-spacing: -0.5px;
            margin-bottom: 8px;
        }

        .subtitle {
            display: none;
        }

        .question {
            margin-bottom: 28px;
            padding: 20px 24px;
            border: 1px solid #d8b4fe;
            border-radius: 24px;
            background: #ffffff;
            transition: box-shadow 0.2s;
            box-shadow: 0 1px 2px rgba(0,0,0,0.02);
        }

        .question:hover {
            box-shadow: 0 6px 14px rgba(139, 92, 246, 0.08);
            border-color: #c084fc;
        }

        .q-text {
            font-weight: 700;
            font-size: 1.12rem;
            margin-bottom: 18px;
            color: #5b21b6;
            padding-left: 14px;
            border-left: 4px solid #8b5cf6;
        }

        .options {
            display: grid;
            gap: 12px;
        }

        .option {
            padding: 14px 20px;
            border: 2px solid #e2e8f0;
            border-radius: 18px;
            cursor: pointer;
            transition: all 0.2s ease;
            background: #ffffff;
            font-weight: 500;
            color: #1e293b;
        }

        .option:hover {
            border-color: #8b5cf6;
            background: #f3e8ff;
            transform: translateX(4px);
        }

        .option.selected {
            background: #6d28d9;
            color: white;
            border-color: #6d28d9;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .btn-submit {
            display: block;
            width: 100%;
            padding: 18px;
            background: #8b5cf6;
            color: white;
            border: none;
            border-radius: 60px;
            font-weight: 800;
            font-size: 1.3rem;
            cursor: pointer;
            margin-top: 35px;
            transition: 0.2s;
            letter-spacing: 1px;
            font-family: 'Outfit', sans-serif;
            box-shadow: 0 8px 16px rgba(139, 92, 246, 0.25);
        }

        .btn-submit:hover {
            background: #6d28d9;
            transform: translateY(-2px);
            box-shadow: 0 12px 20px rgba(109, 40, 217, 0.3);
        }

        #results {
            display: none;
            margin-top: 45px;
            padding: 28px 25px;
            border-radius: 28px;
            text-align: center;
            background: linear-gradient(110deg, #5b21b6, #6d28d9);
            color: #f3e8ff;
            box-shadow: 0 12px 24px rgba(0,0,0,0.2);
        }

        #results h2 {
            font-family: 'Outfit', sans-serif;
            font-size: 2rem;
            font-weight: 800;
            letter-spacing: -0.5px;
        }

        .explanation {
            margin-top: 18px;
            font-size: 0.92rem;
            color: #5b21b6;
            display: none;
            background: #f3e8ff;
            padding: 16px 22px;
            border-left: 6px solid #8b5cf6;
            border-radius: 18px;
            font-weight: 500;
            line-height: 1.45;
        }

        .correct {
            border-color: #10b981 !important;
            background: #d1fae5 !important;
            color: #064e3b !important;
            font-weight: 700;
        }

        .wrong {
            border-color: #ef4444 !important;
            background: #fee2e2 !important;
            color: #991b1b !important;
        }

        @media (max-width: 650px) {
            .quiz-container {
                padding: 24px 18px;
            }
            .q-text {
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>
<div class="quiz-container">
    <h1>Work and Energy</h1>
    <div style="text-align: center;"></div>
    
    <form id="quizForm">
        <div id="questionsContainer"></div>
        <button type="button" class="btn-submit" onclick="calculateScore()">Submit</button>
    </form>

    <div id="results">
        <h2 id="scoreText"></h2>
    </div>
</div>

<script>
    // 20 conceptual + numerical, high-difficulty Work and Energy MCQs (Physics FSC Part 1, Chapter 4)
    const workEnergyMcqs = [
        { q: "A force of 10 N acts on a body at an angle of 60° to the horizontal. The body moves a distance of 5 m along the horizontal. The work done by the force is:", options: ["25 J", "50 J", "43.3 J", "25√3 J"], exp: "Work = F × d × cosθ = 10 × 5 × cos60° = 50 × 0.5 = 25 J.", correct: "A" },
        { q: "The kinetic energy of a body of mass 2 kg moving with a speed of 10 m/s is:", options: ["50 J", "100 J", "200 J", "400 J"], exp: "KE = ½ mv² = ½ × 2 × (10)² = 1 × 100 = 100 J.", correct: "B" },
        { q: "A body of mass 5 kg is lifted vertically upward through a height of 2 m. The gain in potential energy is (g = 10 m/s²):", options: ["10 J", "50 J", "100 J", "200 J"], exp: "PE = mgh = 5 × 10 × 2 = 100 J.", correct: "C" },
        { q: "A 1000 kg car is moving with a speed of 20 m/s. The brakes are applied and it comes to rest after traveling 50 m. The average braking force is:", options: ["2000 N", "4000 N", "5000 N", "8000 N"], exp: "Work done by brakes = change in KE = ½ × 1000 × (20² - 0²) = 500 × 400 = 200,000 J. Work = F × d → F = 200000/50 = 4000 N.", correct: "B" },
        { q: "A particle of mass m is projected at an angle θ with the horizontal with speed u. The kinetic energy at the highest point is:", options: ["½ mu²", "½ mu² cos²θ", "½ mu² sin²θ", "0"], exp: "At highest point, vertical component of velocity becomes zero, horizontal component = u cosθ. KE = ½ m (u cosθ)² = ½ mu² cos²θ.", correct: "B" },
        { q: "If the speed of a body is doubled, its kinetic energy becomes:", options: ["2 times", "4 times", "8 times", "16 times"], exp: "KE ∝ v², so if v becomes 2v, KE becomes 4 times.", correct: "B" },
        { q: "A body is dropped from a height h. The ratio of its kinetic energy to potential energy at height h/2 is:", options: ["1:1", "1:2", "2:1", "1:4"], exp: "At height h/2, PE = mg(h/2). Loss in PE = mg(h - h/2) = mgh/2 = gain in KE. So KE = mgh/2, PE = mgh/2, ratio = 1:1.", correct: "A" },
        { q: "The work done in raising a body of mass m to a height h above the ground is:", options: ["mgh", "mgh/2", "2mgh", "0"], exp: "Work done against gravity = mgh (force × displacement = mg × h).", correct: "A" },
        { q: "A force F = (2i + 3j) N acts on a body and produces a displacement d = (4i - 2j) m. The work done is:", options: ["2 J", "8 J", "14 J", "20 J"], exp: "Work = F·d = (2)(4) + (3)(-2) = 8 - 6 = 2 J.", correct: "A" },
        { q: "The power of a motor that can lift 100 kg of water per minute from a well 20 m deep is (g = 10 m/s²):", options: ["200 W", "333.3 W", "500 W", "1000 W"], exp: "Work per minute = mgh = 100 × 10 × 20 = 20000 J. Time = 60 s. Power = 20000/60 = 333.33 W.", correct: "B" },
        { q: "A body of mass 2 kg is moving with a kinetic energy of 100 J. Its momentum is:", options: ["10 kg m/s", "20 kg m/s", "14.14 kg m/s", "200 kg m/s"], exp: "KE = p²/(2m) → p² = 2m×KE = 2×2×100 = 400 → p = 20 kg m/s.", correct: "B" },
        { q: "The work-energy theorem states that:", options: ["Work done = change in momentum", "Work done = change in kinetic energy", "Work done = change in potential energy", "Work done = change in power"], exp: "Work-energy theorem: Net work done on a body equals its change in kinetic energy.", correct: "B" },
        { q: "A stone is thrown vertically upward with a speed of 20 m/s. The maximum height attained is (g = 10 m/s²):", options: ["10 m", "20 m", "30 m", "40 m"], exp: "At max height, KE becomes PE. ½ mv² = mgh → h = v²/(2g) = 400/20 = 20 m.", correct: "B" },
        { q: "A body of mass 1 kg is moving with a velocity of 10 m/s. A constant retarding force of 5 N acts on it. The distance traveled before coming to rest is:", options: ["5 m", "10 m", "15 m", "20 m"], exp: "Work done by force = change in KE → F × d = ½ mv² → 5 × d = ½ × 1 × 100 = 50 → d = 10 m.", correct: "B" },
        { q: "If the momentum of a body is increased by 20%, the percentage increase in kinetic energy is:", options: ["20%", "40%", "44%", "21%"], exp: "KE ∝ p². New p' = 1.2p. New KE' ∝ (1.2p)² = 1.44p². Increase = 0.44 = 44%.", correct: "C" },
        { q: "A machine does 5000 J of work in 10 seconds. Its power is:", options: ["50 W", "500 W", "1000 W", "50000 W"], exp: "Power = Work/Time = 5000/10 = 500 W.", correct: "B" },
        { q: "Two bodies of masses 1 kg and 4 kg have equal kinetic energies. The ratio of their momenta is:", options: ["1:4", "1:2", "2:1", "4:1"], exp: "KE = p²/(2m). For equal KE, p₁²/m₁ = p₂²/m₂ → p₁/p₂ = √(m₁/m₂) = √(1/4) = 1/2 → ratio 1:2.", correct: "B" },
        { q: "A 10 kg body falls from a height of 20 m. Its kinetic energy just before hitting the ground is (g = 10 m/s²):", options: ["1000 J", "2000 J", "3000 J", "4000 J"], exp: "KE = PE = mgh = 10 × 10 × 20 = 2000 J.", correct: "B" },
        { q: "A body is moving in a circular path with constant speed. The work done by the centripetal force is:", options: ["Positive", "Negative", "Zero", "Maximum"], exp: "Centripetal force is always perpendicular to displacement (towards center, displacement tangent), so work done = F·d = 0.", correct: "C" },
        { q: "A ball of mass 0.2 kg is dropped from a height of 5 m. It rebounds to a height of 3.2 m. The energy lost on impact is (g = 10 m/s²):", options: ["3.6 J", "1.8 J", "5.0 J", "10 J"], exp: "Initial KE at impact = mgh₁ = 0.2×10×5 = 10 J. KE after rebound = mgh₂ = 0.2×10×3.2 = 6.4 J. Energy lost = 10 - 6.4 = 3.6 J.", correct: "A" }
    ];

    // Shuffle questions for randomized order each load
    function shuffleArray(arr) {
        for (let i = arr.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [arr[i], arr[j]] = [arr[j], arr[i]];
        }
        return arr;
    }

    let randomizedQuestions = [];
    let userSelections = {};

    function loadQuiz() {
        randomizedQuestions = shuffleArray([...workEnergyMcqs]);
        const container = document.getElementById('questionsContainer');
        container.innerHTML = '';
        userSelections = {};

        randomizedQuestions.forEach((item, idx) => {
            const qDiv = document.createElement('div');
            qDiv.className = 'question';
            qDiv.setAttribute('data-qidx', idx);
            qDiv.innerHTML = `
                <div class="q-text">${idx + 1}. ${item.q}</div>
                <div class="options">
                    ${item.options.map((opt, optIdx) => {
                        const letter = String.fromCharCode(65 + optIdx);
                        return `<div class="option" data-letter="${letter}" onclick="selectOption(this, ${idx}, '${letter}')">
                            ${letter}. ${opt}
                        </div>`;
                    }).join('')}
                </div>
                <div class="explanation" id="exp-${idx}"><strong>Explanation:</strong> ${item.exp}</div>
            `;
            container.appendChild(qDiv);
        });
    }

    window.selectOption = function(el, qIndex, val) {
        const parentOptions = el.parentElement;
        Array.from(parentOptions.children).forEach(child => {
            child.classList.remove('selected');
        });
        el.classList.add('selected');
        userSelections[qIndex] = val;
    };

    window.calculateScore = function() {
        let score = 0;
        randomizedQuestions.forEach((data, idx) => {
            const expDiv = document.getElementById(`exp-${idx}`);
            if (expDiv) expDiv.style.display = 'block';
            
            const questionDiv = document.querySelector(`.question[data-qidx="${idx}"]`);
            if (!questionDiv) return;
            const allOpts = questionDiv.querySelectorAll('.option');
            const correctLetter = data.correct;
            
            allOpts.forEach(opt => {
                const letter = opt.getAttribute('data-letter');
                if (letter === correctLetter) {
                    opt.classList.add('correct');
                }
                if (userSelections[idx] && userSelections[idx] === letter && letter !== correctLetter) {
                    opt.classList.add('wrong');
                }
            });
            
            if (userSelections[idx] && userSelections[idx] === data.correct) {
                score++;
            }
        });
        
        const resultsDiv = document.getElementById('results');
        resultsDiv.style.display = 'block';
        const scoreSpan = document.getElementById('scoreText');
        const percent = Math.round((score / randomizedQuestions.length) * 100);
        scoreSpan.innerHTML = `Score: ${score} / ${randomizedQuestions.length}  |  ${percent}%`;
        
        setTimeout(() => {
            resultsDiv.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }, 100);
    };

    loadQuiz();
</script>
</body>
</html>
