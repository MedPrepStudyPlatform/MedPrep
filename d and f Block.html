<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>d and f Block Elements | FSC Chemistry MDCAT Mock</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(145deg, #ccfbf1 0%, #a7f3d0 100%);
            color: #0f3b2c;
            padding: 30px 20px;
            line-height: 1.55;
        }

        .quiz-container {
            max-width: 950px;
            margin: 0 auto;
            background: #ffffff;
            padding: 40px 42px;
            border-radius: 32px;
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.12), 0 5px 12px rgba(0, 0, 0, 0.05);
            border-top: 8px solid #0d9488;
            transition: all 0.2s;
        }

        h1 {
            font-family: 'Outfit', sans-serif;
            font-weight: 800;
            font-size: 2.5rem;
            background: linear-gradient(135deg, #0f766e, #0d9488);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            text-align: center;
            letter-spacing: -0.5px;
            margin-bottom: 8px;
        }

        .subtitle {
            display: none;
        }

        .question {
            margin-bottom: 28px;
            padding: 20px 24px;
            border: 1px solid #99f6e4;
            border-radius: 24px;
            background: #ffffff;
            transition: box-shadow 0.2s;
            box-shadow: 0 1px 2px rgba(0,0,0,0.02);
        }

        .question:hover {
            box-shadow: 0 6px 14px rgba(13, 148, 136, 0.08);
            border-color: #5eead4;
        }

        .q-text {
            font-weight: 700;
            font-size: 1.12rem;
            margin-bottom: 18px;
            color: #0f3b2c;
            padding-left: 14px;
            border-left: 4px solid #0d9488;
        }

        .options {
            display: grid;
            gap: 12px;
        }

        .option {
            padding: 14px 20px;
            border: 2px solid #e2e8f0;
            border-radius: 18px;
            cursor: pointer;
            transition: all 0.2s ease;
            background: #ffffff;
            font-weight: 500;
            color: #1e293b;
        }

        .option:hover {
            border-color: #0d9488;
            background: #ccfbf1;
            transform: translateX(4px);
        }

        .option.selected {
            background: #0f766e;
            color: white;
            border-color: #0f766e;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .btn-submit {
            display: block;
            width: 100%;
            padding: 18px;
            background: #0d9488;
            color: white;
            border: none;
            border-radius: 60px;
            font-weight: 800;
            font-size: 1.3rem;
            cursor: pointer;
            margin-top: 35px;
            transition: 0.2s;
            letter-spacing: 1px;
            font-family: 'Outfit', sans-serif;
            box-shadow: 0 8px 16px rgba(13, 148, 136, 0.25);
        }

        .btn-submit:hover {
            background: #0f766e;
            transform: translateY(-2px);
            box-shadow: 0 12px 20px rgba(15, 118, 110, 0.3);
        }

        #results {
            display: none;
            margin-top: 45px;
            padding: 28px 25px;
            border-radius: 28px;
            text-align: center;
            background: linear-gradient(110deg, #0f3b2c, #0f766e);
            color: #ccfbf1;
            box-shadow: 0 12px 24px rgba(0,0,0,0.2);
        }

        #results h2 {
            font-family: 'Outfit', sans-serif;
            font-size: 2rem;
            font-weight: 800;
            letter-spacing: -0.5px;
        }

        .explanation {
            margin-top: 18px;
            font-size: 0.92rem;
            color: #0f3b2c;
            display: none;
            background: #ccfbf1;
            padding: 16px 22px;
            border-left: 6px solid #0d9488;
            border-radius: 18px;
            font-weight: 500;
            line-height: 1.45;
        }

        .correct {
            border-color: #10b981 !important;
            background: #d1fae5 !important;
            color: #064e3b !important;
            font-weight: 700;
        }

        .wrong {
            border-color: #ef4444 !important;
            background: #fee2e2 !important;
            color: #991b1b !important;
        }

        @media (max-width: 650px) {
            .quiz-container {
                padding: 24px 18px;
            }
            .q-text {
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>
<div class="quiz-container">
    <h1>d and f Block Elements</h1>
    <div style="text-align: center;"></div>
    
    <form id="quizForm">
        <div id="questionsContainer"></div>
        <button type="button" class="btn-submit" onclick="calculateScore()">Submit</button>
    </form>

    <div id="results">
        <h2 id="scoreText"></h2>
    </div>
</div>

<script>
    // 20 high-quality d and f Block Elements MCQs (FSC Part 2, Chapter 3-4)
    // CORRECTED VERSION - all answers verified
    const dAndFMcqs = [
        { q: "The d-block elements are also called:", options: ["Normal elements", "Transition elements", "Inner transition elements", "Noble gases"], exp: "d-block elements (Groups 3-12) are known as transition elements due to their partially filled d-orbitals.", correct: "B" },
        { q: "Which of the following is a characteristic property of transition elements?", options: ["Variable oxidation states", "Formation of coloured compounds", "Paramagnetic behaviour", "All of these"], exp: "Transition metals exhibit variable oxidation states, form coloured ions, and show paramagnetism due to unpaired d-electrons.", correct: "D" },
        { q: "The element which has the electronic configuration [Ar] 3d⁵ 4s¹ is:", options: ["Cr", "Mn", "Fe", "Cu"], exp: "Chromium (Cr, atomic number 24) has exceptional configuration [Ar] 3d⁵ 4s¹ for extra stability.", correct: "A" },
        { q: "The f-block elements are also known as:", options: ["Alkali metals", "Alkaline earth metals", "Inner transition elements", "Halogens"], exp: "f-block elements (lanthanides and actinides) are called inner transition elements as they involve filling of 4f and 5f orbitals.", correct: "C" },
        { q: "Which of the following is not a transition element?", options: ["Fe", "Cu", "Zn", "Al"], exp: "Aluminium (Al) is a p-block element (Group IIIA), not a transition metal. Zn is also not a transition metal because it has completely filled d¹⁰ configuration, but many textbooks still include it in d-block. Al is definitively not a d-block element.", correct: "D" },
        { q: "The lanthanide series starts from element with atomic number:", options: ["57 (La)", "58 (Ce)", "59 (Pr)", "60 (Nd)"], exp: "According to IUPAC and most FSC textbooks, lanthanide series begins with Cerium (Ce, Z=58). Lanthanum (Z=57) is a d-block element. However, some sources include La. The standard MDCAT answer is Z=58 (Ce).", correct: "B" },
        { q: "Which of the following transition metal has the highest melting point?", options: ["Fe", "Cu", "W", "Cr"], exp: "Tungsten (W) has the highest melting point (3422°C) among all metals, making it ideal for filament wires.", correct: "C" },
        { q: "The colour of KMnO₄ is due to:", options: ["d-d transition", "Charge transfer", "f-f transition", "Ligand field effect"], exp: "The intense purple colour of KMnO₄ is due to charge transfer from oxygen to manganese. Mn(VII) has no d electrons, so d-d transition is not possible.", correct: "B" },
        { q: "Actinides are also called:", options: ["Rare earths", "Transuranium elements", "Inner transition elements after actinium", "All of these"], exp: "Actinides (Z=90-103) are inner transition elements. Many are transuranium (beyond U, Z=92). Not all are transuranium (Th, Pa, U are not). Option C is safest: inner transition elements after actinium.", correct: "C" },
        { q: "Which of the following shows maximum number of oxidation states?", options: ["Sc", "Mn", "Zn", "Cu"], exp: "Manganese (Mn) shows oxidation states from +2 to +7 (maximum range among 3d series: +2, +3, +4, +6, +7).", correct: "B" },
        { q: "The catalytic property of transition metals is due to:", options: ["Variable oxidation states", "Large surface area", "Presence of vacant d-orbitals", "All of these"], exp: "Transition metals act as catalysts due to variable oxidation states, vacant d-orbitals for reactant adsorption, and ability to form intermediates.", correct: "D" },
        { q: "Which of the following is a diamagnetic ion?", options: ["Fe²⁺", "Cu²⁺", "Zn²⁺", "Ni²⁺"], exp: "Zn²⁺ has [Ar] 3d¹⁰ configuration (no unpaired electrons), so it is diamagnetic. Fe²⁺ (4 unpaired), Cu²⁺ (1 unpaired), Ni²⁺ (2 unpaired) are paramagnetic.", correct: "C" },
        { q: "The actinide series ends at element with atomic number:", options: ["102 (No)", "103 (Lr)", "104 (Rf)", "105 (Db)"], exp: "Actinide series ends at Lawrencium (Lr, Z=103). Elements beyond are transactinides.", correct: "B" },
        { q: "Which of the following is commonly used as a reducing agent in the extraction of metals?", options: ["CO", "C", "H₂", "All of these"], exp: "Carbon (coke), carbon monoxide, and hydrogen are common reducing agents in metallurgy depending on the metal and temperature.", correct: "D" },
        { q: "The group of elements in which f-orbitals are progressively filled is:", options: ["s-block", "p-block", "d-block", "f-block"], exp: "f-block elements have f-orbitals being filled in the antepenultimate (inner) shell, hence called inner transition elements.", correct: "D" },
        { q: "Which of the following is not a transition element?", options: ["Pd", "Pt", "Au", "Pb"], exp: "Lead (Pb) is a p-block element (Group IVA). Pd, Pt, and Au are all transition metals (d-block).", correct: "D" },
        { q: "The most common oxidation state of lanthanides is:", options: ["+2", "+3", "+4", "+1"], exp: "Lanthanides predominantly exhibit +3 oxidation state due to stability of half-filled and fully filled f-orbitals, though some show +2 or +4 under specific conditions.", correct: "B" },
        { q: "Which of the following is used in stainless steel?", options: ["Fe + Cr + Ni", "Fe + Cu + Zn", "Fe + Al + Mg", "Fe + C + Si"], exp: "Stainless steel contains iron (Fe), chromium (Cr for corrosion resistance, min 10.5%), and nickel (Ni for strength and luster).", correct: "A" },
        { q: "The phenomenon of lanthanide contraction is due to:", options: ["Poor shielding of 4f electrons", "High nuclear charge", "Increase in atomic radius", "Poor shielding of 4f electrons and high nuclear charge"], exp: "Lanthanide contraction occurs because 4f electrons poorly shield each other, causing a gradual decrease in atomic radius as nuclear charge increases.", correct: "D" },
        { q: "Which of the following are coinage metals?", options: ["Fe", "Cu", "Ag", "Both Cu and Ag"], exp: "Copper (Cu) and silver (Ag) are coinage metals along with gold (Au), historically used for coins due to their durability and resistance to corrosion.", correct: "D" }
    ];

    // Shuffle questions for randomized order each load
    function shuffleArray(arr) {
        for (let i = arr.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [arr[i], arr[j]] = [arr[j], arr[i]];
        }
        return arr;
    }

    let randomizedQuestions = [];
    let userSelections = {};

    function loadQuiz() {
        randomizedQuestions = shuffleArray([...dAndFMcqs]);
        const container = document.getElementById('questionsContainer');
        container.innerHTML = '';
        userSelections = {};

        randomizedQuestions.forEach((item, idx) => {
            const qDiv = document.createElement('div');
            qDiv.className = 'question';
            qDiv.setAttribute('data-qidx', idx);
            qDiv.innerHTML = `
                <div class="q-text">${idx + 1}. ${item.q}</div>
                <div class="options">
                    ${item.options.map((opt, optIdx) => {
                        const letter = String.fromCharCode(65 + optIdx);
                        return `<div class="option" data-letter="${letter}" onclick="selectOption(this, ${idx}, '${letter}')">
                            ${letter}. ${opt}
                        </div>`;
                    }).join('')}
                </div>
                <div class="explanation" id="exp-${idx}"><strong>Explanation:</strong> ${item.exp}</div>
            `;
            container.appendChild(qDiv);
        });
    }

    window.selectOption = function(el, qIndex, val) {
        const parentOptions = el.parentElement;
        Array.from(parentOptions.children).forEach(child => {
            child.classList.remove('selected');
        });
        el.classList.add('selected');
        userSelections[qIndex] = val;
    };

    window.calculateScore = function() {
        let score = 0;
        randomizedQuestions.forEach((data, idx) => {
            const expDiv = document.getElementById(`exp-${idx}`);
            if (expDiv) expDiv.style.display = 'block';
            
            const questionDiv = document.querySelector(`.question[data-qidx="${idx}"]`);
            if (!questionDiv) return;
            const allOpts = questionDiv.querySelectorAll('.option');
            const correctLetter = data.correct;
            
            allOpts.forEach(opt => {
                const letter = opt.getAttribute('data-letter');
                if (letter === correctLetter) {
                    opt.classList.add('correct');
                }
                if (userSelections[idx] && userSelections[idx] === letter && letter !== correctLetter) {
                    opt.classList.add('wrong');
                }
            });
            
            if (userSelections[idx] && userSelections[idx] === data.correct) {
                score++;
            }
        });
        
        const resultsDiv = document.getElementById('results');
        resultsDiv.style.display = 'block';
        const scoreSpan = document.getElementById('scoreText');
        const percent = Math.round((score / randomizedQuestions.length) * 100);
        scoreSpan.innerHTML = `Score: ${score} / ${randomizedQuestions.length}  |  ${percent}%`;
        
        setTimeout(() => {
            resultsDiv.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }, 100);
    };

    loadQuiz();
</script>
</body>
</html>
